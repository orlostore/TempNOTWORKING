<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login Option A — Editorial Split Panel</title>
<style>
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-300.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-italic.woff2') format('woff2');font-weight:400;font-style:italic;font-display:swap}
@font-face{font-family:'Almarai';src:url('/fonts/almarai-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;font-family:'DM Sans',sans-serif;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.option-label{position:fixed;top:0;left:0;right:0;padding:0.6rem 1.4rem;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#1a3a52;background:#fff;border-bottom:1px solid rgba(26,58,82,0.10);z-index:100}
.option-label .sub{display:inline;font-family:'DM Sans',sans-serif;font-size:0.62rem;color:#6b6b6b;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}
.arabic{font-family:'Almarai',sans-serif}

/* ───────── OPTION A — Editorial split panel ───────── */
.auth-container{margin-top:60px;width:100%;max-width:920px;background:#fff;border:1px solid rgba(26,58,82,0.10);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 8px 32px rgba(26,58,82,0.08)}
.brand-panel{background:#1a3a52;color:#fff;padding:48px 36px;display:flex;flex-direction:column;justify-content:center;min-height:480px}
.brand-panel .logo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem;letter-spacing:0.08em;margin-bottom:32px}
.brand-panel .logo span{color:#e76f51}
.brand-panel h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(32px,3vw,44px);line-height:1.1;letter-spacing:-0.01em;margin-bottom:14px}
.brand-panel h1 em{color:#e76f51;font-style:italic;font-weight:300}
.brand-panel .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.05rem;line-height:1.6;opacity:0.85;max-width:280px}
.brand-panel .tagline-ar{font-family:'Almarai',sans-serif;font-size:0.85rem;direction:rtl;text-align:right;margin-top:8px;opacity:0.7}
.form-panel{padding:48px 36px;display:flex;flex-direction:column;justify-content:center}
.form-panel .back{display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#6b6b6b;margin-bottom:32px;text-decoration:none}
.form-panel h2{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.8rem;letter-spacing:-0.01em;color:#1a3a52;margin-bottom:6px}
.form-panel .subtitle{font-family:'Almarai',sans-serif;font-size:0.85rem;color:#6b6b6b;direction:rtl;text-align:right;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:'DM Sans',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#6b6b6b;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;background:#f8f6f2;border:1px solid rgba(26,58,82,0.10);border-radius:8px;color:#1a1a1a;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:#1a3a52}
.form-options{display:flex;justify-content:space-between;align-items:center;font-size:0.78rem;color:#6b6b6b;margin-bottom:18px}
.form-options a{color:#e76f51;text-decoration:none;font-weight:500}
.btn-login{width:100%;padding:14px;background:#1a3a52;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:filter .2s,transform .2s}
.btn-login:hover{filter:brightness(0.85);transform:translateY(-1px)}
.btn-login .ar{display:block;font-family:'Almarai',sans-serif;font-size:0.7rem;opacity:0.85;margin-top:2px;text-transform:none;letter-spacing:0}
.auth-footer{margin-top:24px;text-align:center;font-size:0.82rem;color:#6b6b6b}
.auth-footer a{color:#1a3a52;font-weight:500;text-decoration:none}
@media (max-width:680px){
  .auth-container{grid-template-columns:1fr;max-width:440px}
  .brand-panel{padding:32px 28px;min-height:auto}
  .brand-panel h1{font-size:28px}
  .form-panel{padding:32px 28px}
  .form-panel h2{font-size:1.5rem}
}
</style></head>
<body>
<div class="option-label">Option A<span class="sub">Editorial split panel</span></div>
<div class="auth-container">
  <div class="brand-panel">
    <div class="logo">ORL<span>O</span></div>
    <h1>Welcome <em>back.</em></h1>
    <p class="tagline">Your everyday essentials, just a moment away.</p>
    <p class="tagline-ar">أساسياتك اليومية، توصيل لباب بيتك</p>
  </div>
  <div class="form-panel">
    <a href="#" class="back">← Back to Shop</a>
    <h2>Sign in</h2>
    <p class="subtitle">مرحباً بعودتك</p>
    <form>
      <div class="form-group">
        <label>Email <span class="arabic" style="font-size:0.65rem;letter-spacing:0">البريد الإلكتروني</span></label>
        <input type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password <span class="arabic" style="font-size:0.65rem;letter-spacing:0">كلمة المرور</span></label>
        <input type="password" placeholder="Enter password">
      </div>
      <div class="form-options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Reset</a>
      </div>
      <button class="btn-login">Sign in<span class="ar">تسجيل الدخول</span></button>
      <div class="auth-footer">Don't have an account? <a href="#">Sign up</a></div>
    </form>
  </div>
</div>
</body></html>
