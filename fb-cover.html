<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLO – Facebook Cover Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.cover {
  width: 820px; height: 312px;
  background: #ffffff;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
}

/* subtle warm glow */
.cover::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(224,120,86,0.08) 0%, transparent 70%);
  top: -150px; right: -100px;
}
.cover::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(224,120,86,0.06) 0%, transparent 70%);
  bottom: -150px; left: -50px;
}

/* top accent line */
.accent-line {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #e07856, #f4a261);
}

.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  text-align: center;
}

.logo { height: 38px; }

.tagline-en {
  font-size: 15px; font-weight: 600;
  color: #1a1a1a; letter-spacing: 0.5px;
}

.tagline-ar {
  font-family: 'Almarai', sans-serif;
  font-size: 14px; font-weight: 700;
  color: #6a8090; direction: rtl;
}

.divider {
  width: 60px; height: 2px;
  background: #e07856;
}

.badges {
  display: flex; gap: 32px; align-items: center;
}

.badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500; color: #6a8090;
}

.badge-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(224,120,86,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.badge-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #d0d0d0;
}

/* bottom subtle bar */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(224,120,86,0.15);
}
</style>
</head>
<body>

<div class="cover">
  <div class="accent-line"></div>

  <div class="content">
    <img src="logo.png" alt="ORLO" class="logo">

    <div class="tagline-en">Home Décor · Handmade Gifts · Everyday Essentials</div>
    <div class="tagline-ar">ديكور منزلي · هدايا يدوية · مستلزمات يومية</div>

    <div class="divider"></div>

    <div class="badges">
      <div class="badge"><div class="badge-icon">🚚</div>Free Delivery Over 75 AED</div>
      <div class="badge-dot"></div>
      <div class="badge"><div class="badge-icon">🇦🇪</div>Licensed UAE Store</div>
      <div class="badge-dot"></div>
      <div class="badge"><div class="badge-icon">👨‍👩‍👧</div>Family-Owned</div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

</body>
</html>
