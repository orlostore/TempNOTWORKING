<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ORLO · Dangling Buddies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Almarai:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; }
    .stage { position: relative; width: 420px; height: 700px; background: #faf8f5; overflow: hidden; }

    /* The Fridge */
    .fridge { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%) scale(1.2); width: 190px; height: 340px; }
    .f-top { height: 210px; background: #d5e0ec; border: 3px solid #b8c7d8; border-radius: 18px 18px 8px 8px; }
    .f-bot { margin-top: 4px; height: 126px; background: #c8d5e5; border: 3px solid #b8c7d8; border-radius: 8px 8px 18px 18px; }

    /* Character Body Styling (No more squares!) */
    .buddy { position: absolute; bottom: 52px; z-index: 25; width: 65px; opacity: 0; }
    .head { width: 52px; height: 48px; border-radius: 30px; position: relative; border: 2px solid rgba(0,0,0,0.1); }
    .face { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 30px; text-align: center; }
    .eyes { display: flex; justify-content: space-around; }
    .eye { width: 5px; height: 5px; background: #2c4a5c; border-radius: 50%; }
    .mouth { width: 12px; height: 6px; border-bottom: 2px solid #cc6b6b; border-radius: 50%; margin: 2px auto; }

    /* Strawberry Details */
    .strawberry .head { background: #ffcd94; }
    .strawberry .hat { position: absolute; top: -18px; width: 44px; height: 30px; background: #e34a4a; border-radius: 50% 50% 20% 20%; left: 4px; border: 2px solid #aa2b2b; }
    .strawberry .hat::after { content: '..'; color: #f5e56b; font-size: 10px; position: absolute; top: 5px; left: 10px; }

    /* Mushroom Details */
    .mushroom .head { background: #f0dbb4; }
    .mushroom .hat { position: absolute; top: -20px; width: 48px; height: 32px; background: #7d9b4c; border-radius: 40% 40% 10% 10%; left: 2px; border: 2px solid #4f6a2e; }

    /* Dangling Legs */
    .legs { display: flex; justify-content: center; gap: 8px; margin-top: -5px; }
    .leg { width: 8px; height: 35px; border-radius: 4px; border: 1.5px solid #555; }
    .strawberry .leg { background: repeating-linear-gradient(45deg, #e34a4a, #e34a4a 5px, #fff 5px, #fff 10px); }
    .mushroom .leg { background: repeating-linear-gradient(45deg, #aa7c4a, #aa7c4a 5px, #f0e6d2 5px, #f0e6d2 10px); }
    .shoe { width: 14px; height: 8px; background: #333; border-radius: 4px 4px 2px 2px; margin-top: -2px; }

    /* Animations */
    .strawberry { animation: jumpS 1.5s 1s forwards; }
    .mushroom { animation: jumpM 1.5s 1.5s forwards; }
    @keyframes jumpS { 0% { left: -50px; opacity: 0; } 100% { left: 118px; bottom: 368px; opacity: 1; } }
    @keyframes jumpM { 0% { right: -50px; opacity: 0; } 100% { right: 114px; bottom: 356px; opacity: 1; } }

    /* UI */
    .price { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); background: #e07856; color: #fff; padding: 10px 20px; border-radius: 30px; font-weight: 900; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="fridge"><div class="f-top"></div><div class="f-bot"></div></div>

    <div class="buddy strawberry">
      <div class="head"><div class="hat"></div><div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div></div></div>
      <div class="legs"><div class="l"><div class="leg"></div><div class="shoe"></div></div><div class="l"><div class="leg"></div><div class="shoe"></div></div></div>
    </div>

    <div class="buddy mushroom">
      <div class="head"><div class="hat"></div><div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div></div></div>
      <div class="legs"><div class="l"><div class="leg"></div><div class="shoe"></div></div><div class="l"><div class="leg"></div><div class="shoe"></div></div></div>
    </div>

    <div class="price">16 AED</div>
  </div>
</body>
</html>
