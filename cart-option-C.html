<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cart Option C — Cream Card, Navy "Checkout" Text Header</title>
<style>
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Almarai';src:url('/fonts/almarai-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;font-family:'DM Sans',sans-serif;color:#1a1a1a;padding:0;min-height:100vh}
.cart-footer{background:#f8f6f2;padding:0.3rem 1.4rem;border-top:1px solid rgba(26,58,82,0.10);max-width:440px;margin:0 auto}
.totals{padding:0.5rem 0.75rem 0.5rem;font-size:0.78rem}
.totals .row{display:flex;justify-content:space-between;padding:0.05rem 0;color:#1a1a1a}
.totals .row .free{color:#28a745;font-weight:600}
.totals hr{border:none;border-top:1px solid rgba(26,58,82,0.10);margin:0.3rem 0}
.totals .total{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:400;color:#1a3a52;display:flex;justify-content:space-between;padding-top:0.2rem}
.arabic{font-family:'Almarai',sans-serif}

/* ───────── OPTION C — Cream card, navy "Checkout" text header (no navy band) ───────── */
.checkout-card{border-radius:14px;border:1px solid rgba(26,58,82,0.12);background:#fff;box-shadow:0 2px 10px rgba(26,58,82,0.08);padding:14px;margin:0.6rem 0 0}
.checkout-card .header{text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#1a3a52;letter-spacing:-0.01em;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.checkout-card .header .ar{font-family:'Almarai',sans-serif;font-size:0.78rem;color:#6b6b6b;margin-left:6px;font-weight:400}
.checkout-card .header svg{width:18px;height:18px;stroke:#1a3a52;stroke-width:1.8;fill:none}
.checkout-card .buttons{display:flex;gap:8px}
.checkout-card .btn{flex:1;padding:12px 8px;background:#1a3a52;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.78rem;text-align:center;cursor:pointer;transition:filter .2s}
.checkout-card .btn:hover{filter:brightness(0.85)}
.checkout-card .btn .ar{display:block;font-family:'Almarai',sans-serif;font-size:0.7rem;opacity:0.85;margin-top:2px}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 8px 14px;display:flex;justify-content:space-around;z-index:6000;border-top:1px solid #eee}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:0.62rem;font-weight:600;color:#666}
.nav-item.active{color:#1a3a52}
.nav-item svg{width:22px;height:22px;stroke:#c0c8ce;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{stroke:#1a3a52;stroke-width:2}
.option-label{padding:1rem 1.4rem;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:#1a3a52;background:#fff;border-bottom:1px solid rgba(26,58,82,0.10)}
.option-label .sub{display:block;font-family:'DM Sans',sans-serif;font-size:0.7rem;color:#6b6b6b;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:500}
</style></head>
<body>
<div class="option-label">Option C<span class="sub">Cream card, editorial navy "Checkout" header</span></div>
<div class="cart-footer">
  <div class="totals">
    <div class="row"><span>Subtotal | <span class="arabic">المجموع الفرعي</span>:</span><span>AED 137.00</span></div>
    <div class="row"><span>Delivery | <span class="arabic">التوصيل</span>:</span><span class="free">FREE | <span class="arabic">مجاني</span></span></div>
    <hr>
    <div class="total"><span>Total | <span class="arabic">الإجمالي</span>:</span><span>AED 137.00</span></div>
  </div>

  <div class="checkout-card">
    <div class="header">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Pay by Card <span class="ar">| الدفع بالبطاقة</span>
    </div>
    <div class="buttons">
      <button class="btn">🔒 Sign in<span class="ar">تسجيل الدخول</span></button>
      <button class="btn">👤 As Guest<span class="ar">كضيف</span></button>
    </div>
  </div>
</div>

<nav class="mobile-nav">
  <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V14h6v7"/></svg><span>Home</span></div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg><span>Login</span></div>
  <div class="nav-item active"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a1 1 0 001 .61h9.72a1 1 0 00.98-.78L23 6H6"/></svg><span>Cart</span></div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg><span>Menu</span></div>
</nav>
</body></html>
