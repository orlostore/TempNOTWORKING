<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login Option B — Single Column Centered (Aesop/MR PORTER style)</title>
<style>
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'DM Sans';src:url('/fonts/dm-sans-v17-latin-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-300.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'Cormorant Garamond';src:url('/fonts/cormorant-garamond-v21-latin-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Almarai';src:url('/fonts/almarai-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;font-family:'DM Sans',sans-serif;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:80px 20px 40px}
.option-label{position:fixed;top:0;left:0;right:0;padding:0.6rem 1.4rem;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#1a3a52;background:#fff;border-bottom:1px solid rgba(26,58,82,0.10);z-index:100}
.option-label .sub{display:inline;font-family:'DM Sans',sans-serif;font-size:0.62rem;color:#6b6b6b;letter-spacing:0.1em;text-transform:uppercase;margin-left:10px}
.arabic{font-family:'Almarai',sans-serif}

/* ───────── OPTION B — Single column, narrow, centered ───────── */
.logo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.6rem;letter-spacing:0.1em;color:#1a3a52;margin-bottom:32px}
.logo span{color:#e76f51}
.auth-card{width:100%;max-width:380px;text-align:center}
.auth-card h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,4vw,44px);line-height:1.1;letter-spacing:-0.01em;color:#1a3a52;margin-bottom:6px}
.auth-card .subtitle{font-family:'Almarai',sans-serif;font-size:0.95rem;color:#6b6b6b;margin-bottom:36px}
.form-group{margin-bottom:14px;text-align:left}
.form-group label{display:block;font-family:'DM Sans',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#6b6b6b;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 0;font-family:'DM Sans',sans-serif;font-size:0.95rem;background:transparent;border:none;border-bottom:1px solid rgba(26,58,82,0.20);color:#1a1a1a;transition:border-color .2s;outline:none}
.form-group input:focus{border-bottom-color:#1a3a52}
.form-group input::placeholder{color:#a8a8a8}
.form-options{display:flex;justify-content:space-between;align-items:center;font-size:0.78rem;color:#6b6b6b;margin:8px 0 28px}
.form-options a{color:#e76f51;text-decoration:none;font-weight:500}
.btn-login{width:100%;padding:14px;background:#1a3a52;color:#fff;border:none;border-radius:999px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.78rem;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:filter .2s,transform .2s}
.btn-login:hover{filter:brightness(0.85);transform:translateY(-1px)}
.btn-login .ar{display:block;font-family:'Almarai',sans-serif;font-size:0.68rem;opacity:0.85;margin-top:2px;text-transform:none;letter-spacing:0}
.auth-footer{margin-top:32px;text-align:center;font-size:0.82rem;color:#6b6b6b}
.auth-footer a{color:#1a3a52;font-weight:500;text-decoration:none;border-bottom:1px solid currentColor}
</style></head>
<body>
<div class="option-label">Option B<span class="sub">Single column, narrow (Aesop/MR PORTER style)</span></div>
<div class="logo">ORL<span>O</span></div>
<div class="auth-card">
  <h1>Welcome back.</h1>
  <p class="subtitle">مرحباً بعودتك</p>
  <form>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="••••••••">
    </div>
    <div class="form-options">
      <label><input type="checkbox"> Remember me</label>
      <a href="#">Reset</a>
    </div>
    <button class="btn-login">Sign in<span class="ar">تسجيل الدخول</span></button>
    <div class="auth-footer">No account yet? <a href="#">Create one</a></div>
  </form>
</div>
</body></html>
