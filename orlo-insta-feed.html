<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLO Store – Instagram Feed Post</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --primary:#2c4a5c;
    --primary-dark:#1a3a52;
    --accent:#e07856;
    --bg:#f8f9fa;
    --cream:#faf5ef;
    --gold:#d4a574;
  }

  body{
    background:#111;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    font-family:'Inter',sans-serif;
  }

  /* 1:1 Instagram Feed Post */
  .post{
    position:relative;
    width:min(100vw,100vh);
    height:min(100vw,100vh);
    background:var(--primary-dark);
    overflow:hidden;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  /* Noise texture */
  .post::after{
    content:'';position:absolute;inset:0;z-index:50;
    pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size:128px;opacity:0.6;mix-blend-mode:overlay;
  }

  /* Background */
  .bg{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 90% 70% at 50% -10%,rgba(44,74,92,0.8) 0%,transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 110%,rgba(224,120,86,0.06) 0%,transparent 50%),
      radial-gradient(ellipse 50% 50% at 80% 50%,rgba(212,165,116,0.04) 0%,transparent 50%),
      var(--primary-dark);
  }

  /* Rotating ambient */
  .ambient{
    position:absolute;top:-50%;left:-50%;
    width:200%;height:200%;z-index:1;
    background:conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,rgba(224,120,86,0.022) 60deg,
      transparent 120deg,rgba(212,165,116,0.012) 240deg,
      transparent 360deg);
    opacity:0;
    animation:ambientIn 2s ease 0.3s forwards,ambientSpin 30s linear 0.3s infinite;
  }
  @keyframes ambientIn{to{opacity:1}}
  @keyframes ambientSpin{to{transform:rotate(360deg)}}

  /* Floating particles */
  .dot{position:absolute;border-radius:50%;z-index:2;opacity:0}
  .dot-1{width:3px;height:3px;top:15%;left:10%;background:rgba(224,120,86,0.25);
    animation:drift 8s ease-in-out 3s infinite,dotIn 0.8s ease 3s forwards}
  .dot-2{width:2px;height:2px;top:60%;right:12%;background:rgba(212,165,116,0.2);
    animation:drift 6s ease-in-out 3.5s infinite,dotIn 0.8s ease 3.5s forwards}
  .dot-3{width:4px;height:4px;top:25%;right:8%;background:rgba(255,255,255,0.05);
    animation:drift 10s ease-in-out 2.5s infinite,dotIn 0.8s ease 2.5s forwards}
  .dot-4{width:2px;height:2px;bottom:20%;left:18%;background:rgba(224,120,86,0.15);
    animation:drift 7s ease-in-out 4s infinite,dotIn 0.8s ease 4s forwards}
  @keyframes drift{
    0%,100%{transform:translate(0,0)}
    25%{transform:translate(10px,-15px)}
    50%{transform:translate(-6px,-25px)}
    75%{transform:translate(14px,-10px)}
  }
  @keyframes dotIn{to{opacity:1}}

  /* Corner marks */
  .corner{position:absolute;width:32px;height:32px;z-index:3;opacity:0}
  .corner::before,.corner::after{content:'';position:absolute;background:rgba(212,165,116,0.2)}
  .c-tl{top:5%;left:5%;animation:cIn .5s ease 3.4s forwards}
  .c-tl::before{top:0;left:0;width:1px;height:100%}
  .c-tl::after{top:0;left:0;width:100%;height:1px}
  .c-tr{top:5%;right:5%;animation:cIn .5s ease 3.5s forwards}
  .c-tr::before{top:0;right:0;width:1px;height:100%}
  .c-tr::after{top:0;right:0;width:100%;height:1px}
  .c-bl{bottom:5%;left:5%;animation:cIn .5s ease 3.6s forwards}
  .c-bl::before{bottom:0;left:0;width:1px;height:100%}
  .c-bl::after{bottom:0;left:0;width:100%;height:1px}
  .c-br{bottom:5%;right:5%;animation:cIn .5s ease 3.7s forwards}
  .c-br::before{bottom:0;right:0;width:1px;height:100%}
  .c-br::after{bottom:0;right:0;width:100%;height:1px}
  @keyframes cIn{to{opacity:1}}

  /* Rings */
  .ring{
    position:absolute;top:50%;left:50%;
    border-radius:50%;
    border:1px solid rgba(224,120,86,0.1);
    z-index:5;
    transform:translate(-50%,-50%) scale(0);opacity:0;
  }
  .ring-1{width:min(45vw,45vh);height:min(45vw,45vh);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 0.7s forwards;}
  .ring-2{width:min(58vw,58vh);height:min(58vw,58vh);
    border-color:rgba(212,165,116,0.06);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 0.9s forwards;}
  .ring-3{width:min(72vw,72vh);height:min(72vw,72vh);
    border-color:rgba(255,255,255,0.025);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 1.1s forwards;}
  @keyframes ringBreath{
    0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    40%{transform:translate(-50%,-50%) scale(0.92);opacity:0.7}
    100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  }

  /* Spark */
  .spark{
    position:absolute;top:50%;left:50%;
    width:12px;height:12px;margin:-6px 0 0 -6px;
    border-radius:50%;background:var(--accent);z-index:10;opacity:0;
    transform:scale(0);
    animation:
      sparkIn 0.6s cubic-bezier(.22,1,.36,1) 0.2s forwards,
      sparkOut 0.4s ease 1.2s forwards;
    box-shadow:0 0 20px rgba(224,120,86,0.6),0 0 50px rgba(224,120,86,0.2);
  }
  @keyframes sparkIn{
    0%{opacity:0;transform:scale(0) translateX(50vw)}
    70%{opacity:1;transform:scale(1.3) translateX(0)}
    100%{opacity:1;transform:scale(1) translateX(0)}
  }
  @keyframes sparkOut{to{opacity:0;transform:scale(0)}}

  /* Main content */
  .content{
    position:relative;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:0 10%;width:100%;
    gap:0;
  }

  /* Logo */
  .logo-wrap{position:relative;margin-bottom:5%;}
  .logo-glow{
    position:absolute;top:50%;left:50%;
    width:130%;height:130%;border-radius:50%;
    background:radial-gradient(circle,rgba(224,120,86,0.12) 0%,transparent 65%);
    transform:translate(-50%,-50%) scale(0);opacity:0;
    animation:glowIn 1s cubic-bezier(.22,1,.36,1) 1.6s forwards,
               glowPulse 4s ease-in-out 2.8s infinite;
  }
  @keyframes glowIn{to{transform:translate(-50%,-50%) scale(1);opacity:1}}
  @keyframes glowPulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}
    50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
  }

  .logo-img{
    width:min(36vw,36vh);height:min(36vw,36vh);
    object-fit:contain;opacity:0;
    transform:scale(0.5) rotate(-8deg);
    filter:drop-shadow(0 8px 20px rgba(0,0,0,0));
    animation:
      logoReveal 1.2s cubic-bezier(.16,1,.3,1) 1.2s forwards,
      logoSettle 0.6s cubic-bezier(.22,1,.36,1) 2.4s forwards;
  }
  @keyframes logoReveal{
    0%{opacity:0;transform:scale(0.5) rotate(-8deg);filter:drop-shadow(0 8px 20px rgba(0,0,0,0))}
    50%{opacity:1;transform:scale(1.06) rotate(1deg);filter:drop-shadow(0 8px 25px rgba(0,0,0,0.15))}
    100%{opacity:1;transform:scale(1.04) rotate(0deg);filter:drop-shadow(0 6px 20px rgba(0,0,0,0.12))}
  }
  @keyframes logoSettle{
    0%{transform:scale(1.04) rotate(0deg) translateY(0);filter:drop-shadow(0 6px 20px rgba(0,0,0,0.12))}
    60%{transform:scale(1) rotate(0deg) translateY(5px);filter:drop-shadow(0 14px 40px rgba(0,0,0,0.35))}
    100%{transform:scale(1) rotate(0deg) translateY(4px);filter:drop-shadow(0 12px 35px rgba(0,0,0,0.30))}
  }

  /* Brand name */
  .brand-name{
    font-family:'Inter',sans-serif;
    font-size:clamp(18px,5vw,42px);
    font-weight:700;text-transform:uppercase;
    color:var(--cream);margin-bottom:2%;
    opacity:0;letter-spacing:-0.3em;
    animation:nameReveal 1s cubic-bezier(.22,1,.36,1) 3s forwards;
  }
  @keyframes nameReveal{
    0%{opacity:0;letter-spacing:-0.3em;transform:translateY(10px)}
    50%{opacity:1;letter-spacing:0.5em;transform:translateY(0)}
    100%{opacity:1;letter-spacing:0.35em;transform:translateY(0)}
  }

  /* Taglines */
  .tagline-en{
    font-family:'Inter',sans-serif;
    font-size:clamp(9px,2.2vw,13px);font-weight:300;
    letter-spacing:0.25em;text-transform:uppercase;
    color:var(--gold);margin-bottom:1.5%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 3.6s forwards;
  }
  .tagline-ar{
    font-family:'Almarai',sans-serif;
    font-size:clamp(11px,2.8vw,16px);font-weight:400;
    letter-spacing:0.05em;color:rgba(212,165,116,0.7);
    direction:rtl;margin-bottom:5%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 3.9s forwards;
  }
  @keyframes slideUp{to{opacity:1;transform:translateY(0)}}

  /* Divider */
  .divider{
    display:flex;align-items:center;gap:12px;margin-bottom:5%;
    opacity:0;animation:fadeIn 0.5s ease 4.2s forwards;
  }
  .div-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .div-diamond{width:6px;height:6px;background:var(--accent);transform:rotate(45deg);}
  @keyframes fadeIn{to{opacity:1}}

  /* URL */
  .url{
    font-family:'Inter',sans-serif;
    font-size:clamp(11px,3vw,18px);font-weight:600;
    letter-spacing:0.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:7%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 4.5s forwards;
  }

  /* Badges */
  .badges{
    display:flex;gap:min(6vw,6vh);
    opacity:0;transform:translateY(16px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 4.9s forwards;
  }
  .badge{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .badge-icon{
    width:min(12vw,12vh);height:min(12vw,12vh);border-radius:50%;
    border:1px solid rgba(212,165,116,0.18);
    background:rgba(44,74,92,0.4);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
  }
  .badge-icon svg{width:42%;height:42%;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .badge-label-en{
    font-family:'Inter',sans-serif;
    font-size:clamp(7px,1.6vw,9px);font-weight:500;letter-spacing:0.12em;
    text-transform:uppercase;color:rgba(250,245,239,0.5);text-align:center;line-height:1.5;
  }
  .badge-label-ar{
    font-family:'Almarai',sans-serif;
    font-size:clamp(7px,1.8vw,10px);font-weight:400;
    color:rgba(212,165,116,0.4);text-align:center;direction:rtl;line-height:1.4;margin-top:-2px;
  }

  /* Replay */
  .replay{
    position:absolute;bottom:1.5%;right:2%;z-index:60;
    background:transparent;border:1px solid rgba(212,165,116,0.12);
    color:rgba(212,165,116,0.3);font-family:'Inter',sans-serif;
    font-size:7px;letter-spacing:0.18em;text-transform:uppercase;
    padding:4px 8px;border-radius:2px;cursor:pointer;transition:all 0.3s;
    opacity:0;animation:fadeIn 0.4s ease 5.5s forwards;
  }
  .replay:hover{background:rgba(212,165,116,0.06);color:var(--gold);border-color:rgba(212,165,116,0.25);}
</style>
</head>
<body>

<div class="post">
  <div class="bg"></div>
  <div class="ambient"></div>

  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>

  <div class="spark"></div>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="content">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img class="logo-img" src="logo.png" alt="ORLO">
    </div>

    <div class="brand-name">Orlo Store</div>
    <div class="tagline-en">Quality Is A Click Away</div>
    <div class="tagline-ar">الجودة على بُعد نقرة</div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line"></div>
    </div>

    <div class="url">orlostore.com</div>

    <div class="badges">
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <div class="badge-label-en">Free Shipping</div>
        <div class="badge-label-ar">شحن مجاني</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V6l7-4z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div class="badge-label-en">Secure Payment</div>
        <div class="badge-label-ar">دفع آمن</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <div class="badge-label-en">Top Quality</div>
        <div class="badge-label-ar">جودة عالية</div>
      </div>
    </div>
  </div>

  <button class="replay" onclick="replay()">&#x21BA; Replay</button>
</div>

<script>
function replay(){
  document.querySelectorAll(
    '.spark,.ring,.logo-img,.logo-glow,.brand-name,.tagline-en,.tagline-ar,' +
    '.url,.divider,.badges,.corner,.ambient,.dot,.replay'
  ).forEach(function(el){
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='';
  });
}
</script>

</body>
</html>
