<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order — ORLO Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 700; color: #2c4a5c; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
        .status-icon { font-size: 56px; margin-bottom: 16px; }
        .status-label {
            font-size: 20px; font-weight: 700; margin-bottom: 6px;
        }
        .status-date { font-size: 13px; color: #888; margin-bottom: 24px; }
        .awb-number { font-size: 13px; color: #aaa; margin-bottom: 24px; font-family: monospace; }
        .info-box {
            background: #f0f7ff;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }
        .info-box p { font-size: 13px; color: #555; margin-bottom: 4px; }
        .info-box .ar { direction: rtl; text-align: right; font-family: 'Almarai', sans-serif; color: #888; }
        .loading { color: #888; font-size: 15px; }
        .error { color: #d32f2f; font-size: 14px; }
        .back-link { display: inline-block; margin-top: 20px; color: #2c4a5c; text-decoration: none; font-size: 13px; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }

        .status-pending { color: #e67e22; }
        .status-transit { color: #0077b6; }
        .status-delivered { color: #28a745; }
        .status-failed { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">ORLO</div>
        <div class="subtitle">Shipment Tracking | تتبع الشحنة</div>

        <div id="content">
            <div class="loading">Loading tracking info...</div>
        </div>

        <a href="/" class="back-link">← Back to ORLO Store</a>
    </div>

    <script>
        const STATUS_MAP = {
            'softdata_upload': { icon: '📦', label: 'Order Received', labelAr: 'تم استلام الطلب', cls: 'status-pending' },
            'pickup_awaited': { icon: '📦', label: 'Awaiting Pickup', labelAr: 'بانتظار الاستلام', cls: 'status-pending' },
            'picked_up': { icon: '🚛', label: 'Picked Up', labelAr: 'تم الاستلام', cls: 'status-transit' },
            'in_transit': { icon: '🚚', label: 'In Transit', labelAr: 'في الطريق', cls: 'status-transit' },
            'out_for_delivery': { icon: '🛵', label: 'Out for Delivery', labelAr: 'خرج للتوصيل', cls: 'status-transit' },
            'delivered': { icon: '✅', label: 'Delivered', labelAr: 'تم التوصيل', cls: 'status-delivered' },
            'returned': { icon: '↩️', label: 'Returned', labelAr: 'تم الإرجاع', cls: 'status-failed' },
            'failed': { icon: '❌', label: 'Delivery Failed', labelAr: 'فشل التوصيل', cls: 'status-failed' },
        };

        async function loadTracking() {
            const params = new URLSearchParams(window.location.search);
            const awb = params.get('awb');
            const el = document.getElementById('content');

            if (!awb) {
                el.innerHTML = '<div class="error">No tracking number provided.</div>';
                return;
            }

            try {
                const res = await fetch(`/api/track?awb=${encodeURIComponent(awb)}`);
                const data = await res.json();

                if (!res.ok || !data.success) {
                    el.innerHTML = `<div class="error">${data.error || 'Shipment not found'}</div>`;
                    return;
                }

                const statusKey = (data.status || '').toLowerCase().replace(/\s+/g, '_');
                const mapped = STATUS_MAP[statusKey] || { icon: '📦', label: data.status || 'Processing', labelAr: 'قيد المعالجة', cls: 'status-pending' };

                let dateStr = '';
                if (data.status_date) {
                    try {
                        dateStr = new Date(data.status_date).toLocaleString('en-AE', { dateStyle: 'medium', timeStyle: 'short' });
                    } catch { dateStr = data.status_date; }
                }

                el.innerHTML = `
                    <div class="status-icon">${mapped.icon}</div>
                    <div class="status-label ${mapped.cls}">${mapped.label}</div>
                    <div class="status-label ${mapped.cls}" style="font-size:16px;font-family:'Almarai',sans-serif;margin-bottom:8px;">${mapped.labelAr}</div>
                    ${dateStr ? `<div class="status-date">Updated: ${dateStr}</div>` : ''}
                    <div class="awb-number">AWB: ${awb}</div>
                    <div class="info-box">
                        <p>Your shipment is being handled by <strong>Zajel</strong>.</p>
                        <p class="ar">يتم التعامل مع شحنتك عبر <strong>زاجل</strong>.</p>
                    </div>
                `;
            } catch (err) {
                el.innerHTML = '<div class="error">Unable to load tracking information. Please try again later.</div>';
            }
        }

        loadTracking();
    </script>
</body>
</html>
