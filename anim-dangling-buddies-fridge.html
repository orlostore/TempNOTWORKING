<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dangling Buddies – Fridge Animation</title>
<style>
/* ─── Reset & Canvas ─── */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:monospace}
.stage{position:relative;width:390px;height:690px;background:#0f0f23;border-radius:18px;overflow:hidden}

/* ─── Floor / Background ─── */
.kitchen-bg{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(0deg,#2a1f3d 0%,#1a1a2e 100%)}
.floor{position:absolute;bottom:0;left:0;right:0;height:40px;background:#3d2c5e}
.floor::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#5a3f8a}

/* ─── Fridge ─── */
.fridge{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:180px;height:340px}
.fridge-top{position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(135deg,#e8edf2 0%,#cdd5de 100%);border-radius:10px 10px 0 0;border:3px solid #b0bec5;border-bottom:2px solid #90a4ae}
.fridge-bottom{position:absolute;top:202px;left:0;width:100%;height:138px;background:linear-gradient(135deg,#dde3e9 0%,#c0cad4 100%);border-radius:0 0 10px 10px;border:3px solid #b0bec5;border-top:none}
.fridge-handle-top{position:absolute;top:70px;right:12px;width:6px;height:50px;background:#90a4ae;border-radius:3px}
.fridge-handle-bottom{position:absolute;top:230px;right:12px;width:6px;height:40px;background:#90a4ae;border-radius:3px}
.fridge-line{position:absolute;top:200px;left:3px;right:3px;height:2px;background:#90a4ae}

/* ─── Magnet landing spots on fridge ─── */
.magnet-spot{position:absolute;z-index:10}
.magnet-spot.spot-left{top:30px;left:20px}
.magnet-spot.spot-right{top:50px;right:30px}

/* ─── Pixel Buddy Base ─── */
.buddy{position:absolute;bottom:50px;z-index:20;image-rendering:pixelated;opacity:0}
.buddy.strawberry{left:-60px}
.buddy.mushroom{right:-60px}

/* ─── Pixel Art Characters (CSS pixel art) ─── */
.pixel-body{position:relative;display:flex;flex-direction:column;align-items:center}

/* ── Strawberry Body ── */
.strawberry .pixel-body{width:36px}
.strawberry .head{
  width:32px;height:28px;
  background:#ff4757;
  border-radius:6px 6px 14px 14px;
  position:relative;
  border:2px solid #c0392b;
}
.strawberry .head::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:16px;height:10px;
  background:#2ed573;
  border-radius:4px 4px 0 0;
  border:2px solid #1e8449;
  border-bottom:none;
}
/* seeds */
.strawberry .head::after{
  content:'';position:absolute;top:8px;left:8px;
  width:3px;height:3px;
  background:#ffd32a;
  border-radius:50%;
  box-shadow:10px 0 0 #ffd32a, 5px 8px 0 #ffd32a, -1px 12px 0 #ffd32a, 12px 10px 0 #ffd32a;
}
.strawberry .face{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:20px;height:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.strawberry .eye{width:5px;height:5px;background:#1a1a2e;border-radius:50%}
.strawberry .mouth{
  position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:8px;height:4px;
  border-bottom:2px solid #1a1a2e;
  border-radius:0 0 4px 4px;
}

/* ── Mushroom Body ── */
.mushroom .pixel-body{width:36px}
.mushroom .cap{
  width:36px;height:20px;
  background:#ff6b6b;
  border-radius:18px 18px 4px 4px;
  position:relative;
  border:2px solid #c0392b;
}
.mushroom .cap::after{
  content:'';position:absolute;top:4px;left:6px;
  width:6px;height:6px;background:#fff;border-radius:50%;
  box-shadow:12px 2px 0 #fff, 6px 8px 0 4px #fff;
}
.mushroom .stem{
  width:18px;height:14px;
  background:#ffeaa7;
  border-radius:0 0 6px 6px;
  margin:0 auto;
  position:relative;
  border:2px solid #d4a017;
  border-top:none;
}
.mushroom .face{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);
  width:14px;height:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.mushroom .eye{width:4px;height:4px;background:#1a1a2e;border-radius:50%}
.mushroom .mouth{
  position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
  width:6px;height:3px;
  border-bottom:2px solid #1a1a2e;
  border-radius:0 0 3px 3px;
}

/* ── Dangling Legs (shared) ── */
.legs{
  display:flex;justify-content:center;gap:6px;
  margin-top:-1px;
}
.leg{
  width:5px;height:14px;
  background:#ffeaa7;
  border-radius:0 0 3px 3px;
  border:1.5px solid #d4a017;
  border-top:none;
  transform-origin:top center;
}
.shoe{
  width:8px;height:5px;
  background:#e74c3c;
  border-radius:0 0 3px 3px;
  margin-top:-1px;
  border:1.5px solid #c0392b;
  border-top:none;
}
.leg-group{display:flex;flex-direction:column;align-items:center;transform-origin:top center}

.strawberry .leg{background:#ffeaa7;border-color:#d4a017}
.strawberry .shoe{background:#2ed573;border-color:#1e8449}
.mushroom .leg{background:#ffeaa7;border-color:#d4a017}
.mushroom .shoe{background:#ff6b6b;border-color:#c0392b}

/* ─── ANIMATION: Strawberry enters from left ─── */
.buddy.strawberry{
  animation:
    strawberry-enter 0.8s 0.3s ease-out forwards,
    strawberry-hop 0.4s 1.1s ease-in-out,
    strawberry-jump 0.7s 1.8s cubic-bezier(0.2,0,0.3,1) forwards;
}
@keyframes strawberry-enter{
  0%{left:-60px;opacity:0;bottom:50px}
  30%{opacity:1}
  100%{left:80px;opacity:1;bottom:50px}
}
@keyframes strawberry-hop{
  0%,100%{bottom:50px;transform:scaleY(1)}
  15%{bottom:48px;transform:scaleY(0.85) scaleX(1.1)}
  50%{bottom:75px;transform:scaleY(1.1) scaleX(0.95)}
}
@keyframes strawberry-jump{
  0%{left:80px;bottom:50px;transform:scale(1) rotate(0deg)}
  30%{bottom:380px;left:100px;transform:scale(0.9) rotate(-10deg)}
  60%{bottom:360px;left:108px;transform:scale(0.85) rotate(5deg)}
  80%{bottom:355px;left:110px;transform:scale(0.82) rotate(-2deg)}
  100%{bottom:348px;left:112px;transform:scale(0.8) rotate(0deg)}
}

/* ─── ANIMATION: Mushroom enters from right ─── */
.buddy.mushroom{
  animation:
    mushroom-enter 0.8s 0.6s ease-out forwards,
    mushroom-hop 0.4s 1.4s ease-in-out,
    mushroom-jump 0.7s 2.2s cubic-bezier(0.2,0,0.3,1) forwards;
}
@keyframes mushroom-enter{
  0%{right:-60px;opacity:0;bottom:50px}
  30%{opacity:1}
  100%{right:80px;opacity:1;bottom:50px}
}
@keyframes mushroom-hop{
  0%,100%{bottom:50px;transform:scaleY(1)}
  15%{bottom:48px;transform:scaleY(0.85) scaleX(1.1)}
  50%{bottom:75px;transform:scaleY(1.1) scaleX(0.95)}
}
@keyframes mushroom-jump{
  0%{right:80px;bottom:50px;transform:scale(1) rotate(0deg)}
  30%{bottom:360px;right:95px;transform:scale(0.9) rotate(10deg)}
  60%{bottom:335px;right:100px;transform:scale(0.85) rotate(-5deg)}
  80%{bottom:328px;right:102px;transform:scale(0.82) rotate(2deg)}
  100%{bottom:320px;right:105px;transform:scale(0.8) rotate(0deg)}
}

/* ─── Leg swing while walking ─── */
.buddy.strawberry .leg-group.left{
  animation:leg-swing-walk 0.2s 0.3s ease-in-out 4 alternate;
}
.buddy.strawberry .leg-group.right{
  animation:leg-swing-walk 0.2s 0.4s ease-in-out 4 alternate;
}
.buddy.mushroom .leg-group.left{
  animation:leg-swing-walk 0.2s 0.6s ease-in-out 4 alternate;
}
.buddy.mushroom .leg-group.right{
  animation:leg-swing-walk 0.2s 0.7s ease-in-out 4 alternate;
}
@keyframes leg-swing-walk{
  0%{transform:rotate(20deg)}
  100%{transform:rotate(-20deg)}
}

/* ─── Leg dangle while jumping ─── */
.buddy.strawberry .leg-group.left{
  animation:
    leg-swing-walk 0.2s 0.3s ease-in-out 4 alternate,
    leg-dangle 0.35s 1.8s ease-in-out 3 alternate;
}
.buddy.strawberry .leg-group.right{
  animation:
    leg-swing-walk 0.2s 0.4s ease-in-out 4 alternate,
    leg-dangle 0.35s 1.9s ease-in-out 3 alternate;
}
.buddy.mushroom .leg-group.left{
  animation:
    leg-swing-walk 0.2s 0.6s ease-in-out 4 alternate,
    leg-dangle 0.35s 2.2s ease-in-out 3 alternate;
}
.buddy.mushroom .leg-group.right{
  animation:
    leg-swing-walk 0.2s 0.7s ease-in-out 4 alternate,
    leg-dangle 0.35s 2.3s ease-in-out 3 alternate;
}
@keyframes leg-dangle{
  0%{transform:rotate(25deg)}
  100%{transform:rotate(-25deg)}
}

/* ─── Idle dangle after sticking ─── */
.buddy.strawberry .leg-group{
  animation:
    leg-swing-walk 0.2s 0.3s ease-in-out 4 alternate,
    leg-dangle 0.35s 1.8s ease-in-out 3 alternate,
    idle-dangle 1.2s 3.2s ease-in-out infinite alternate;
}
.buddy.mushroom .leg-group{
  animation:
    leg-swing-walk 0.2s 0.6s ease-in-out 4 alternate,
    leg-dangle 0.35s 2.2s ease-in-out 3 alternate,
    idle-dangle 1.4s 3.6s ease-in-out infinite alternate;
}
@keyframes idle-dangle{
  0%{transform:rotate(8deg)}
  100%{transform:rotate(-8deg)}
}

/* ─── Magnetic snap effect ─── */
.snap-ring{
  position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,0.6);
  width:10px;height:10px;opacity:0;pointer-events:none;
}
.snap-ring.sr-strawberry{top:330px;left:120px}
.snap-ring.sr-mushroom{top:310px;right:112px}

.snap-ring.sr-strawberry{
  animation:snap-burst 0.4s 2.45s ease-out forwards;
}
.snap-ring.sr-mushroom{
  animation:snap-burst 0.4s 2.85s ease-out forwards;
}
@keyframes snap-burst{
  0%{transform:scale(0.5);opacity:0.9}
  100%{transform:scale(4);opacity:0}
}

/* ─── Sparkle stars on snap ─── */
.sparkle{position:absolute;font-size:10px;opacity:0;pointer-events:none;z-index:30}
.sparkle.sp1{top:320px;left:105px;animation:sparkle-pop 0.5s 2.5s ease-out forwards}
.sparkle.sp2{top:340px;left:140px;animation:sparkle-pop 0.5s 2.6s ease-out forwards}
.sparkle.sp3{top:300px;right:100px;animation:sparkle-pop 0.5s 2.9s ease-out forwards}
.sparkle.sp4{top:320px;right:130px;animation:sparkle-pop 0.5s 3.0s ease-out forwards}
@keyframes sparkle-pop{
  0%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:1;transform:scale(1.3) rotate(90deg)}
  100%{opacity:0;transform:scale(0.5) rotate(180deg) translateY(-15px)}
}

/* ─── Title text after stick ─── */
.title-text{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  text-align:center;opacity:0;z-index:30;
}
.title-text h1{
  font-size:18px;color:#fff;letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,107,107,0.5);
}
.title-text h2{
  font-size:11px;color:#90a4ae;margin-top:4px;font-weight:400;letter-spacing:1px;
}
.title-text{animation:title-in 0.6s 3.5s ease-out forwards}
@keyframes title-in{
  0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  100%{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ─── Price tag ─── */
.price-tag{
  position:absolute;bottom:160px;left:50%;transform:translateX(-50%) scale(0);
  background:#ff6b6b;color:#fff;padding:6px 16px;border-radius:20px;
  font-size:14px;font-weight:bold;letter-spacing:1px;z-index:30;
  box-shadow:0 4px 15px rgba(255,107,107,0.4);
  opacity:0;
}
.price-tag{animation:price-pop 0.5s 4.0s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
@keyframes price-pop{
  0%{opacity:0;transform:translateX(-50%) scale(0)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}
}

/* ─── Replay button ─── */
.replay-btn{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:none;border:1px solid #5a3f8a;color:#90a4ae;
  padding:6px 18px;border-radius:14px;font-size:11px;
  cursor:pointer;opacity:0;font-family:monospace;letter-spacing:1px;
  transition:all 0.2s;z-index:30;
}
.replay-btn:hover{background:#5a3f8a;color:#fff}
.replay-btn{animation:fade-in 0.4s 4.5s ease-out forwards}
@keyframes fade-in{0%{opacity:0}100%{opacity:1}}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- Kitchen background -->
  <div class="kitchen-bg"></div>
  <div class="floor"></div>

  <!-- Fridge -->
  <div class="fridge">
    <div class="fridge-top"></div>
    <div class="fridge-bottom"></div>
    <div class="fridge-handle-top"></div>
    <div class="fridge-handle-bottom"></div>
    <div class="fridge-line"></div>
  </div>

  <!-- Strawberry Buddy -->
  <div class="buddy strawberry" id="strawberry">
    <div class="pixel-body">
      <div class="head">
        <div class="face">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
      <div class="legs">
        <div class="leg-group left">
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
        <div class="leg-group right">
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mushroom Buddy -->
  <div class="buddy mushroom" id="mushroom">
    <div class="pixel-body">
      <div class="cap"></div>
      <div class="stem">
        <div class="face">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
      <div class="legs">
        <div class="leg-group left">
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
        <div class="leg-group right">
          <div class="leg"></div>
          <div class="shoe"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Snap effects -->
  <div class="snap-ring sr-strawberry"></div>
  <div class="snap-ring sr-mushroom"></div>

  <!-- Sparkles -->
  <div class="sparkle sp1">&#10022;</div>
  <div class="sparkle sp2">&#10022;</div>
  <div class="sparkle sp3">&#10022;</div>
  <div class="sparkle sp4">&#10022;</div>

  <!-- Title -->
  <div class="title-text">
    <h1>DANGLING BUDDIES</h1>
    <h2>Tiny Friends for Your Fridge</h2>
  </div>

  <!-- Price -->
  <div class="price-tag">16 AED each</div>

  <!-- Replay -->
  <button class="replay-btn" onclick="location.reload()">REPLAY &#x21bb;</button>

</div>

</body>
</html>
