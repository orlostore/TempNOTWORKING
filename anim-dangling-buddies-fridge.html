<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ORLO – Dangling Buddies Fridge Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Canvas ─── */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none}

.stage{position:relative;width:390px;height:690px;background:linear-gradient(180deg,#faf8f5 0%,#f0ebe4 40%,#e6ddd2 100%);border-radius:18px;overflow:hidden}

/* ─── Warm Kitchen Background ─── */
.wall-texture{position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 64px,rgba(44,74,92,0.015) 64px,rgba(44,74,92,0.015) 65px),
    repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(44,74,92,0.01) 32px,rgba(44,74,92,0.01) 33px);
}
.counter{position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(180deg,#8b7355 0%,#6d5a3f 100%);
  border-top:3px solid #a08665}
.counter::before{content:'';position:absolute;top:-8px;left:0;right:0;height:8px;
  background:linear-gradient(180deg,rgba(0,0,0,0.08),transparent)}

/* ─── Fridge ─── */
.fridge{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:200px;height:380px;z-index:1}

.fridge-body{position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 30%,#dee2e6 100%);
  border-radius:12px 12px 6px 6px;
  box-shadow:
    4px 0 12px rgba(44,74,92,0.08),
    -2px 0 8px rgba(44,74,92,0.04),
    0 4px 16px rgba(44,74,92,0.1);
  border:1px solid #ced4da;
}
/* Top door */
.fridge-door-top{position:absolute;top:4px;left:4px;right:4px;height:220px;
  background:linear-gradient(160deg,#ffffff 0%,#f1f3f5 50%,#e9ecef 100%);
  border-radius:10px 10px 2px 2px;
  border:1px solid #dee2e6;
}
/* Bottom door */
.fridge-door-bottom{position:absolute;top:230px;left:4px;right:4px;height:146px;
  background:linear-gradient(160deg,#ffffff 0%,#f1f3f5 50%,#e9ecef 100%);
  border-radius:2px 2px 8px 8px;
  border:1px solid #dee2e6;
}
/* Handles */
.fridge-handle{position:absolute;right:14px;width:5px;background:linear-gradient(90deg,#adb5bd,#ced4da,#adb5bd);
  border-radius:3px;box-shadow:1px 1px 3px rgba(0,0,0,0.1)}
.fridge-handle.top{top:80px;height:60px}
.fridge-handle.bottom{top:270px;height:45px}
/* Gap line */
.fridge-gap{position:absolute;top:226px;left:4px;right:4px;height:3px;
  background:linear-gradient(90deg,#adb5bd,#868e96,#adb5bd);
  border-radius:1px}
/* Shine reflection */
.fridge-shine{position:absolute;top:10px;left:10px;width:40px;height:80px;
  background:linear-gradient(160deg,rgba(255,255,255,0.6),transparent);
  border-radius:8px;pointer-events:none}

/* ─── Shadow under fridge ─── */
.fridge-shadow{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  width:210px;height:14px;background:radial-gradient(ellipse,rgba(44,74,92,0.15),transparent);
  border-radius:50%;z-index:0}

/* ─── Buddy Characters ─── */
.buddy{
  position:absolute;bottom:70px;z-index:20;
  opacity:0;
  filter:drop-shadow(0 3px 6px rgba(44,74,92,0.2));
  will-change:transform,left,right,bottom,opacity;
}
.buddy img{
  width:80px;height:auto;
  display:block;
  filter:drop-shadow(0 1px 2px rgba(44,74,92,0.1));
}
.buddy.strawberry{left:-90px}
.buddy.mushroom{right:-90px}

/* ─── Magnetic snap ring ─── */
.snap-ring{
  position:absolute;border-radius:50%;pointer-events:none;z-index:25;
  width:20px;height:20px;opacity:0;
  border:2px solid rgba(224,120,86,0.6);
  box-shadow:0 0 8px rgba(224,120,86,0.3);
}

/* ─── Sparkle ─── */
.sparkle{position:absolute;pointer-events:none;z-index:30;opacity:0;font-size:14px}

/* ─── ORLO Logo ─── */
.orlo-logo{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  width:60px;opacity:0;z-index:30;
  transition:all 0.6s ease-out 0.2s;
}
.orlo-logo.show{opacity:1}

/* ─── Title ─── */
.title-text{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  text-align:center;opacity:0;z-index:30;
  transition:all 0.6s ease-out;
}
.title-text.show{opacity:1;transform:translateX(-50%) translateY(0)}
.title-text h1{
  font-size:20px;color:#2c4a5c;letter-spacing:3px;font-weight:800;
  font-family:'Inter',sans-serif;
}
.title-text h2{
  font-size:12px;color:#e07856;margin-top:5px;font-weight:400;letter-spacing:1.5px;
  font-family:'Inter',sans-serif;
}
.title-text .title-ar{
  font-size:14px;color:#e07856;margin-top:6px;font-weight:600;
  font-family:'Almarai',sans-serif;direction:rtl;
}

/* ─── Price tag ─── */
.price-tag{
  position:absolute;bottom:140px;left:50%;
  transform:translateX(-50%) scale(0);
  background:#e07856;
  color:#fff;padding:8px 20px;border-radius:20px;
  font-size:15px;font-weight:700;letter-spacing:1px;z-index:30;
  font-family:'Inter',sans-serif;
  box-shadow:0 4px 15px rgba(224,120,86,0.4);
  opacity:0;transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
.price-tag.show{opacity:1;transform:translateX(-50%) scale(1)}

/* ─── Orlo badge ─── */
.orlo-badge{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  opacity:0;z-index:30;transition:all 0.5s ease-out 0.2s;
  font-size:11px;color:#e07856;letter-spacing:2px;font-weight:700;
  font-family:'Inter',sans-serif;
}
.orlo-badge.show{opacity:1}

/* ─── Replay ─── */
.replay-btn{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(224,120,86,0.08);border:1px solid rgba(224,120,86,0.2);
  color:#e07856;padding:7px 20px;border-radius:16px;font-size:11px;
  cursor:pointer;opacity:0;font-family:'Inter',sans-serif;letter-spacing:1px;font-weight:600;
  transition:all 0.3s;z-index:30;
}
.replay-btn:hover{background:rgba(224,120,86,0.15)}
.replay-btn:active{transform:translateX(-50%) scale(0.95)}
.replay-btn.show{opacity:1}

/* ─── Magnet emoji on fridge ─── */
.fridge-magnet-deco{
  position:absolute;font-size:12px;z-index:5;opacity:0.4;
}

/* ─── Floating dots ─── */
.dots{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.dot{
  position:absolute;border-radius:50%;
  background:rgba(224,120,86,0.12);
  animation:floatDot linear infinite;
}
@keyframes floatDot{
  0%{transform:translateY(100%) scale(0);opacity:0}
  10%{opacity:0.5}
  90%{opacity:0.5}
  100%{transform:translateY(-690px) scale(1);opacity:0}
}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="wall-texture"></div>
  <div class="counter"></div>
  <div class="dots" id="dots"></div>

  <!-- Fridge -->
  <div class="fridge-shadow"></div>
  <div class="fridge">
    <div class="fridge-body">
      <div class="fridge-door-top"></div>
      <div class="fridge-door-bottom"></div>
      <div class="fridge-handle top"></div>
      <div class="fridge-handle bottom"></div>
      <div class="fridge-gap"></div>
      <div class="fridge-shine"></div>
    </div>
    <!-- Small decorative magnets already on fridge -->
    <div class="fridge-magnet-deco" style="top:20px;left:25px">📝</div>
    <div class="fridge-magnet-deco" style="top:160px;left:50px;font-size:10px">❤️</div>
  </div>

  <!-- Strawberry Buddy -->
  <div class="buddy strawberry" id="buddyStrawberry">
    <img src="https://lh3.googleusercontent.com/d/1no16D1IhGLnZSJtryh4BGjr2lvoNYlQb" alt="Strawberry Dangling Buddy" crossorigin="anonymous">
  </div>

  <!-- Mushroom Buddy -->
  <div class="buddy mushroom" id="buddyMushroom">
    <img src="https://lh3.googleusercontent.com/d/1-oSW_5Fa15HRvKUTQyoBba9ki9XeDebk" alt="Mushroom Dangling Buddy" crossorigin="anonymous">
  </div>

  <!-- ORLO Logo -->
  <img src="logo.png" class="orlo-logo" id="orloLogo" alt="ORLO">

  <!-- Title -->
  <div class="title-text" id="title">
    <h1>DANGLING BUDDIES</h1>
    <h2>Tiny Friends for Your Fridge</h2>
    <div class="title-ar">أصدقاء صغار لثلاجتك</div>
  </div>

  <!-- Price -->
  <div class="price-tag" id="price">16 AED each · للحبة</div>

  <!-- Orlo -->
  <div class="orlo-badge" id="orloBadge">orlostore.com</div>

  <!-- Replay -->
  <button class="replay-btn" id="replayBtn" onclick="location.reload()">REPLAY ↻</button>
</div>

<script>
/* ─── Animation Engine ─── */
const $ = id => document.getElementById(id);

function anim(el, props, ms, ease='ease'){
  return new Promise(r=>{
    el.style.transition = `all ${ms}ms ${ease}`;
    requestAnimationFrame(()=>{
      Object.assign(el.style, props);
      setTimeout(r, ms);
    });
  });
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* Swing animation using JS for precise control */
function swing(el, angle, duration, count=Infinity){
  let start = null, running = true;
  function step(ts){
    if(!start) start=ts;
    const elapsed = ts - start;
    const cycle = (elapsed % duration) / duration;
    const rot = Math.sin(cycle * Math.PI * 2) * angle;
    el.style.transform = `rotate(${rot}deg)`;
    if(running && (count===Infinity || elapsed < duration*count)){
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
  return { stop(){ running=false; el.style.transform='rotate(0deg)'; }};
}

/* Bounce-walk effect */
function bounceWalk(el, angle, duration){
  let start = null, running = true;
  function step(ts){
    if(!start) start=ts;
    const elapsed = ts - start;
    const cycle = (elapsed % duration) / duration;
    const bounce = Math.abs(Math.sin(cycle * Math.PI * 3)) * 6;
    const tilt = Math.sin(cycle * Math.PI * 6) * angle;
    el.style.transform = `translateY(${-bounce}px) rotate(${tilt}deg)`;
    if(running) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  return { stop(){ running=false; el.style.transform='none'; }};
}

/* Magnetic snap burst */
function snapBurst(x, y){
  const ring = document.createElement('div');
  ring.className = 'snap-ring';
  Object.assign(ring.style,{left:x+'px',top:y+'px',opacity:'0.8'});
  $('stage').appendChild(ring);
  anim(ring, {transform:'scale(5)',opacity:'0'}, 500, 'ease-out').then(()=>ring.remove());
}

/* Sparkle pop */
function sparklePop(x, y, delay=0){
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.textContent = ['✦','✧','⭑','·'][Math.floor(Math.random()*4)];
  const ox = (Math.random()-0.5)*50;
  const oy = (Math.random()-0.5)*40;
  Object.assign(sp.style,{left:x+'px',top:y+'px',opacity:'0',fontSize:(10+Math.random()*10)+'px',
    color:['#e07856','#f4a261','#2c4a5c','#d4956b'][Math.floor(Math.random()*4)]});
  $('stage').appendChild(sp);
  setTimeout(()=>{
    anim(sp, {opacity:'1',transform:`translate(${ox}px,${oy}px) scale(1.3) rotate(${Math.random()*180}deg)`}, 300, 'ease-out')
    .then(()=>anim(sp, {opacity:'0',transform:`translate(${ox*1.5}px,${oy*1.5-20}px) scale(0.3)`}, 300))
    .then(()=>sp.remove());
  }, delay);
}

/* Create floating dots */
function createDots(){
  const c = document.getElementById('dots');
  for(let i=0;i<12;i++){
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.left = Math.random()*100+'%';
    d.style.animationDuration = (6+Math.random()*8)+'s';
    d.style.animationDelay = Math.random()*14+'s';
    const size = 2+Math.random()*4;
    d.style.width = size+'px';d.style.height = size+'px';
    c.appendChild(d);
  }
}

/* ─── Main Sequence ─── */
async function run(){
  const straw = $('buddyStrawberry');
  const mush  = $('buddyMushroom');

  // ── Phase 1: Strawberry walks in from left ──
  straw.style.transition = 'none';
  straw.style.opacity = '0';
  straw.style.left = '-90px';
  straw.style.bottom = '70px';
  await wait(300);

  // Fade in + walk to position
  const walkStraw = bounceWalk(straw, 5, 600);
  await anim(straw, {opacity:'1',left:'60px'}, 800, 'ease-out');
  walkStraw.stop();
  straw.style.transform = 'none';

  // ── Phase 2: Mushroom walks in from right ──
  await wait(100);
  mush.style.transition = 'none';
  mush.style.opacity = '0';
  mush.style.right = '-90px';
  mush.style.bottom = '70px';

  const walkMush = bounceWalk(mush, 5, 600);
  await anim(mush, {opacity:'1',right:'60px'}, 800, 'ease-out');
  walkMush.stop();
  mush.style.transform = 'none';

  // ── Phase 3: Both look at fridge (slight pause + tilt) ──
  await wait(200);
  await Promise.all([
    anim(straw, {transform:'rotate(5deg) translateY(-3px)'}, 300, 'ease-in-out'),
    anim(mush, {transform:'rotate(-5deg) translateY(-3px)'}, 300, 'ease-in-out'),
  ]);
  await wait(300);

  // ── Phase 4: Squat before jump ──
  await Promise.all([
    anim(straw, {transform:'scaleY(0.85) scaleX(1.1) translateY(4px)'}, 150, 'ease-in'),
    anim(mush, {transform:'scaleY(0.85) scaleX(1.1) translateY(4px)'}, 150, 'ease-in'),
  ]);

  // ── Phase 5: JUMP! Strawberry arcs to upper-left of fridge ──
  await Promise.all([
    anim(straw, {
      bottom:'360px', left:'105px',
      transform:'scale(0.7) rotate(-15deg)'
    }, 500, 'cubic-bezier(0.2,0,0.3,1)'),
    // Mushroom jumps slightly later
    (async ()=>{
      await wait(80);
      await anim(mush, {
        bottom:'330px', right:'95px',
        transform:'scale(0.7) rotate(12deg)'
      }, 480, 'cubic-bezier(0.2,0,0.3,1)');
    })()
  ]);

  // ── Phase 6: SNAP to fridge! ──
  // Strawberry settles
  await anim(straw, {
    bottom:'350px', left:'110px',
    transform:'scale(0.65) rotate(0deg)'
  }, 200, 'cubic-bezier(0.4,0,0.2,1)');

  // Snap effect for strawberry
  snapBurst(135, 310);
  for(let i=0;i<4;i++) sparklePop(120+Math.random()*40, 300+Math.random()*30, i*60);

  await wait(100);

  // Mushroom settles
  await anim(mush, {
    bottom:'310px', right:'100px',
    transform:'scale(0.65) rotate(0deg)'
  }, 200, 'cubic-bezier(0.4,0,0.2,1)');

  // Snap effect for mushroom
  snapBurst(235, 340);
  for(let i=0;i<4;i++) sparklePop(220+Math.random()*40, 330+Math.random()*30, i*60);

  // ── Phase 7: Idle swing (they're dangling on the fridge!) ──
  const idleStraw = swing(straw, 4, 2000);
  const idleMush  = swing(mush, 5, 2400);

  // ── Phase 8: Logo + Title + Price ──
  await wait(400);
  $('orloLogo').classList.add('show');

  await wait(300);
  $('title').classList.add('show');
  $('title').style.transform = 'translateX(-50%) translateY(-10px)';
  await wait(100);
  $('title').style.transform = 'translateX(-50%) translateY(0)';

  await wait(600);
  $('price').classList.add('show');

  await wait(400);
  $('orloBadge').classList.add('show');

  await wait(500);
  $('replayBtn').classList.add('show');
}

// ── Init ──
createDots();

// Start after images load
window.addEventListener('load', ()=>{
  setTimeout(run, 400);
});
</script>

</body>
</html>
