    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: scroll;
        }

        .arabic-text {
            font-family: 'Almarai', sans-serif;
            direction: rtl;
        }

        .auth-container {
            width: 100%;
            max-width: 820px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            min-height: 480px;
        }

        /* LEFT BRAND PANEL */
        .auth-brand {
            flex: 1;
            background: linear-gradient(135deg, #2c4a5c 0%, #1e3545 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        .auth-brand::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -40%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(224,120,86,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-brand::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-brand img {
            width: 120px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .auth-tagline {
            color: rgba(255,255,255,0.75);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .auth-tagline .ar {
            display: block;
            font-family: 'Almarai', sans-serif;
            font-size: 0.75rem;
            margin-top: 2px;
            opacity: 0.7;
        }

        .trust-badges {
            display: flex;
            gap: 28px;
            position: relative;
            z-index: 1;
        }

        .trust-item {
            text-align: center;
            color: rgba(255,255,255,0.8);
        }

        .trust-item .icon {
            margin-bottom: 6px;
        }
        .trust-item .icon svg {
            width: 1.6rem;
            height: 1.6rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .trust-item .en { font-size: 0.75rem; font-weight: 500; display: block; margin-bottom: 2px; }
        .trust-item .ar { font-size: 0.65rem; font-family: 'Almarai', sans-serif; opacity: 0.7; display: block; }

        /* RIGHT FORM PANEL */
        .auth-form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 16px 24px 0;
            transition: color 0.2s;
        }
        .back-link:hover { color: #2c4a5c; }
        .back-link svg {
            width: 1em;
            height: 1em;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .form-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px 28px;
        }

        .form-content h2 {
            color: #2c4a5c;
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .form-content .subtitle {
            color: #888;
            font-size: 0.85rem;
            font-family: 'Almarai', sans-serif;
            margin-bottom: 22px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 500;
            color: #2c4a5c;
            font-size: 0.85rem;
        }

        .form-group label .arabic-text {
            font-weight: 400;
            color: #888;
            font-size: 0.8rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: 'Inter', system-ui, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e07856;
            box-shadow: 0 0 0 3px rgba(224, 120, 86, 0.1);
        }

        .form-group input.error { border-color: #dc3545; }

        .form-error { color: #dc3545; font-size: 0.8rem; margin-top: 4px; display: none; }
        .form-error.show { display: block; }

        .password-input-wrap { position: relative; }
        .password-input-wrap input { padding-right: 42px; }
        .password-toggle {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 1rem; color: #888; padding: 4px; line-height: 1;
        }
        .password-toggle:hover { color: #2c4a5c; }
        .password-toggle svg {
            width: 1.1rem;
            height: 1.1rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
        }

        .password-strength {
            height: 0;
            background: transparent;
            border-radius: 2px;
            overflow: hidden;
            transition: height 0.3s;
        }
        .password-strength.visible {
            height: 3px;
            margin-top: 4px;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        .password-strength-bar.weak { width: 33%; background: #dc3545; }
        .password-strength-bar.medium { width: 66%; background: #ffc107; }
        .password-strength-bar.strong { width: 100%; background: #28a745; }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e07856 0%, #c96644 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(224, 120, 86, 0.3);
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224, 120, 86, 0.4); }
        .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .auth-btn .arabic-text { display: block; font-size: 0.8rem; margin-top: 2px; opacity: 0.9; }

        .auth-footer {
            text-align: center;
            padding: 14px 24px 20px;
            border-top: 1px solid #eee;
            color: #666; font-size: 0.85rem;
        }
        .auth-footer a { color: #e07856; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .alert { padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; font-size: 0.85rem; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* Inline SVG icon styling */
        .inline-icon {
            width: 1em;
            height: 1em;
            vertical-align: -0.15em;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: inline-block;
        }

        /* MOBILE - compressed to avoid scrolling */
        @media (max-width: 768px) {
            body { padding: 0; min-height: auto; background: white; }

            .auth-container {
                flex-direction: column;
                max-width: 100%;
                min-height: auto;
                border-radius: 0;
                box-shadow: none;
                overflow: visible;
            }

            /* Trust banner */
            .auth-brand {
                padding: 12px 20px;
                flex: none;
                border-radius: 14px;
                margin: 0 20px;
            }
            .trust-badges { gap: 20px; }
            .trust-item .icon { margin-bottom: 2px; }
            .trust-item .icon svg { width: 1.2rem; height: 1.2rem; }
            .trust-item .en { font-size: 0.68rem; margin-bottom: 1px; }
            .trust-item .ar { font-size: 0.62rem; }

            .auth-brand img { width: 80px; margin-bottom: 4px; }
            .auth-tagline { font-size: 0.72rem; margin-bottom: 10px; }
            .auth-tagline .ar { font-size: 0.65rem; }

            /* Back link */
            .back-link { padding: 10px 18px 0; font-size: 0.8rem; }

            /* Heading */
            .form-content {
                padding: 12px 20px;
            }
            .form-content h2 {
                font-size: 1.15rem;
                margin-bottom: 1px;
            }
            .form-content .subtitle {
                font-size: 0.78rem;
                margin-bottom: 12px;
            }

            /* Form fields - slightly tighter */
            .form-group {
                margin-bottom: 10px;
            }
            .form-group label {
                margin-bottom: 3px;
                font-size: 0.8rem;
            }
            .form-group label .arabic-text {
                font-size: 0.75rem;
            }
            .form-group input {
                padding: 8px 11px;
                font-size: 0.82rem;
            }
            .auth-btn {
                padding: 10px;
                font-size: 0.85rem;
            }
            .auth-btn .arabic-text {
                font-size: 0.75rem;
                margin-top: 1px;
            }

            /* Footer closer */
            .auth-footer {
                padding: 10px 18px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <script>
        const SVG_EYE_OPEN = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        const SVG_EYE_CLOSED = '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') { input.type = 'text'; btn.innerHTML = SVG_EYE_CLOSED; }
            else { input.type = 'password'; btn.innerHTML = SVG_EYE_OPEN; }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const bar = document.getElementById('passwordStrength');
            const wrap = bar.parentElement;
            bar.className = 'password-strength-bar';
            if (password.length === 0) { wrap.classList.remove('visible'); return; }
            wrap.classList.add('visible');
            if (password.length < 6) bar.classList.add('weak');
            else if (password.length < 10 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) bar.classList.add('medium');
            else bar.classList.add('strong');
        }

        function showAlert(message, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type}`;
            div.textContent = message;
            const box = document.getElementById('alertBox');
            box.innerHTML = '';
            box.appendChild(div);
        }

        function clearErrors() {
            document.querySelectorAll('.form-error').forEach(el => { el.classList.remove('show'); el.textContent = ''; });
            document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const error = document.getElementById(field + 'Error');
            input.classList.add('error');
            error.textContent = message;
            error.classList.add('show');
        }

        async function handleSignup(e) {
            e.preventDefault();
            clearErrors();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            let hasError = false;
            if (name.length < 2) { showError('name', 'Name is too short'); hasError = true; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email', 'Please enter a valid email'); hasError = true; }
            if (password.length < 8) { showError('password', 'Min 8 characters'); hasError = true; }
            if (password !== confirmPassword) { showError('confirmPassword', 'Passwords do not match'); hasError = true; }
            if (hasError) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Creating account...';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Account created! Check your email to verify.', 'success');
                    localStorage.setItem('orlo_token', data.token);
                    localStorage.setItem('orlo_customer', JSON.stringify(data.customer));
                    setTimeout(() => { window.location.href = 'verify-email.html?email=' + encodeURIComponent(email); }, 1500);
                } else {
                    showAlert(data.error || 'Failed to create account', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Create My Account <span class="arabic-text">إنشاء حسابي</span>';
                }
            } catch (error) {
                showAlert('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Create My Account <span class="arabic-text">إنشاء حسابي</span>';
            }
        }
    </script>

            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            flex: 1;
            position: relative;
        }
        .bottom-nav-item svg {
            width: 24px;
            height: 24px;
            stroke: #c0c8ce;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        .bottom-nav-item.active svg { stroke: #1a3a52; stroke-width: 2; }
        .bottom-nav-item .nav-label {
            font-size: 0.62rem;
            font-weight: 600;
            color: #c0c8ce;
            position: relative;
        }
        .bottom-nav-item.active .nav-label { color: #1a3a52; }
        .bottom-nav-item.active .nav-label::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 1.5px;
            background: #e07856;
            border-radius: 1px;
        }
        .bottom-cart-badge:empty,
        .cart-count:empty { display: none !important; }
        @media (max-width: 576px) {
            .mobile-bottom-nav {
                display: flex;
                justify-content: space-around;
            }
            body { padding-bottom: 80px !important; }
        }
    </style>

    <nav class="mobile-bottom-nav">
        <div class="bottom-nav-indicator" id="bottomNavIndicator"></div>
        <div class="bottom-nav-item" id="bottomHomeBtn" data-index="0" onclick="window.location.href=localStorage.getItem('lastProduct')||'index.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V14h6v7"/></svg>
            <span class="nav-label">Home</span>
        </div>
        <div class="bottom-nav-item active" id="bottomAccountBtn" data-index="1">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg>
            <span class="nav-label" id="bottomAccountLabel">Sign Up</span>
        </div>
        <div class="bottom-nav-item" id="bottomCartBtn" data-index="2" onclick="var lp=localStorage.getItem('lastProduct')||'index.html';window.location.href=lp+(lp.includes('?')?'&amp;':'?')+'openCart=true'">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a1 1 0 001 .61h9.72a1 1 0 00.98-.78L23 6H6"/></svg>
            <span class="bottom-cart-badge" id="bottomCartCount" style="display:none"></span>
            <span class="nav-label">Cart</span>
        </div>
        <div class="bottom-nav-item" id="bottomMenuBtn" data-index="3" onclick="toggleSignupMobileMenu()">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span class="nav-label">Menu</span>
        </div>
    </nav>

    <script>
    /** Populate all cart badges after full DOM is rendered **/
    (function(){
      try {
        var cartData = JSON.parse(localStorage.getItem('cart') || '[]');
        var totalCount = cartData.reduce(function(sum, item){ return sum + (item.quantity || 0); }, 0);
        ['bottomCartCount'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            if (totalCount > 0) {
              el.textContent = totalCount;
              el.style.display = 'flex';
            } else {
              el.textContent = '';
              el.style.display = 'none';
            }
          }
        });
      } catch(e) {}
    })();
    </script>
</body>
