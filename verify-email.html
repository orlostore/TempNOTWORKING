    function showAC(term){var dd=document.getElementById('searchAutocomplete');if(!dd||!term||term.length<1){if(dd){dd.classList.remove('active');dd.innerHTML='';}acIndex=-1;return;}if(typeof products==='undefined'||!products.length)return;var m=products.filter(function(p){return p.name.toLowerCase().indexOf(term)!==-1||(p.nameAr&&p.nameAr.indexOf(term)!==-1)||p.category.toLowerCase().indexOf(term)!==-1||(p.categoryAr&&p.categoryAr.indexOf(term)!==-1);}).slice(0,6);if(!m.length){dd.classList.remove('active');dd.innerHTML='';acIndex=-1;return;}var ar=isAr(term);dd.innerHTML=m.map(function(p,i){var img=p.image&&p.image.indexOf('http')===0?'<img src="'+p.image+'" alt="">':'';var dn=ar?(p.nameAr||p.name):p.name;return '<div class="autocomplete-item" data-index="'+i+'" data-slug="'+p.slug+'" data-name="'+dn+'"'+(ar?' dir="rtl"':'')+'>'+img+'<div class="autocomplete-item-info"><div class="autocomplete-item-name">'+(ar?'<span class="arabic-text">'+(p.nameAr||p.name)+'</span>':p.name)+'</div><div class="autocomplete-item-price">'+(ar?p.price+' د.إ':'AED '+p.price)+'</div></div></div>';}).join('');dd.classList.add('active');acIndex=-1;dd.querySelectorAll('.autocomplete-item').forEach(function(item){item.addEventListener('mousedown',function(e){e.preventDefault();searchInput.value=this.dataset.name;dd.classList.remove('active');doSearch();});});}
    function navAC(dir){var dd=document.getElementById('searchAutocomplete');if(!dd)return;var items=dd.querySelectorAll('.autocomplete-item');if(!items.length)return;items.forEach(function(it){it.classList.remove('active');});acIndex+=dir;if(acIndex<0)acIndex=items.length-1;if(acIndex>=items.length)acIndex=0;items[acIndex].classList.add('active');searchInput.value=items[acIndex].dataset.name;}
    if(searchBtn)searchBtn.addEventListener('click',doSearch);
    if(searchInput){searchInput.addEventListener('input',function(){showAC(this.value.toLowerCase().trim());});searchInput.addEventListener('keydown',function(e){if(e.key==='ArrowDown'){e.preventDefault();navAC(1);}else if(e.key==='ArrowUp'){e.preventDefault();navAC(-1);}else if(e.key==='Enter'){e.preventDefault();doSearch();}else if(e.key==='Escape'){var dd=document.getElementById('searchAutocomplete');if(dd)dd.classList.remove('active');}});}

    <div class="verify-box">
        <div class="verify-header">
            <h1>Email Verification</h1>
            <p>تأكيد البريد الإلكتروني</p>
        </div>
        <div class="verify-body" id="verifyBody">
            <div class="loading-spinner"></div>
            <p class="status-message">Verifying your email...</p>
            <p class="status-message-ar">جارٍ التحقق من بريدك الإلكتروني</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const emailParam = params.get('email');
        const body = document.getElementById('verifyBody');

        let resendCooldown = 0;
        let resendInterval = null;

        function maskEmail(email) {
            if (!email) return '';
            const [local, domain] = email.split('@');
            if (!domain) return email;
            if (local.length <= 2) return local[0] + '***@' + domain;
            return local[0] + local[1] + '***@' + domain;
        }

        function getEmailProvider(email) {
            if (!email) return null;
            const domain = email.split('@')[1];
            if (!domain) return null;
            const d = domain.toLowerCase();
            if (d === 'gmail.com' || d === 'googlemail.com') return 'gmail';
            if (d === 'outlook.com' || d === 'hotmail.com' || d === 'live.com') return 'outlook';
            if (d === 'yahoo.com' || d === 'ymail.com') return 'yahoo';
            return null;
        }

        function buildProviderLinks(email) {
            const provider = getEmailProvider(email);
            const links = [];

            // Always show the user's provider first, then the others
            const providers = {
                gmail: {
                    label: 'Gmail',
                    url: 'https://mail.google.com/mail/u/0/#inbox',
                    svg: '<svg viewBox="0 0 24 24" fill="none"><path d="M2 6l10 7 10-7" stroke="#EA4335" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="4" width="20" height="16" rx="2" stroke="#4285F4" stroke-width="1.5" fill="none"/></svg>'
                },
                outlook: {
                    label: 'Outlook',
                    url: 'https://outlook.live.com/mail/0/inbox',
                    svg: '<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#0078D4" stroke-width="1.5" fill="none"/><path d="M2 6l10 7 10-7" stroke="#0078D4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                },
                yahoo: {
                    label: 'Yahoo',
                    url: 'https://mail.yahoo.com/d/folders/1',
                    svg: '<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#6001D2" stroke-width="1.5" fill="none"/><path d="M2 6l10 7 10-7" stroke="#6001D2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                }
            };

            // Show the detected provider first
            if (provider && providers[provider]) {
                links.push(providers[provider]);
            }
            // Then show others
            for (const key of Object.keys(providers)) {
                if (key !== provider) links.push(providers[key]);
            }

            return links.map(p =>
                `<a href="${p.url}" target="_blank" rel="noopener" class="email-provider-link">${p.svg} ${p.label}</a>`
            ).join('');
        }

        function startResendCooldown(seconds) {
            resendCooldown = seconds;
            const btn = document.getElementById('resendBtn');
            const timer = document.getElementById('resendTimer');
            if (!btn) return;

            btn.disabled = true;
            if (timer) timer.textContent = `Resend available in ${resendCooldown}s`;

            resendInterval = setInterval(() => {
                resendCooldown--;
                if (timer) timer.textContent = `Resend available in ${resendCooldown}s`;
                if (resendCooldown <= 0) {
                    clearInterval(resendInterval);
                    btn.disabled = false;
                    if (timer) timer.textContent = '';
                }
            }, 1000);
        }

        async function resendVerification() {
            const btn = document.getElementById('resendBtn');
            const feedback = document.getElementById('resendFeedback');
            const authToken = localStorage.getItem('orlo_token') || sessionStorage.getItem('orlo_token');

            if (!authToken) {
                if (feedback) feedback.innerHTML = '<span style="color:#dc3545">Please log in first to resend.</span>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = await response.json();

                if (data.success) {
                    if (data.message === 'Email already verified') {
                        if (feedback) feedback.innerHTML = '<span class="resend-success">Your email is already verified!</span>';
                        setTimeout(() => { window.location.href = 'account.html'; }, 1500);
                    } else {
                        if (feedback) feedback.innerHTML = '<span class="resend-success">Verification email sent!</span>';
                        btn.textContent = 'Resend Email';
                        startResendCooldown(60);
                    }
                } else {
                    if (feedback) feedback.innerHTML = '<span style="color:#dc3545">' + (data.error || 'Failed to send. Try again.') + '</span>';
                    btn.textContent = 'Resend Email';
                    btn.disabled = false;
                }
            } catch (e) {
                if (feedback) feedback.innerHTML = '<span style="color:#dc3545">Connection error. Try again.</span>';
                btn.textContent = 'Resend Email';
                btn.disabled = false;
            }
        }

        function showCheckInbox() {
            const masked = maskEmail(emailParam);
            const providerLinks = buildProviderLinks(emailParam);

            body.innerHTML = `
                <div class="email-icon-wrap">
                    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                </div>
                <p class="status-message">Check Your Inbox</p>
                <p class="status-message-ar">تحقق من بريدك الوارد</p>
                <p class="status-detail">
                    We sent a verification link to<br>
                    <span class="email-highlight">${masked}</span>
                </p>
                <div class="email-providers">
                    ${providerLinks}
                </div>
                <div class="spam-hint">
                    Don't see it? Check your <strong>spam</strong> or <strong>junk</strong> folder.<br>
                    <span style="font-family:'Almarai',sans-serif;direction:rtl;display:inline-block;margin-top:4px;">لم تجده؟ تحقق من مجلد الرسائل غير المرغوب فيها</span>
                </div>
                <div class="resend-section">
                    <p class="resend-text">Didn't receive the email?</p>
                    <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend Email</button>
                    <div id="resendTimer" class="resend-timer"></div>
                    <div id="resendFeedback"></div>
                </div>
                <a href="account.html" class="skip-link">Continue to account | الذهاب للحساب</a>
            `;

            // Start the cooldown immediately (user just signed up, email was just sent)
            startResendCooldown(60);
        }

        async function verifyEmail() {
            try {
                const response = await fetch('/api/auth/verify?token=' + encodeURIComponent(token));
                const data = await response.json();

                if (data.success) {
                    if (data.already_verified) {
                        body.innerHTML = `
                            <div class="status-icon">\u2705</div>
                            <p class="status-message">Already Verified</p>
                            <p class="status-message-ar">تم التحقق مسبقاً</p>
                            <p class="status-detail">Your email is already verified. You're all set!</p>
                            <a href="account.html" class="btn btn-primary">Go to Account | الذهاب للحساب</a>
                        `;
                    } else {
                        let countdown = 5;
                        body.innerHTML = `
                            <div class="status-icon">\u2705</div>
                            <p class="status-message">Email Verified!</p>
                            <p class="status-message-ar">تم تأكيد بريدك الإلكتروني بنجاح</p>
                            <p class="status-detail">Your email has been verified successfully. Welcome to ORLO!</p>
                            <a href="account.html" class="btn btn-primary">Go to Account | الذهاب للحساب</a>
                            <p class="redirect-countdown" id="redirectCountdown">Redirecting in ${countdown}s...</p>
                        `;
                        const cdEl = document.getElementById('redirectCountdown');
                        const cdInterval = setInterval(() => {
                            countdown--;
                            if (cdEl) cdEl.textContent = 'Redirecting in ' + countdown + 's...';
                            if (countdown <= 0) {
                                clearInterval(cdInterval);
                                window.location.href = 'account.html';
                            }
                        }, 1000);
                    }
                } else {
                    body.innerHTML = `
                        <div class="status-icon">\u274C</div>
                        <p class="status-message">Verification Failed</p>
                        <p class="status-message-ar">فشل التحقق</p>
                        <p class="status-detail">${data.error || 'This link may have expired or is invalid.'}</p>
                        <div class="resend-section" style="border-top:none;margin-top:0;padding-top:0;">
                            <p class="resend-text">Need a new link?</p>
                            <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend Verification Email</button>
                            <div id="resendTimer" class="resend-timer"></div>
                            <div id="resendFeedback"></div>
                        </div>
                        <a href="account.html" class="btn btn-outline" style="margin-top:1rem;">Go to Account | الذهاب للحساب</a>
                    `;
                }
            } catch (error) {
                body.innerHTML = `
                    <div class="status-icon">\u26A0\uFE0F</div>
                    <p class="status-message">Connection Error</p>
                    <p class="status-message-ar">خطأ في الاتصال</p>
                    <p class="status-detail">Please check your connection and try again.</p>
                    <button class="btn btn-outline" onclick="location.reload()">Try Again | حاول مرة أخرى</button>
                `;
            }
        }

        // Route: token present → verify, email present → check inbox, neither → redirect
        if (token) {
            verifyEmail();
        } else if (emailParam) {
            showCheckInbox();
        } else {
            // No token and no email — check if user is logged in and needs to verify
            const authToken = localStorage.getItem('orlo_token') || sessionStorage.getItem('orlo_token');
            const customer = JSON.parse(localStorage.getItem('orlo_customer') || sessionStorage.getItem('orlo_customer') || 'null');
            if (authToken && customer && customer.email) {
                // Show check inbox with the user's email
                window.history.replaceState(null, '', '?email=' + encodeURIComponent(customer.email));
                body.innerHTML = '';
                const fakeParam = customer.email;
                const masked = maskEmail(fakeParam);
                const providerLinks = buildProviderLinks(fakeParam);
                body.innerHTML = `
                    <div class="email-icon-wrap">
                        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                    </div>
                    <p class="status-message">Verify Your Email</p>
                    <p class="status-message-ar">قم بتأكيد بريدك الإلكتروني</p>
                    <p class="status-detail">
                        A verification link was sent to<br>
                        <span class="email-highlight">${masked}</span>
                    </p>
                    <div class="email-providers">
                        ${providerLinks}
                    </div>
                    <div class="spam-hint">
                        Don't see it? Check your <strong>spam</strong> or <strong>junk</strong> folder.<br>
                        <span style="font-family:'Almarai',sans-serif;direction:rtl;display:inline-block;margin-top:4px;">لم تجده؟ تحقق من مجلد الرسائل غير المرغوب فيها</span>
                    </div>
                    <div class="resend-section">
                        <p class="resend-text">Didn't receive the email?</p>
                        <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend Email</button>
                        <div id="resendTimer" class="resend-timer"></div>
                        <div id="resendFeedback"></div>
                    </div>
                    <a href="account.html" class="skip-link">Continue to account | الذهاب للحساب</a>
                `;
            } else {
                // Not logged in and no params — show generic message
                body.innerHTML = `
                    <div class="status-icon">\u274C</div>
                    <p class="status-message">Invalid Link</p>
                    <p class="status-message-ar">رابط غير صالح</p>
                    <p class="status-detail">This verification link is invalid or has expired.</p>
                    <a href="login.html" class="btn btn-primary">Log In | تسجيل الدخول</a>
                `;
            }
        }
    </script>
</body>
</html>
