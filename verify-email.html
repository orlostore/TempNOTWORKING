        /* Primary navy CTA (Go to account / Sign in) */

<body>
    <nav class="verify-nav">
        <a href="/" class="verify-lockup">
            <img class="logo-img" src="logos/svg/Color%20logo%20-%20no%20background.svg" alt="ORLO">
            <span class="sep"></span>
            <span class="wordmark" aria-hidden="true">ORL<span>O</span></span>
        </a>
        <a href="/" class="back">← Back to Shop</a>
    </nav>

    <main id="verifyMain">
        <!-- Initial loading state; replaced by JS based on URL params -->
        <section class="verify-hero">
            <div class="hero-eyebrow">Verify Email</div>
            <h1>One<br><em>moment.</em></h1>
            <p>We're verifying your link — this will only take a second.</p>
            <p class="ar">لحظة من فضلك.</p>
            <p class="ar-tag">جارٍ التحقق من الرابط — لن يستغرق ذلك سوى ثانية.</p>
        </section>
        <section class="verify-body">
            <div class="status-spinner"></div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const emailParam = params.get('email');
        const main = document.getElementById('verifyMain');

        let resendCooldown = 0;
        let resendInterval = null;

        function maskEmail(email) {
            if (!email) return '';
            const parts = email.split('@');
            const local = parts[0];
            const domain = parts[1];
            if (!domain) return email;
            if (local.length <= 2) return local[0] + '***@' + domain;
            return local[0] + local[1] + '***@' + domain;
        }

        function startResendCooldown(seconds) {
            resendCooldown = seconds;
            const btn = document.getElementById('resendBtn');
            const timer = document.getElementById('resendTimer');
            if (!btn) return;
            btn.disabled = true;
            if (timer) timer.textContent = `Resend available in ${resendCooldown}s`;
            resendInterval = setInterval(() => {
                resendCooldown--;
                if (timer) timer.textContent = `Resend available in ${resendCooldown}s`;
                if (resendCooldown <= 0) {
                    clearInterval(resendInterval);
                    btn.disabled = false;
                    if (timer) timer.textContent = '';
                }
            }, 1000);
        }

        async function resendVerification() {
            const btn = document.getElementById('resendBtn');
            const feedback = document.getElementById('resendFeedback');
            const authToken = localStorage.getItem('orlo_token') || sessionStorage.getItem('orlo_token');

            if (!authToken) {
                if (feedback) feedback.innerHTML = '<span class="resend-error">Please sign in first to resend.</span>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending…';

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = await response.json();

                if (data.success) {
                    if (data.message === 'Email already verified') {
                        if (feedback) feedback.innerHTML = '<span class="resend-success">Your email is already verified.</span>';
                        setTimeout(() => { window.location.href = 'account.html'; }, 1500);
                    } else {
                        if (feedback) feedback.innerHTML = '<span class="resend-success">Verification email sent.</span>';
                        btn.innerHTML = 'Resend email<span class="ar">إعادة الإرسال</span>';
                        startResendCooldown(60);
                    }
                } else {
                    if (feedback) feedback.innerHTML = '<span class="resend-error">' + (data.error || 'Failed to send. Try again.') + '</span>';
                    btn.innerHTML = 'Resend email<span class="ar">إعادة الإرسال</span>';
                    btn.disabled = false;
                }
            } catch (e) {
                if (feedback) feedback.innerHTML = '<span class="resend-error">Connection error. Try again.</span>';
                btn.innerHTML = 'Resend email<span class="ar">إعادة الإرسال</span>';
                btn.disabled = false;
            }
        }

        const ICON_MAIL = '<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>';
        const ICON_CHECK = '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
        const ICON_X = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

        function renderCheckInbox(email) {
            const masked = maskEmail(email);
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Check<br><em>your inbox.</em></h1>
                    <p>We sent a verification link to your email — open it to finish setting up your account.</p>
                    <p class="ar">تحقق من بريدك.</p>
                    <p class="ar-tag">أرسلنا رابط التحقق إلى بريدك — افتحه لإتمام إنشاء حسابك.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon navy">${ICON_MAIL}</div>
                    <div class="email-display">
                        <div class="label">Sent to</div>
                        <div class="email">${masked}</div>
                    </div>
                    <div class="spam-hint">
                        Don't see it? Check your <strong>spam</strong> or <strong>junk</strong> folder.
                        <span class="ar">لم تجده؟ تحقق من مجلد الرسائل غير المرغوب فيها.</span>
                    </div>
                    <div class="resend">
                        <p class="question">Didn't receive the email?<span class="ar">لم تستلم البريد؟</span></p>
                        <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend email<span class="ar">إعادة الإرسال</span></button>
                        <div id="resendTimer" class="resend-timer"></div>
                        <div id="resendFeedback"></div>
                    </div>
                    <a href="account.html" class="skip-link">Continue to account →<span class="ar">المتابعة للحساب</span></a>
                </section>
            `;
            startResendCooldown(60);
        }

        function renderVerified() {
            let countdown = 5;
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Email<br><em>verified.</em></h1>
                    <p>Welcome to ORLO — your account is all set up.</p>
                    <p class="ar">تم التحقق.</p>
                    <p class="ar-tag">أهلاً بك في ORLO — حسابك جاهز للاستخدام.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon coral">${ICON_CHECK}</div>
                    <div class="status-message">
                        <h3>You're all set.</h3>
                        <p>Redirecting you to your account in a moment.</p>
                    </div>
                    <div class="btn-wrap">
                        <a href="account.html" class="btn-primary">Go to account<span class="ar">الذهاب للحساب</span></a>
                    </div>
                    <div class="redirect-countdown" id="redirectCountdown">Redirecting in ${countdown}s…</div>
                </section>
            `;
            const cdEl = document.getElementById('redirectCountdown');
            const cdInterval = setInterval(() => {
                countdown--;
                if (cdEl) cdEl.textContent = `Redirecting in ${countdown}s…`;
                if (countdown <= 0) {
                    clearInterval(cdInterval);
                    window.location.href = 'account.html';
                }
            }, 1000);
        }

        function renderAlreadyVerified() {
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Already<br><em>verified.</em></h1>
                    <p>Your email is verified — you're good to go.</p>
                    <p class="ar">تم التحقق مسبقاً.</p>
                    <p class="ar-tag">بريدك الإلكتروني مُؤكَّد بالفعل — كل شيء جاهز.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon coral">${ICON_CHECK}</div>
                    <div class="btn-wrap">
                        <a href="account.html" class="btn-primary">Go to account<span class="ar">الذهاب للحساب</span></a>
                    </div>
                </section>
            `;
        }

        function renderFailed(errorMsg) {
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Link<br><em>expired.</em></h1>
                    <p>This verification link may have expired or already been used.</p>
                    <p class="ar">انتهى الرابط.</p>
                    <p class="ar-tag">قد يكون رابط التحقق منتهي الصلاحية أو تم استخدامه من قبل.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon muted">${ICON_X}</div>
                    <div class="status-message">
                        <p>${errorMsg || 'Please request a new verification link to continue.'}</p>
                    </div>
                    <div class="resend">
                        <p class="question">Need a new link?<span class="ar">تحتاج رابطاً جديداً؟</span></p>
                        <button class="resend-btn" id="resendBtn" onclick="resendVerification()">Resend email<span class="ar">إعادة الإرسال</span></button>
                        <div id="resendTimer" class="resend-timer"></div>
                        <div id="resendFeedback"></div>
                    </div>
                    <a href="account.html" class="skip-link">Continue to account →<span class="ar">المتابعة للحساب</span></a>
                </section>
            `;
        }

        function renderInvalid() {
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Invalid<br><em>link.</em></h1>
                    <p>This verification link is invalid or has expired. Sign in to request a new one.</p>
                    <p class="ar">رابط غير صالح.</p>
                    <p class="ar-tag">رابط التحقق غير صالح أو انتهت صلاحيته. سجّل الدخول لطلب رابط جديد.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon muted">${ICON_X}</div>
                    <div class="btn-wrap">
                        <a href="login.html" class="btn-primary">Sign in<span class="ar">تسجيل الدخول</span></a>
                    </div>
                </section>
            `;
        }

        function renderConnectionError() {
            main.innerHTML = `
                <section class="verify-hero">
                    <div class="hero-eyebrow">Verify Email</div>
                    <h1>Couldn't<br><em>connect.</em></h1>
                    <p>Please check your connection and try again.</p>
                    <p class="ar">تعذّر الاتصال.</p>
                    <p class="ar-tag">يُرجى التحقق من اتصالك بالإنترنت ثم المحاولة مرة أخرى.</p>
                </section>
                <section class="verify-body">
                    <div class="status-icon muted">${ICON_X}</div>
                    <div class="btn-wrap">
                        <button class="btn-primary" onclick="location.reload()">Try again<span class="ar">حاول مرة أخرى</span></button>
                    </div>
                </section>
            `;
        }

        async function verifyEmail() {
            try {
                const response = await fetch('/api/auth/verify?token=' + encodeURIComponent(token));
                const data = await response.json();

                if (data.success) {
                    if (data.already_verified) {
                        renderAlreadyVerified();
                    } else {
                        renderVerified();
                    }
                } else {
                    renderFailed(data.error);
                }
            } catch (error) {
                renderConnectionError();
            }
        }

        // Route: token present → verify, email present → check inbox,
        // neither but logged in → check inbox with customer email,
        // otherwise → invalid link
        if (token) {
            verifyEmail();
        } else if (emailParam) {
            renderCheckInbox(emailParam);
        } else {
            const authToken = localStorage.getItem('orlo_token') || sessionStorage.getItem('orlo_token');
            const customer = JSON.parse(localStorage.getItem('orlo_customer') || sessionStorage.getItem('orlo_customer') || 'null');
            if (authToken && customer && customer.email) {
                window.history.replaceState(null, '', '?email=' + encodeURIComponent(customer.email));
                renderCheckInbox(customer.email);
            } else {
                renderInvalid();
            }
        }
    </script>

    <script>
    (function(){
      try {
        var cartData = JSON.parse(localStorage.getItem('cart') || '[]');
        var totalCount = cartData.reduce(function(sum, item){ return sum + (item.quantity || 0); }, 0);
        ['bottomCartCount'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            if (totalCount > 0) {
              el.textContent = totalCount;
              el.style.display = 'flex';
            } else {
              el.textContent = '';
              el.style.display = 'none';
            }
          }
        });
      } catch(e) {}
    })();
