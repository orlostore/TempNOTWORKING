<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLO – Product Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Format switcher */
.format-switcher {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; gap: 8px;
}
.format-switcher a {
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff; text-decoration: none;
  font-size: 13px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.2s;
}
.format-switcher a:hover, .format-switcher a.active {
  background: #e07856; border-color: #e07856;
}

.canvas {
  width: var(--canvas-w, 1080px);
  height: var(--canvas-h, 1920px);
  transform-origin: center center;
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
}

/* ── Scene 1: Logo Intro ── */
.scene-intro {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0;
  z-index: 10;
}

.scene-intro .logo-glow {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(224,120,86,0.3) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  animation: pulseGlow 2s ease-in-out infinite;
}

.scene-intro img {
  width: 140px; filter: brightness(10);
}

.scene-intro .tagline {
  margin-top: 40px;
  font-size: 38px; font-weight: 300;
  color: #fff; letter-spacing: 8px;
  text-transform: uppercase;
  opacity: 0;
}

/* ── Scene 2: Product Cards ── */
.scene-products {
  position: absolute; inset: 0;
  opacity: 0; z-index: 5;
}

.scene-products .bg-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
}

.product-slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.9);
  padding: 80px 60px;
}

.product-slide .product-image-wrap {
  width: var(--img-size, 680px); height: var(--img-size, 680px);
  border-radius: 40px;
  overflow: hidden;
  background: #1a1a1a;
  box-shadow: 0 40px 100px rgba(224,120,86,0.15), 0 0 0 1px rgba(255,255,255,0.05);
  position: relative;
}

.product-slide .product-image-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.product-slide .product-image-wrap .shine {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  transform: translateX(-100%);
}

.product-slide .product-info {
  margin-top: 60px; text-align: center;
  opacity: 0; transform: translateY(30px);
}

.product-slide .product-name {
  font-size: var(--name-size, 48px); font-weight: 700;
  color: #fff; line-height: 1.2;
  max-width: 700px;
}

.product-slide .product-price {
  margin-top: 16px;
  font-size: var(--price-size, 56px); font-weight: 800;
  color: #e07856;
}

.product-slide .product-price span {
  font-size: 32px; font-weight: 400;
  color: rgba(255,255,255,0.5);
  margin-left: 8px;
}

/* ── Scene 3: Outro ── */
.scene-outro {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; z-index: 10;
  background: linear-gradient(160deg, #0a0a0a 0%, #1a1a2e 100%);
}

.scene-outro .cta-text {
  font-size: var(--cta-size, 52px); font-weight: 800;
  color: #fff; text-align: center;
  line-height: 1.3; opacity: 0;
  transform: translateY(40px);
}

.scene-outro .cta-url {
  margin-top: 30px;
  font-size: 36px; font-weight: 600;
  color: #e07856; letter-spacing: 2px;
  opacity: 0; transform: translateY(20px);
}

.scene-outro .trust-badges {
  margin-top: 60px;
  display: flex; gap: 40px;
  opacity: 0;
}

.scene-outro .badge {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  color: rgba(255,255,255,0.7);
  font-size: 22px;
}

.scene-outro .badge .icon {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(224,120,86,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}

/* ── Top bar (persistent) ── */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 120px; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
}

.top-bar img { height: 40px; filter: brightness(10); }

/* ── Progress bar ── */
.progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 6px; z-index: 20;
  background: rgba(255,255,255,0.1);
}

.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, #e07856, #f4a261);
  width: 0%;
}

/* ── Floating particles ── */
.particles {
  position: absolute; inset: 0; z-index: 1;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: rgba(224,120,86,0.4);
  border-radius: 50%;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── Square format overrides ── */
.canvas.square {
  --canvas-w: 1080px;
  --canvas-h: 1080px;
  --img-size: 520px;
  --name-size: 40px;
  --price-size: 46px;
  --cta-size: 44px;
}

.canvas.square .product-slide { padding: 40px 50px; }
.canvas.square .product-slide .product-info { margin-top: 35px; }
.canvas.square .scene-intro .logo-glow { width: 180px; height: 180px; }
.canvas.square .scene-intro img { width: 110px; }
.canvas.square .scene-intro .tagline { font-size: 30px; margin-top: 30px; letter-spacing: 6px; }
.canvas.square .scene-outro .cta-url { font-size: 30px; }
.canvas.square .scene-outro .trust-badges { gap: 30px; margin-top: 40px; }
.canvas.square .scene-outro .badge { font-size: 18px; }
.canvas.square .scene-outro .badge .icon { width: 48px; height: 48px; font-size: 22px; }
.canvas.square .top-bar { height: 80px; }

/* Scale canvas to fit viewport - Reel (9:16) */
body.reel .canvas {
  --canvas-w: 1080px;
  --canvas-h: 1920px;
}
@media (max-aspect-ratio: 9/16) {
  body.reel .canvas { transform: scale(calc(100vw / 1080)); }
}
@media (min-aspect-ratio: 9/16) {
  body.reel .canvas { transform: scale(calc(100vh / 1920)); }
}

/* Scale canvas to fit viewport - Square (1:1) */
@media (max-aspect-ratio: 1/1) {
  body.square .canvas { transform: scale(calc(100vw / 1080)); }
}
@media (min-aspect-ratio: 1/1) {
  body.square .canvas { transform: scale(calc(100vh / 1080)); }
}
</style>
</head>
<body>

<!-- Format switcher (hidden during recording - click to switch) -->
<div class="format-switcher" id="formatSwitcher">
  <a href="?format=reel" id="btnReel">9:16 Reel</a>
  <a href="?format=square" id="btnSquare">1:1 Post</a>
</div>

<div class="canvas" id="canvas">
  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Top bar -->
  <div class="top-bar" id="topBar">
    <img src="logo.png" alt="ORLO">
  </div>

  <!-- Progress bar -->
  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

  <!-- Scene 1: Logo intro -->
  <div class="scene-intro" id="sceneIntro">
    <div class="logo-glow">
      <img src="logo.png" alt="ORLO">
    </div>
    <div class="tagline" id="tagline">Simplify Your Space</div>
  </div>

  <!-- Scene 2: Products -->
  <div class="scene-products" id="sceneProducts">
    <div class="bg-gradient"></div>
    <!-- Slides injected by JS -->
  </div>

  <!-- Scene 3: Outro -->
  <div class="scene-outro" id="sceneOutro">
    <div class="cta-text" id="ctaText">Shop Now<br>Free Delivery Across UAE</div>
    <div class="cta-url" id="ctaUrl">orlostore.com</div>
    <div class="trust-badges" id="trustBadges">
      <div class="badge"><div class="icon">🔒</div>Secure Payment</div>
      <div class="badge"><div class="icon">🚚</div>Free Delivery</div>
      <div class="badge"><div class="icon">💬</div>WhatsApp Support</div>
    </div>
  </div>
</div>

<script>
// ── Format detection ──
const params = new URLSearchParams(window.location.search);
const format = params.get('format') === 'square' ? 'square' : 'reel';

document.body.classList.add(format);
document.getElementById('canvas').classList.toggle('square', format === 'square');
document.getElementById('btn' + (format === 'square' ? 'Square' : 'Reel')).classList.add('active');

// Hide switcher after 3 seconds so it doesn't appear in recording
setTimeout(() => {
  document.getElementById('formatSwitcher').style.opacity = '0';
  document.getElementById('formatSwitcher').style.pointerEvents = 'none';
}, 3000);

// ── Config ──
const TOTAL_DURATION = 15000; // 15 seconds
const INTRO_DURATION = 3000;
const OUTRO_DURATION = 3500;
const MAX_PRODUCTS = 4;

// ── Particles ──
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    container.appendChild(p);
  }
}

// ── Animation helpers ──
function animate(el, props, duration, easing = 'ease') {
  return new Promise(resolve => {
    el.style.transition = `all ${duration}ms ${easing}`;
    requestAnimationFrame(() => {
      Object.assign(el.style, props);
      setTimeout(resolve, duration);
    });
  });
}

// ── Build product slides ──
function buildSlides(products) {
  const container = document.getElementById('sceneProducts');
  const selected = products.filter(p => p.featured || p.quantity > 0).slice(0, MAX_PRODUCTS);

  // If not enough featured, fill with any available
  if (selected.length < MAX_PRODUCTS) {
    for (const p of products) {
      if (selected.length >= MAX_PRODUCTS) break;
      if (!selected.includes(p) && p.quantity > 0) selected.push(p);
    }
  }

  selected.forEach((product, i) => {
    const slide = document.createElement('div');
    slide.className = 'product-slide';
    slide.id = 'slide' + i;

    const imgUrl = product.mainImage || product.image || (product.images && product.images[0]) || '';
    const price = product.price || 0;

    slide.innerHTML = `
      <div class="product-image-wrap">
        <img src="${imgUrl}" alt="${product.name || ''}" loading="eager">
        <div class="shine" id="shine${i}"></div>
      </div>
      <div class="product-info" id="info${i}">
        <div class="product-name">${product.name || ''}</div>
        <div class="product-price">${price} <span>AED</span></div>
      </div>
    `;
    container.appendChild(slide);
  });

  return selected.length;
}

// ── Main sequence ──
async function runAnimation(productCount) {
  const progress = document.getElementById('progressFill');
  const startTime = Date.now();

  // Progress bar
  const progressInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.min((elapsed / TOTAL_DURATION) * 100, 100);
    progress.style.width = pct + '%';
    progress.style.transition = 'width 100ms linear';
    if (pct >= 100) clearInterval(progressInterval);
  }, 100);

  // ── Scene 1: Intro (0 - 3s) ──
  const intro = document.getElementById('sceneIntro');
  const tagline = document.getElementById('tagline');

  await animate(intro, { opacity: '1' }, 600);
  await new Promise(r => setTimeout(r, 400));
  await animate(tagline, { opacity: '1' }, 800, 'ease-out');
  await new Promise(r => setTimeout(r, 1000));
  await animate(intro, { opacity: '0' }, 500);

  // ── Show top bar ──
  const topBar = document.getElementById('topBar');
  animate(topBar, { opacity: '1' }, 400);

  // ── Scene 2: Products ──
  const sceneProducts = document.getElementById('sceneProducts');
  await animate(sceneProducts, { opacity: '1' }, 300);

  const productTime = TOTAL_DURATION - INTRO_DURATION - OUTRO_DURATION;
  const perProduct = productTime / productCount;

  for (let i = 0; i < productCount; i++) {
    const slide = document.getElementById('slide' + i);
    const info = document.getElementById('info' + i);
    const shine = document.getElementById('shine' + i);

    // Enter
    slide.style.transition = 'all 500ms cubic-bezier(0.16, 1, 0.3, 1)';
    slide.style.opacity = '1';
    slide.style.transform = 'scale(1)';

    await new Promise(r => setTimeout(r, 300));

    // Info slide up
    info.style.transition = 'all 500ms cubic-bezier(0.16, 1, 0.3, 1)';
    info.style.opacity = '1';
    info.style.transform = 'translateY(0)';

    // Shine effect
    shine.style.animation = 'shimmer 800ms ease-in-out forwards';

    // Hold
    await new Promise(r => setTimeout(r, perProduct - 800));

    // Exit (except last one exits with scene)
    if (i < productCount - 1) {
      slide.style.transition = 'all 400ms ease-in';
      slide.style.opacity = '0';
      slide.style.transform = 'scale(1.05)';
      await new Promise(r => setTimeout(r, 400));
    }
  }

  // ── Scene 3: Outro ──
  await animate(sceneProducts, { opacity: '0' }, 400);

  const outro = document.getElementById('sceneOutro');
  const ctaText = document.getElementById('ctaText');
  const ctaUrl = document.getElementById('ctaUrl');
  const badges = document.getElementById('trustBadges');

  await animate(outro, { opacity: '1' }, 400);
  await animate(ctaText, { opacity: '1', transform: 'translateY(0)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await new Promise(r => setTimeout(r, 200));
  await animate(ctaUrl, { opacity: '1', transform: 'translateY(0)' }, 500, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await new Promise(r => setTimeout(r, 200));
  await animate(badges, { opacity: '1' }, 500);

  // Hold outro until end
  clearInterval(progressInterval);
  progress.style.width = '100%';
}

// ── Init ──
async function init() {
  createParticles();

  try {
    const res = await fetch('/api/products');
    const products = await res.json();

    if (Array.isArray(products) && products.length > 0) {
      const count = buildSlides(products);
      // Small delay to let images start loading
      await new Promise(r => setTimeout(r, 500));
      runAnimation(count);
    }
  } catch (e) {
    console.error('Could not load products:', e);
  }
}

init();
</script>
</body>
</html>
