    <style>

<body>

    <section class="login-form-section">
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div id="alertBox"></div>

            <div class="login-form-group">
                <label>Email <span class="arabic-text">البريد الإلكتروني</span></label>
                <input type="email" id="email" required placeholder="your@email.com">
                <div class="form-error" id="emailError"></div>
            </div>

            <div class="login-form-group">
                <label>Password <span class="arabic-text">كلمة المرور</span></label>
                <div class="password-input-wrap">
                    <input type="password" id="password" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Show password"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>

                    <input type="checkbox" id="remember"> Remember me <span class="arabic-text">تذكرني</span>
                </label>

            </div>

            </div>
        </form>
    </section>

    <script>
        const SVG_EYE_OPEN = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        const SVG_EYE_CLOSED = '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') { input.type = 'text'; btn.innerHTML = SVG_EYE_CLOSED; }
            else { input.type = 'password'; btn.innerHTML = SVG_EYE_OPEN; }
        }

        if (localStorage.getItem('orlo_token') || sessionStorage.getItem('orlo_token')) { window.location.href = 'account.html'; }

        function showAlert(message, type) {
            const div = document.createElement('div');
            div.className = `alert alert-${type}`;
            div.textContent = message;
            const box = document.getElementById('alertBox');
            box.innerHTML = '';
            box.appendChild(div);
        }

        function clearErrors() {
            document.querySelectorAll('.form-error').forEach(el => { el.classList.remove('show'); el.textContent = ''; });
            document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const error = document.getElementById(field + 'Error');
            input.classList.add('error');
            error.textContent = message;
            error.classList.add('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            let hasError = false;
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email', 'Please enter a valid email'); hasError = true; }
            if (password.length < 1) { showError('password', 'Please enter your password'); hasError = true; }
            if (hasError) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    localStorage.setItem('orlo_token', data.token);
                    localStorage.setItem('orlo_customer', JSON.stringify(data.customer));
                    const urlParams = new URLSearchParams(window.location.search);
                    let redirect = urlParams.get('redirect') || localStorage.getItem('lastProduct') || 'account.html';
                    try {
                        const rUrl = new URL(redirect, window.location.origin);
                        if (rUrl.origin !== window.location.origin) redirect = 'account.html';
                    } catch (e) { redirect = 'account.html'; }
                    setTimeout(() => { window.location.href = redirect; }, 1000);
                } else {
                    showAlert(data.error || 'Invalid email or password', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Sign in <span class="arabic-text">تسجيل الدخول</span>';
                }
            } catch (error) {
                showAlert('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign in <span class="arabic-text">تسجيل الدخول</span>';
            }
        }
    </script>

                document.body.appendChild(overlay);
                overlay.onclick = function(e) {
                    if (e.target === overlay) { overlay.classList.remove('active'); }
                };
            }
            overlay.classList.toggle('active');
        };

        function moveIndicator(index) {
            var indicator = document.getElementById('bottomNavIndicator');
            if (indicator) indicator.style.left = 'calc(' + (index * 25) + '% + 12.5% - 25px)';
        }
        var navItems = document.querySelectorAll('.mobile-bottom-nav .bottom-nav-item');
        navItems.forEach(function(item, i) {

        });
        moveIndicator(1);

        <div class="bottom-nav-item active" id="bottomAccountBtn" data-index="1">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg>
            <span class="nav-label" id="bottomAccountLabel">Login</span>
        </div>
        <div class="bottom-nav-item" id="bottomCartBtn" data-index="2" onclick="var lp=localStorage.getItem('lastProduct')||'index.html';window.location.href=lp+(lp.includes('?')?'&amp;':'?')+'openCart=true'">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a1 1 0 001 .61h9.72a1 1 0 00.98-.78L23 6H6"/></svg>
            <span class="bottom-cart-badge" id="bottomCartCount" style="display:none"></span>
            <span class="nav-label">Cart</span>
        </div>
        <div class="bottom-nav-item" id="bottomMenuBtn" data-index="3" onclick="toggleLoginMobileMenu()">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span class="nav-label">Menu</span>
        </div>
    </nav>

    <script>
    (function(){
      try {
        var cartData = JSON.parse(localStorage.getItem('cart') || '[]');
        var totalCount = cartData.reduce(function(sum, item){ return sum + (item.quantity || 0); }, 0);
        ['bottomCartCount'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            if (totalCount > 0) {
              el.textContent = totalCount;
              el.style.display = 'flex';
            } else {
              el.textContent = '';
              el.style.display = 'none';
            }
          }
        });
      } catch(e) {}
    })();
    </script>
</body>
