<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORLO – Product Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Instagram Story/Reel frame: 9:16 centered */
.frame {
  position: relative;
  width: 100vw; height: 100vh;
  max-width: 1080px;
  margin: 0 auto;
  overflow: hidden;
  background: #ffffff;
}
@media (min-aspect-ratio: 9/16) {
  .frame {
    width: calc(100vh * 9 / 16);
    height: 100vh;
  }
}

/* ═══════ TOP BAR ═══════ */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 50; padding: 5% 6% 0;
  display: flex; align-items: center; justify-content: space-between;
}
.top-logo {
  height: 6vh; max-height: 44px; width: auto;
  opacity: 0.9;
}
.top-counter {
  font-size: clamp(11px, 2.5vw, 14px); font-weight: 600;
  color: #2c4a5c; letter-spacing: 0.15em;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 0.6vh 3vw; border-radius: 50px;
  border: 1px solid rgba(44,74,92,0.08);
}

/* ═══════ PROGRESS PIPS ═══════ */
.pips {
  position: absolute; top: 12%; left: 6%; right: 6%;
  z-index: 50; display: flex; gap: 4px;
}
.pip {
  flex: 1; height: 3px; border-radius: 2px;
  background: rgba(44,74,92,0.12);
  overflow: hidden;
  transition: background 0.3s;
}
.pip .pip-fill {
  width: 0%; height: 100%; border-radius: 2px;
  background: #e07856;
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.pip.done .pip-fill { width: 100%; }
.pip.active .pip-fill { width: 100%; }

/* ═══════ SLIDES ═══════ */
.slides-track {
  position: absolute; inset: 0;
  display: flex;
  transition: transform 0.55s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
}
.slides-track.dragging { transition: none; }

.slide {
  flex: 0 0 100%; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  padding: 16% 7% 20%;
}

/* ─── Intro Slide ─── */
.slide-intro {
  background: #ffffff;
  gap: 3vh;
}
.intro-logo {
  width: 30%; max-width: 160px;
  animation: gentlePulse 3s ease-in-out infinite;
}
.intro-divider {
  width: 12%; height: 2px;
  background: linear-gradient(90deg, transparent, #e07856, transparent);
}
.intro-title {
  font-size: clamp(26px, 6.5vw, 48px); font-weight: 900;
  color: #2c4a5c; text-align: center; line-height: 1.2;
}
.intro-title span { color: #e07856; }
.intro-sub {
  font-size: clamp(13px, 3.2vw, 20px); font-weight: 300;
  color: #7a8f9c; letter-spacing: 0.3em; text-transform: uppercase;
  text-align: center;
}
.intro-sub-ar {
  font-size: clamp(15px, 3.5vw, 22px); font-weight: 400;
  color: #e07856; direction: rtl; font-family: 'Almarai', sans-serif;
  opacity: 0.8;
}
.intro-arrow-hint {
  position: absolute; bottom: 14%;
  display: flex; align-items: center; gap: 2vw;
  font-size: clamp(11px, 2.5vw, 14px); font-weight: 500;
  color: #b0bec5; letter-spacing: 0.1em;
  animation: hintBounce 2s ease-in-out infinite;
}
@keyframes hintBounce {
  0%, 100% { transform: translateX(0); opacity: 0.6; }
  50% { transform: translateX(8px); opacity: 1; }
}
@keyframes gentlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

/* ─── Product Slide ─── */
.slide-product {
  background: #ffffff;
  gap: 2.5vh;
  padding-top: 15%;
}
.product-image-wrap {
  position: relative;
  width: 62%; max-width: 380px;
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
}
.product-image-bg {
  position: absolute; inset: 8%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(224,120,86,0.06) 0%, transparent 70%);
}
.product-image-wrap img {
  position: relative; z-index: 2;
  width: 85%; height: 85%; object-fit: contain;
  filter: drop-shadow(0 15px 40px rgba(44,74,92,0.1));
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.product-image-wrap .emoji-product {
  font-size: clamp(80px, 20vw, 140px);
  position: relative; z-index: 2;
}
.slide.active .product-image-wrap img {
  animation: productEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes productEnter {
  from { opacity: 0; transform: scale(0.7) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.product-name {
  font-size: clamp(20px, 5vw, 34px); font-weight: 800;
  color: #2c4a5c; text-align: center;
  line-height: 1.25; max-width: 90%;
}
.product-desc {
  font-size: clamp(12px, 2.8vw, 16px); font-weight: 400;
  color: #8a9daa; text-align: center;
  max-width: 80%; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-price-row {
  display: flex; align-items: baseline; gap: 2.5vw;
  margin-top: 0.5vh;
}
.product-price {
  font-size: clamp(28px, 7vw, 48px); font-weight: 900;
  color: #e07856; line-height: 1;
}
.product-currency {
  font-size: clamp(14px, 3.2vw, 20px); font-weight: 500;
  color: #b0bec5;
}
.product-old-price {
  font-size: clamp(16px, 3.8vw, 22px); font-weight: 500;
  color: #c0c8cc; text-decoration: line-through;
}
.product-tag {
  display: inline-flex; align-items: center; gap: 1.5vw;
  background: rgba(224,120,86,0.08);
  border: 1px solid rgba(224,120,86,0.15);
  padding: 0.8vh 4vw; border-radius: 50px;
  font-size: clamp(10px, 2.4vw, 13px); font-weight: 600;
  color: #e07856; letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ─── CTA Slide ─── */
.slide-cta {
  background: #ffffff;
  gap: 3vh;
}
.cta-logo { width: 22%; max-width: 120px; }
.cta-headline {
  font-size: clamp(28px, 7vw, 50px); font-weight: 900;
  color: #2c4a5c; text-align: center; line-height: 1.15;
}
.cta-headline span { color: #e07856; }
.cta-headline-ar {
  font-size: clamp(20px, 5vw, 34px); font-weight: 700;
  color: rgba(44,74,92,0.5); direction: rtl;
  font-family: 'Almarai', sans-serif; text-align: center;
  margin-top: -1vh;
}
.cta-button {
  display: inline-flex; align-items: center; gap: 2vw;
  padding: 2vh 10vw; border-radius: 60px;
  background: #e07856; color: #fff;
  font-size: clamp(16px, 4vw, 24px); font-weight: 700;
  text-decoration: none; letter-spacing: 0.04em;
  box-shadow: 0 8px 30px rgba(224,120,86,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.cta-button:active { transform: scale(0.96); }
.cta-url {
  font-size: clamp(18px, 4.5vw, 28px); font-weight: 700;
  color: #e07856; letter-spacing: 0.1em;
  text-decoration: none;
}
.cta-badges {
  display: flex; gap: 6vw; margin-top: 1vh;
}
.cta-badge {
  display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
  font-size: clamp(9px, 2.2vw, 12px); color: #8a9daa; font-weight: 500;
  text-align: center;
}
.cta-badge-icon {
  width: 10vw; height: 10vw; max-width: 50px; max-height: 50px;
  border-radius: 50%;
  background: rgba(224,120,86,0.06);
  border: 1px solid rgba(224,120,86,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(18px, 4.5vw, 26px);
}

/* ═══════ NAVIGATION ARROWS ═══════ */
.nav-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 60; width: 11vw; height: 11vw;
  max-width: 56px; max-height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(44,74,92,0.08);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.3s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-arrow:active { transform: translateY(-50%) scale(0.9); }
.nav-arrow:hover { box-shadow: 0 6px 30px rgba(0,0,0,0.1); }
.nav-arrow.hidden { opacity: 0; pointer-events: none; }
.nav-left { left: 3%; }
.nav-right { right: 3%; }
.nav-arrow svg {
  width: 40%; height: 40%;
  stroke: #2c4a5c; stroke-width: 2.5; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}

/* ═══════ BOTTOM CTA BAR (on product slides) ═══════ */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 40;
  padding: 0 6% 5%;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
.bottom-bar.show { opacity: 1; pointer-events: auto; }
.shop-btn {
  display: inline-flex; align-items: center; gap: 2vw;
  padding: 1.5vh 8vw; border-radius: 50px;
  background: #2c4a5c; color: #fff;
  font-size: clamp(13px, 3.2vw, 18px); font-weight: 700;
  text-decoration: none; letter-spacing: 0.04em;
  box-shadow: 0 6px 25px rgba(44,74,92,0.25);
  transition: transform 0.15s;
}
.shop-btn:active { transform: scale(0.96); }

/* ═══════ LOADING ═══════ */
.loading-screen {
  position: absolute; inset: 0; z-index: 200;
  background: #ffffff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3vh;
  transition: opacity 0.5s;
}
.loading-screen.gone { opacity: 0; pointer-events: none; }
.loading-logo { width: 20%; max-width: 100px; opacity: 0.6; }
.loading-spinner {
  width: 8vw; height: 8vw; max-width: 36px; max-height: 36px;
  border: 2px solid rgba(224,120,86,0.15);
  border-top-color: #e07856;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: clamp(12px, 2.8vw, 15px); color: #b0bec5;
  font-weight: 400; letter-spacing: 0.1em;
}

/* ═══════ TRANSITIONS ═══════ */
.slide .product-name,
.slide .product-desc,
.slide .product-price-row,
.slide .product-tag {
  opacity: 0; transform: translateY(15px);
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.slide.active .product-name      { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
.slide.active .product-desc      { opacity: 1; transform: translateY(0); transition-delay: 0.25s; }
.slide.active .product-price-row { opacity: 1; transform: translateY(0); transition-delay: 0.35s; }
.slide.active .product-tag       { opacity: 1; transform: translateY(0); transition-delay: 0.45s; }
</style>
</head>
<body>

<div class="frame" id="frame">

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <img src="logo.png" class="loading-logo" alt="ORLO">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading products...</div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <img src="logo.png" class="top-logo" alt="ORLO">
    <div class="top-counter" id="counter">1 / 1</div>
  </div>

  <!-- Progress pips -->
  <div class="pips" id="pips"></div>

  <!-- Carousel track -->
  <div class="slides-track" id="track"></div>

  <!-- Navigation arrows -->
  <div class="nav-arrow nav-left hidden" id="navLeft" onclick="goTo(currentSlide - 1)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="nav-arrow nav-right" id="navRight" onclick="goTo(currentSlide + 1)">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </div>

  <!-- Bottom shop button (for product slides) -->
  <div class="bottom-bar" id="bottomBar">
    <a class="shop-btn" id="shopBtn" href="https://orlostore.com" target="_blank">
      Shop Now →
    </a>
  </div>

</div>

<script>
var currentSlide = 0;
var totalSlides = 0;
var products = [];
var track, pips;

// ── Fetch products ──
async function loadProducts() {
  var urls = ['/api/products', 'https://orlostore.com/api/products'];
  for (var i = 0; i < urls.length; i++) {
    try {
      var res = await fetch(urls[i]);
      if (res.ok) {
        var data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          products = data;
          buildShowcase();
          return;
        }
      }
    } catch(e) {}
  }
  // Try localStorage cache
  try {
    var cached = localStorage.getItem('orlo_products_cache');
    if (cached) {
      products = JSON.parse(cached);
      if (products.length > 0) { buildShowcase(); return; }
    }
  } catch(e) {}
  // Fallback
  document.getElementById('loadingScreen').innerHTML =
    '<div style="text-align:center;color:#999;padding:10%;font-size:clamp(14px,3.5vw,18px);line-height:1.6;">' +
    'Open <a href="https://orlostore.com" style="color:#e07856;font-weight:700;">orlostore.com</a> first to cache products,<br>then refresh this page.</div>';
}

function buildShowcase() {
  track = document.getElementById('track');
  pips = document.getElementById('pips');

  // Pick products: featured first, then fill up to 8
  var featured = products.filter(function(p) { return p.featured; });
  var items = featured.length >= 3 ? featured.slice(0, 8) : products.slice(0, 8);

  // Build slides: Intro + products + CTA
  var slides = [];

  // ── Intro slide ──
  slides.push(
    '<div class="slide slide-intro active">' +
      '<img src="logo.png" class="intro-logo" alt="ORLO">' +
      '<div class="intro-divider"></div>' +
      '<div class="intro-title">Organize Your<br><span>Space</span></div>' +
      '<div class="intro-sub">Premium Desk Essentials</div>' +
      '<div class="intro-sub-ar">أساسيات المكتب الفاخرة</div>' +
      '<div class="intro-arrow-hint">Swipe to explore →</div>' +
    '</div>'
  );

  // ── Product slides ──
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var isUrl = p.image && p.image.startsWith('http');
    var imgHtml = isUrl
      ? '<img src="' + p.image + '" alt="' + (p.name || '') + '" loading="eager">'
      : '<span class="emoji-product">' + (p.image || '📦') + '</span>';
    var price = p.salePrice || p.price;
    var oldPrice = p.salePrice && p.price > p.salePrice
      ? '<span class="product-old-price">' + p.price + '</span>' : '';
    var slug = p.slug || '';
    var url = slug ? 'https://orlostore.com/product.html?product=' + slug : 'https://orlostore.com';
    var tag = p.featured ? '<div class="product-tag">★ Best Seller</div>' : '';

    slides.push(
      '<div class="slide slide-product" data-url="' + url + '">' +
        '<div class="product-image-wrap">' +
          '<div class="product-image-bg"></div>' +
          imgHtml +
        '</div>' +
        '<div class="product-name">' + (p.name || 'Product') + '</div>' +
        '<div class="product-desc">' + (p.description || '') + '</div>' +
        '<div class="product-price-row">' +
          '<span class="product-price">' + price + '</span>' +
          '<span class="product-currency">AED</span>' +
          oldPrice +
        '</div>' +
        tag +
      '</div>'
    );
  }

  // ── CTA slide ──
  slides.push(
    '<div class="slide slide-cta">' +
      '<img src="logo.png" class="cta-logo" alt="ORLO">' +
      '<div class="cta-headline">Simplify Your<br><span>Workspace</span></div>' +
      '<div class="cta-headline-ar">بسّط مساحة عملك</div>' +
      '<a href="https://orlostore.com" target="_blank" class="cta-button">Shop Now</a>' +
      '<a href="https://orlostore.com" target="_blank" class="cta-url">orlostore.com</a>' +
      '<div class="cta-badges">' +
        '<div class="cta-badge"><div class="cta-badge-icon">🚚</div>Free Delivery<br>فوق 75 درهم</div>' +
        '<div class="cta-badge"><div class="cta-badge-icon">🇦🇪</div>UAE Store<br>متجر إماراتي</div>' +
        '<div class="cta-badge"><div class="cta-badge-icon">✅</div>Quality<br>جودة عالية</div>' +
      '</div>' +
    '</div>'
  );

  totalSlides = slides.length;
  track.innerHTML = slides.join('');

  // Build pips
  var pipHtml = '';
  for (var j = 0; j < totalSlides; j++) {
    var cls = j === 0 ? 'pip active' : (j < 0 ? 'pip done' : 'pip');
    pipHtml += '<div class="' + cls + '"><div class="pip-fill"></div></div>';
  }
  pips.innerHTML = pipHtml;

  // Update UI
  updateUI();

  // Hide loading
  setTimeout(function() {
    document.getElementById('loadingScreen').classList.add('gone');
  }, 300);
}

function goTo(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  currentSlide = idx;
  updateUI();
}

function updateUI() {
  // Move track
  track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';

  // Mark active slide
  var allSlides = track.querySelectorAll('.slide');
  for (var i = 0; i < allSlides.length; i++) {
    allSlides[i].classList.toggle('active', i === currentSlide);
  }

  // Pips
  var allPips = pips.querySelectorAll('.pip');
  for (var j = 0; j < allPips.length; j++) {
    allPips[j].className = j < currentSlide ? 'pip done' : (j === currentSlide ? 'pip active' : 'pip');
  }

  // Counter
  document.getElementById('counter').textContent = (currentSlide + 1) + ' / ' + totalSlides;

  // Arrows
  document.getElementById('navLeft').classList.toggle('hidden', currentSlide === 0);
  document.getElementById('navRight').classList.toggle('hidden', currentSlide === totalSlides - 1);

  // Bottom bar: show on product slides
  var isProductSlide = currentSlide > 0 && currentSlide < totalSlides - 1;
  document.getElementById('bottomBar').classList.toggle('show', isProductSlide);

  // Update shop button URL
  if (isProductSlide) {
    var activeSlide = allSlides[currentSlide];
    var url = activeSlide.getAttribute('data-url');
    if (url) document.getElementById('shopBtn').href = url;
  }
}

// ── Touch / Swipe ──
var touchStartX = 0, touchStartY = 0, touchDeltaX = 0, isSwiping = false;

document.getElementById('frame').addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDeltaX = 0;
  isSwiping = false;
  track.classList.add('dragging');
}, { passive: true });

document.getElementById('frame').addEventListener('touchmove', function(e) {
  var dx = e.touches[0].clientX - touchStartX;
  var dy = e.touches[0].clientY - touchStartY;

  // Determine swipe direction on first significant move
  if (!isSwiping && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    isSwiping = Math.abs(dx) > Math.abs(dy);
  }
  if (!isSwiping) return;

  e.preventDefault();
  touchDeltaX = dx;

  // Rubber-band at edges
  var offset = -currentSlide * 100;
  var pxToPercent = (touchDeltaX / window.innerWidth) * 100;
  if ((currentSlide === 0 && touchDeltaX > 0) || (currentSlide === totalSlides - 1 && touchDeltaX < 0)) {
    pxToPercent *= 0.3;
  }
  track.style.transform = 'translateX(' + (offset + pxToPercent) + '%)';
}, { passive: false });

document.getElementById('frame').addEventListener('touchend', function() {
  track.classList.remove('dragging');
  if (Math.abs(touchDeltaX) > 50) {
    if (touchDeltaX < -50) goTo(currentSlide + 1);
    else if (touchDeltaX > 50) goTo(currentSlide - 1);
    else updateUI();
  } else {
    updateUI();
  }
  touchDeltaX = 0;
}, { passive: true });

// ── Keyboard ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(currentSlide + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(currentSlide - 1); }
});

// ── Mouse drag (desktop) ──
var mouseDown = false, mouseStartX = 0, mouseDeltaX = 0;

document.getElementById('frame').addEventListener('mousedown', function(e) {
  mouseDown = true;
  mouseStartX = e.clientX;
  mouseDeltaX = 0;
  track.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  mouseDeltaX = e.clientX - mouseStartX;
  var offset = -currentSlide * 100;
  var pxToPercent = (mouseDeltaX / window.innerWidth) * 100;
  if ((currentSlide === 0 && mouseDeltaX > 0) || (currentSlide === totalSlides - 1 && mouseDeltaX < 0)) {
    pxToPercent *= 0.3;
  }
  track.style.transform = 'translateX(' + (offset + pxToPercent) + '%)';
});
document.addEventListener('mouseup', function() {
  if (!mouseDown) return;
  mouseDown = false;
  track.classList.remove('dragging');
  if (mouseDeltaX < -50) goTo(currentSlide + 1);
  else if (mouseDeltaX > 50) goTo(currentSlide - 1);
  else updateUI();
  mouseDeltaX = 0;
});

// ── Init ──
