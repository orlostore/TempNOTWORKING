<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORLO – Vintage Rotary Phone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #ffffff !important;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.canvas {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
  background: #ffffff;
}

/* ═══════════════════════════════════════════
   MODE SELECTOR
   ═══════════════════════════════════════════ */
.mode-select {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4vh; z-index: 100;
  background: #ffffff !important;
}
.mode-select.gone { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.mode-logo { width: 22vw; max-width: 130px; margin-bottom: 1vh; }
.mode-title {
  font-size: clamp(14px, 3vw, 22px); font-weight: 300;
  color: #2c4a5c; letter-spacing: 0.4em; text-transform: uppercase;
}
.mode-subtitle {
  font-size: clamp(22px, 5.5vw, 36px); font-weight: 800;
  color: #2c4a5c; text-align: center; line-height: 1.3; margin-top: -1vh;
}
.mode-subtitle span { color: #e07856; }
.mode-btns { display: flex; flex-direction: column; gap: 2.5vh; margin-top: 2vh; }
.mode-btn {
  width: 72vw; max-width: 340px; padding: 3.5vh 0;
  border-radius: 2.5vw; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 4.2vw, 24px); font-weight: 700;
  letter-spacing: 0.05em; color: #fff;
  transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3vw;
}
.mode-btn:active { transform: scale(0.95); }
.btn-tiktok {
  background: linear-gradient(135deg, #010101 0%, #1a1a1a 100%);
  border: 2px solid #333;
}
.btn-insta {
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  box-shadow: 0 4px 30px rgba(225,48,108,0.25);
}
.btn-icon { font-size: clamp(22px, 5vw, 30px); }

.scene {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  will-change: opacity, transform;
}

/* ─── Scene 1: Close-up Push ─── */
.scene-closeup { background: #ffffff !important; }
.closeup-stage {
  position: relative;
  width: 80vw; height: 80vw; max-width: 480px; max-height: 480px;
}
.closeup-img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
  opacity: 0; transform: scale(1.15);
}
@keyframes closeupPush {
  0%   { opacity: 0; transform: scale(1.15); }
  30%  { opacity: 1; }
  100% { opacity: 1; transform: scale(1.35); }
}
.closeup-img.push {
  animation: closeupPush 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}
.closeup-text {
  position: absolute; bottom: 12vh;
  font-size: clamp(16px, 4vw, 26px); font-weight: 300;
  color: #2c4a5c; text-align: center;
  letter-spacing: 0.05em; line-height: 1.5;
  opacity: 0; transform: translateY(15px);
  text-shadow: 0 1px 8px rgba(255,255,255,0.8);
}

/* ─── Scene 2: Styled on Desk ─── */
.scene-desk { background: #ffffff !important; }
.desk-frame {
  width: 88vw; max-width: 440px;
  height: 55vh; max-height: 600px;
  border-radius: 4vw;
  overflow: hidden;
  box-shadow: 0 15px 50px rgba(44,74,92,0.12), 0 0 0 1px rgba(44,74,92,0.06);
  opacity: 0; transform: scale(0.88);
}
.desk-frame img { width: 100%; height: 100%; object-fit: cover; }
@keyframes deskPan {
  0%   { transform: scale(1) translateX(0); }
  100% { transform: scale(1.05) translateX(-3%); }
}
.desk-frame img.pan {
  animation: deskPan 5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}
.desk-label {
  margin-top: 4vh; text-align: center;
  opacity: 0; transform: translateY(15px);
}
.desk-en {
  font-size: clamp(20px, 5vw, 32px); font-weight: 700; color: #2c4a5c;
}
.desk-en span { color: #e07856; font-weight: 800; }
.desk-ar {
  font-size: clamp(14px, 3.2vw, 20px); font-weight: 500; color: #e07856;
  direction: rtl; margin-top: 0.5vh; font-family: 'Almarai', sans-serif;
}

/* ─── Scene 3: Logo Outro ─── */
.scene-outro { background: #f5f5f5 !important; gap: 3vh; }
.outro-logo { width: 18vw; max-width: 100px; opacity: 0; transform: scale(0.7); }
.outro-url {
  font-size: clamp(24px, 6vw, 40px); font-weight: 800;
  color: #2c4a5c; letter-spacing: 0.06em;
  opacity: 0; transform: translateY(15px);
}

/* ─── Progress Bar ─── */
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 4px; width: 0%;
  background: linear-gradient(90deg, #e07856, #f4a261);
  z-index: 50;
}

/* ─── Floating Dots ─── */
.dots { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.dot {
  position: absolute; border-radius: 50%;
  background: rgba(224,120,86,0.15);
  animation: floatDot linear infinite;
}
@keyframes floatDot {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

</style>
</head>
<body>

<div class="canvas" id="canvas">
  <div class="progress-bar" id="progressBar"></div>
  <div class="dots" id="dots"></div>

  <!-- ── Mode Selector ── -->
  <div class="mode-select" id="modeSelect">
    <img src="logo.png" class="mode-logo" alt="ORLO">
    <div class="mode-title">Promo Reel</div>
    <div class="mode-subtitle">Vintage Rotary <span>Phone</span></div>
    <div class="mode-btns">
      <button class="mode-btn btn-tiktok" onclick="startPromo('tiktok')">
        <span class="btn-icon">♪</span> TikTok
      </button>
      <button class="mode-btn btn-insta" onclick="startPromo('insta')">
        <span class="btn-icon">◎</span> Instagram
      </button>
    </div>
  </div>

  <!-- Scene 1: Slow close-up push into the rotary dial -->
  <div class="scene scene-closeup" id="scene1">
    <div class="closeup-stage">
      <img class="closeup-img" id="closeupImg1" src="https://lh3.googleusercontent.com/d/1E_bPakA_j4RsyxDb3aXW_Nvu2yQUUYzq" alt="Antique Red & Gold">
      <img class="closeup-img" id="closeupImg2" src="https://lh3.googleusercontent.com/d/1p73ZJtsihz1IQlBoKDwaxWqnAnNrp7nE" alt="Classic Green & Silver" style="position:absolute;inset:0;">
    </div>
    <div class="closeup-text" id="closeupText">They don't make things<br>like this anymore...</div>
  </div>

  <!-- Scene 2: Styled on a desk, warm light, slow pan -->
  <div class="scene scene-desk" id="scene2">
    <div class="desk-frame" id="deskFrame">
      <img id="deskImg" src="https://lh3.googleusercontent.com/d/1AgOeq9HOr_tU3iZQGqVIMs4yM600FWyn" alt="Vintage Rotary Phone">
    </div>
    <div class="desk-label" id="deskLabel">
      <div class="desk-en">Hand-painted. <span>AED 32.</span></div>
      <div class="desk-ar">مطلي يدوياً. ٣٢ درهم.</div>
    </div>
  </div>

  <!-- Scene 3: ORLO logo on grey -->
  <div class="scene scene-outro" id="scene3">
    <img src="logo.png" class="outro-logo" id="outroLogo" alt="ORLO">
    <div class="outro-url" id="outroUrl">orlostore.com</div>
  </div>
</div>

<script>

function anim(el, props, ms, ease) {
  ease = ease || 'ease';
  return new Promise(function(resolve) {
    el.style.transition = 'all ' + ms + 'ms ' + ease;
    requestAnimationFrame(function() {
      Object.assign(el.style, props);
      setTimeout(resolve, ms);
    });
  });
}
function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function createDots() {
  var c = document.getElementById('dots');
  for (var i = 0; i < 20; i++) {
    var d = document.createElement('div');
    d.className = 'dot';
    d.style.left = Math.random() * 100 + '%';
    d.style.animationDuration = (5 + Math.random() * 7) + 's';
    d.style.animationDelay = Math.random() * 12 + 's';
    var size = 3 + Math.random() * 5;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    c.appendChild(d);
  }
}

var T = {
  tiktok: { closeup: 4000, desk: 5000, outro: 3000 },
  insta:  { closeup: 4000, desk: 5000, outro: 3000 }
};

// Preload images
(function() {
  var urls = [
    'https://lh3.googleusercontent.com/d/1E_bPakA_j4RsyxDb3aXW_Nvu2yQUUYzq',
    'https://lh3.googleusercontent.com/d/1p73ZJtsihz1IQlBoKDwaxWqnAnNrp7nE',
    'https://lh3.googleusercontent.com/d/1AgOeq9HOr_tU3iZQGqVIMs4yM600FWyn'
  ];
  urls.forEach(function(u) { var img = new Image(); img.src = u; });
})();

// ═══════════════════════════════════════════
// MAIN ANIMATION
// ═══════════════════════════════════════════
async function startPromo(mode) {
  var t = T[mode];
  var totalDuration = t.closeup + t.desk + t.outro + 1200;

  // Hide mode selector
  document.getElementById('modeSelect').classList.add('gone');
  await wait(400);

  var bar = document.getElementById('progressBar');
  var startTime = Date.now();
  var progressTick = setInterval(function() {
    var pct = Math.min(((Date.now() - startTime) / totalDuration) * 100, 100);
    bar.style.width = pct + '%';
    bar.style.transition = 'width 80ms linear';
    if (pct >= 100) clearInterval(progressTick);
  }, 80);

  // ── SCENE 1 — Close-up push into the rotary dial (0:00–0:04) ──
  var s1 = document.getElementById('scene1');
  s1.style.opacity = '1';

  var closeupImg1 = document.getElementById('closeupImg1');
  var closeupImg2 = document.getElementById('closeupImg2');
  closeupImg1.classList.add('push');
  await wait(800);
  await anim(document.getElementById('closeupText'),
    { opacity: '1', transform: 'translateY(0)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');

  // Crossfade to second style midway
  await wait((t.closeup - 1800) / 2);
  anim(closeupImg1, { opacity: '0' }, 500);
  closeupImg2.classList.add('push');
  await wait((t.closeup - 1800) / 2);
  await anim(s1, { opacity: '0' }, 400);

  // ── SCENE 2 — Styled on desk, warm light, slow pan (0:04–0:09) ──
  var s2 = document.getElementById('scene2');
  await anim(s2, { opacity: '1' }, 300);
  await anim(document.getElementById('deskFrame'),
    { opacity: '1', transform: 'scale(1)' }, 800, 'cubic-bezier(0.16, 1, 0.3, 1)');

  var deskImg = document.getElementById('deskImg');
  deskImg.classList.add('pan');

  await wait(600);
  await anim(document.getElementById('deskLabel'),
    { opacity: '1', transform: 'translateY(0)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');

  await wait(t.desk - 2300);
  await anim(s2, { opacity: '0' }, 400);

  // ── SCENE 3 — Logo on grey (0:09–0:12) ──
  var s3 = document.getElementById('scene3');
  await anim(s3, { opacity: '1' }, 300);
  await anim(document.getElementById('outroLogo'),
    { opacity: '1', transform: 'scale(1)' }, 500, 'cubic-bezier(0.34, 1.56, 0.64, 1)');
  await wait(200);
  await anim(document.getElementById('outroUrl'),
    { opacity: '1', transform: 'translateY(0)' }, 400, 'cubic-bezier(0.16, 1, 0.3, 1)');

  clearInterval(progressTick);
  bar.style.width = '100%';
  bar.style.transition = 'width 300ms linear';
}

createDots();
</script>
</body>
</html>
