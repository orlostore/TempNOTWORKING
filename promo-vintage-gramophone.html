<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORLO – Miniature Vintage Gramophone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #ffffff !important;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.canvas {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
  background: #ffffff;
}

/* ═══════════════════════════════════════════
   MODE SELECTOR
   ═══════════════════════════════════════════ */
.mode-select {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4vh; z-index: 100;
  background: #ffffff !important;
}
.mode-select.gone { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.mode-logo { width: 22vw; max-width: 130px; margin-bottom: 1vh; }
.mode-title {
  font-size: clamp(14px, 3vw, 22px); font-weight: 300;
  color: #2c4a5c; letter-spacing: 0.4em; text-transform: uppercase;
}
.mode-subtitle {
  font-size: clamp(22px, 5.5vw, 36px); font-weight: 800;
  color: #2c4a5c; text-align: center; line-height: 1.3; margin-top: -1vh;
}
.mode-subtitle span { color: #e07856; }
.mode-btns { display: flex; flex-direction: column; gap: 2.5vh; margin-top: 2vh; }
.mode-btn {
  width: 72vw; max-width: 340px; padding: 3.5vh 0;
  border-radius: 2.5vw; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: clamp(17px, 4.2vw, 24px); font-weight: 700;
  letter-spacing: 0.05em; color: #fff;
  transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3vw;
}
.mode-btn:active { transform: scale(0.95); }
.btn-tiktok {
  background: linear-gradient(135deg, #010101 0%, #1a1a1a 100%);
  border: 2px solid #333;
}
.btn-insta {
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  box-shadow: 0 4px 30px rgba(225,48,108,0.25);
}
.btn-icon { font-size: clamp(22px, 5vw, 30px); }

.scene {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  will-change: opacity, transform;
}

/* ─── Scene 1: Logo Intro ─── */
.scene-intro { background: #ffffff !important; }
.intro-glow {
  width: 36vw; height: 36vw; max-width: 220px; max-height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(224,120,86,0.1) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.5);
}
.intro-glow img { width: 65%; }

/* ─── Scene 2: Close-up Reveal ─── */
.scene-closeup { background: #ffffff !important; }
.closeup-frame {
  width: 92vw; max-width: 460px;
  height: 70vh; max-height: 700px;
  border-radius: 4vw;
  overflow: hidden;
  opacity: 0; transform: scale(1.05);
}
.closeup-frame img {
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.4);
  transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1);
}
.closeup-frame img.pulled-back {
  transform: scale(1);
}

/* ─── Scene 3: Lifestyle ─── */
.scene-lifestyle { background: #ffffff !important; }
.lifestyle-frame {
  width: 88vw; max-width: 440px;
  height: 55vh; max-height: 600px;
  border-radius: 4vw;
  overflow: hidden;
  box-shadow: 0 15px 50px rgba(44,74,92,0.12), 0 0 0 1px rgba(44,74,92,0.06);
  opacity: 0; transform: scale(0.88);
}
.lifestyle-frame img { width: 100%; height: 100%; object-fit: cover; }
.life-label {
  margin-top: 3vh; text-align: center;
  padding: 0 6vw;
  opacity: 0; transform: translateY(15px);
}
.life-en {
  font-size: clamp(16px, 4vw, 26px); font-weight: 700; color: #2c4a5c;
  line-height: 1.4;
}

/* ─── Scene 4: Detail Rotate ─── */
.scene-detail { background: #ffffff !important; }
.detail-stage {
  position: relative;
  width: 70vw; height: 70vw; max-width: 420px; max-height: 420px;
}
.detail-img {
  width: 100%; height: 100%; object-fit: contain;
  opacity: 0; transform: scale(0.8);
  mix-blend-mode: multiply;
}
@keyframes slowSpin {
  0%   { transform: scale(1) rotateY(0deg); }
  100% { transform: scale(1) rotateY(15deg); }
}
.detail-img.spin {
  opacity: 1;
  animation: slowSpin 2s ease-in-out forwards;
}
.detail-label {
  margin-top: 3vh; text-align: center;
  padding: 0 6vw;
  opacity: 0; transform: translateY(15px);
}
.detail-en {
  font-size: clamp(15px, 3.8vw, 24px); font-weight: 700; color: #2c4a5c;
  line-height: 1.4;
}
.detail-price {
  display: inline-block; margin-top: 1.5vh;
  background: #e07856; color: #fff;
  padding: 1.2vh 5vw; border-radius: 50px;
  font-size: clamp(16px, 4vw, 24px); font-weight: 800;
  box-shadow: 0 4px 20px rgba(224,120,86,0.4);
}

/* ─── Scene 5: CTA Outro ─── */
.scene-cta { background: #ffffff !important; gap: 2.5vh; }
.cta-lifestyle {
  width: 88vw; max-width: 440px;
  height: 45vh; max-height: 500px;
  border-radius: 4vw;
  overflow: hidden;
  box-shadow: 0 15px 50px rgba(44,74,92,0.12), 0 0 0 1px rgba(44,74,92,0.06);
  opacity: 0; transform: scale(0.9);
}
.cta-lifestyle img { width: 100%; height: 100%; object-fit: cover; }
.cta-text {
  text-align: center; padding: 0 6vw;
  opacity: 0; transform: translateY(15px);
}
.cta-url {
  font-size: clamp(18px, 4.5vw, 30px); font-weight: 800;
  color: #e07856; letter-spacing: 0.05em;
}
.cta-delivery {
  font-size: clamp(13px, 3.2vw, 18px); font-weight: 500;
  color: #6a8090; margin-top: 0.8vh;
}

/* ─── Progress Bar ─── */
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 4px; width: 0%;
  background: linear-gradient(90deg, #e07856, #f4a261);
  z-index: 50;
}

/* ─── Floating Dots ─── */
.dots { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.dot {
  position: absolute; border-radius: 50%;
  background: rgba(224,120,86,0.15);
  animation: floatDot linear infinite;
}
@keyframes floatDot {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

</style>
</head>
<body>

<div class="canvas" id="canvas">
  <div class="progress-bar" id="progressBar"></div>
  <div class="dots" id="dots"></div>

  <!-- ── Mode Selector ── -->
  <div class="mode-select" id="modeSelect">
    <img src="logo.png" class="mode-logo" alt="ORLO">
    <div class="mode-title">Promo Reel</div>
    <div class="mode-subtitle">Miniature Vintage <span>Gramophone</span></div>
    <div class="mode-btns">
      <button class="mode-btn btn-tiktok" onclick="startPromo('tiktok')">
        <span class="btn-icon">♪</span> TikTok
      </button>
      <button class="mode-btn btn-insta" onclick="startPromo('insta')">
        <span class="btn-icon">◎</span> Instagram
      </button>
    </div>
  </div>

  <!-- Scene 1: Logo Intro (0-1s) — Clean logo, no text -->
  <div class="scene scene-intro" id="scene1">
    <div class="intro-glow" id="introGlow"><img src="logo.png" alt="ORLO"></div>
  </div>

  <!-- Scene 2: Close-up Slow Reveal (1-3s) — No text -->
  <div class="scene scene-closeup" id="scene2">
    <div class="closeup-frame" id="closeupFrame">
      <img id="closeupImg" src="https://lh3.googleusercontent.com/d/1djWzrv98v-ory6pxJ88iyACmlwEt74EA" alt="Miniature Vintage Gramophone">
    </div>
  </div>

  <!-- Scene 3: Lifestyle (3-5s) — Lived-in setting with text -->
  <div class="scene scene-lifestyle" id="scene3">
    <div class="lifestyle-frame" id="lifeFrame">
      <img id="lifeImg" src="https://lh3.googleusercontent.com/d/1GK-0zparAlJTmJiC0YPQKvwhfTWrRo0u" alt="Miniature Vintage Gramophone">
    </div>
    <div class="life-label" id="lifeLabel">
      <div class="life-en">Not everything needs to be useful to be perfect 🎵✨</div>
    </div>
  </div>

  <!-- Scene 4: Detail Rotate (5-7s) — Product + price -->
  <div class="scene scene-detail" id="scene4">
    <div class="detail-stage">
      <img class="detail-img" id="detailImg" src="https://lh3.googleusercontent.com/d/1djWzrv98v-ory6pxJ88iyACmlwEt74EA" alt="Miniature Vintage Gramophone">
    </div>
    <div class="detail-label" id="detailLabel">
      <div class="detail-en">Miniature Vintage Gramophone — AED 61 🛍️</div>
    </div>
  </div>

  <!-- Scene 5: CTA Outro (7-9s) — Warm lifestyle + URL -->
  <div class="scene scene-cta" id="scene5">
    <div class="cta-lifestyle" id="ctaLifestyle">
      <img src="https://lh3.googleusercontent.com/d/1GK-0zparAlJTmJiC0YPQKvwhfTWrRo0u" alt="Miniature Vintage Gramophone">
    </div>
    <div class="cta-text" id="ctaText">
      <div class="cta-url">orlostore.com</div>
      <div class="cta-delivery">delivered across the UAE 🚚</div>
    </div>
  </div>
</div>

<script>

function anim(el, props, ms, ease) {
  ease = ease || 'ease';
  return new Promise(function(resolve) {
    el.style.transition = 'all ' + ms + 'ms ' + ease;
    requestAnimationFrame(function() {
      Object.assign(el.style, props);
      setTimeout(resolve, ms);
    });
  });
}
function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function createDots() {
  var c = document.getElementById('dots');
  for (var i = 0; i < 20; i++) {
    var d = document.createElement('div');
    d.className = 'dot';
    d.style.left = Math.random() * 100 + '%';
    d.style.animationDuration = (5 + Math.random() * 7) + 's';
    d.style.animationDelay = Math.random() * 12 + 's';
    var size = 3 + Math.random() * 5;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    c.appendChild(d);
  }
}

var T = {
  tiktok: { s1: 1000, s2: 2000, s3: 2000, s4: 2000, s5: 2000 },
  insta:  { s1: 1000, s2: 2000, s3: 2000, s4: 2000, s5: 2000 }
};

// Preload images
(function() {
  var urls = [
    'https://lh3.googleusercontent.com/d/1djWzrv98v-ory6pxJ88iyACmlwEt74EA',
    'https://lh3.googleusercontent.com/d/1GK-0zparAlJTmJiC0YPQKvwhfTWrRo0u'
  ];
  urls.forEach(function(u) { var img = new Image(); img.src = u; });
})();

// ═══════════════════════════════════════════
// MAIN ANIMATION
// ═══════════════════════════════════════════
async function startPromo(mode) {
  var t = T[mode];
  var totalDuration = t.s1 + t.s2 + t.s3 + t.s4 + t.s5 + 2000;

  // Hide mode selector
  document.getElementById('modeSelect').classList.add('gone');
  await wait(400);

  var bar = document.getElementById('progressBar');
  var startTime = Date.now();
  var progressTick = setInterval(function() {
    var pct = Math.min(((Date.now() - startTime) / totalDuration) * 100, 100);
    bar.style.width = pct + '%';
    bar.style.transition = 'width 80ms linear';
    if (pct >= 100) clearInterval(progressTick);
  }, 80);

  // ── SCENE 1 — Logo (0-1s) ──
  var s1 = document.getElementById('scene1');
  s1.style.opacity = '1';
  await anim(document.getElementById('introGlow'),
    { opacity: '1', transform: 'scale(1)' }, 600, 'cubic-bezier(0.34, 1.56, 0.64, 1)');
  await wait(t.s1 - 600);
  await anim(s1, { opacity: '0' }, 300);

  // ── SCENE 2 — Close-up Reveal (1-3s) ──
  var s2 = document.getElementById('scene2');
  var closeupFrame = document.getElementById('closeupFrame');
  var closeupImg = document.getElementById('closeupImg');
  await anim(s2, { opacity: '1' }, 200);
  await anim(closeupFrame, { opacity: '1', transform: 'scale(1)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');
  closeupImg.classList.add('pulled-back');
  await wait(t.s2 - 600);
  await anim(s2, { opacity: '0' }, 400);

  // ── SCENE 3 — Lifestyle (3-5s) ──
  var s3 = document.getElementById('scene3');
  await anim(s3, { opacity: '1' }, 300);
  await anim(document.getElementById('lifeFrame'),
    { opacity: '1', transform: 'scale(1)' }, 800, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await wait(300);
  await anim(document.getElementById('lifeLabel'),
    { opacity: '1', transform: 'translateY(0)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await wait(t.s3 - 1700);
  await anim(s3, { opacity: '0' }, 400);

  // ── SCENE 4 — Detail + Price (5-7s) ──
  var s4 = document.getElementById('scene4');
  var detailImg = document.getElementById('detailImg');
  await anim(s4, { opacity: '1' }, 300);
  await anim(detailImg, { opacity: '1', transform: 'scale(1)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');
  detailImg.classList.add('spin');
  await wait(400);
  await anim(document.getElementById('detailLabel'),
    { opacity: '1', transform: 'translateY(0)' }, 500, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await wait(t.s4 - 1500);
  await anim(s4, { opacity: '0' }, 400);

  // ── SCENE 5 — CTA (7-9s) ──
  var s5 = document.getElementById('scene5');
  await anim(s5, { opacity: '1' }, 300);
  await anim(document.getElementById('ctaLifestyle'),
    { opacity: '1', transform: 'scale(1)' }, 800, 'cubic-bezier(0.16, 1, 0.3, 1)');
  await wait(300);
  await anim(document.getElementById('ctaText'),
    { opacity: '1', transform: 'translateY(0)' }, 600, 'cubic-bezier(0.16, 1, 0.3, 1)');

  clearInterval(progressTick);
  bar.style.width = '100%';
  bar.style.transition = 'width 300ms linear';
}

createDots();
</script>
</body>
</html>
