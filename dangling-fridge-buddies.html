<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ORLO · Dangling Fridge Buddies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .stage {
      position: relative;
      width: 420px;
      height: 700px;
      background: linear-gradient(180deg, #faf8f5 0%, #f0ebe4 100%);
      overflow: hidden;
      transform-origin: center center;
    }

    /* kitchen background */
    .kitchen-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(0deg, #e6ddd2 0%, #f0ebe4 90%);
    }

    .floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45px;
      background: #8b7355;
      border-top: 3px solid #a08665;
    }

    /* fridge */
    .fridge {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%) scale(1.2);
      transform-origin: bottom center;
      width: 190px;
      height: 340px;
      filter: drop-shadow(10px 15px 12px rgba(0,0,0,0.3));
    }

    .fridge-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 210px;
      background: linear-gradient(145deg, #f5faff, #d5e0ec);
      border-radius: 18px 18px 8px 8px;
      border: 3px solid #b8c7d8;
      border-bottom: 2px solid #9aafc2;
    }

    .fridge-bottom {
      position: absolute;
      top: 214px;
      left: 0;
      width: 100%;
      height: 126px;
      background: linear-gradient(145deg, #e0e9f5, #c8d5e5);
      border-radius: 8px 8px 18px 18px;
      border: 3px solid #b8c7d8;
      border-top: 2px solid #9aafc2;
    }

    .handle {
      position: absolute;
      right: 18px;
      width: 8px;
      background: #9aafc2;
      border-radius: 6px;
    }

    .handle-top {
      top: 75px;
      height: 50px;
    }

    .handle-bottom {
      top: 245px;
      height: 40px;
    }

    .fridge-line {
      position: absolute;
      top: 210px;
      left: 8px;
      right: 8px;
      height: 4px;
      background: #9aafc2;
      border-radius: 2px;
    }

    /* base buddy styles */
    .buddy {
      position: absolute;
      bottom: 52px;
      z-index: 25;
      image-rendering: crisp-edges;
      opacity: 0;
      filter: drop-shadow(3px 10px 8px #00000080);
      width: 65px;
    }

    .strawberry {
      left: -80px;
    }

    .mushroom {
      right: -80px;
    }

    /* character body */
    .character {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* ===== STRAWBERRY BUDDY ===== */
    .strawberry .head {
      width: 52px;
      height: 48px;
      background: #ffcd94;
      border-radius: 30px 30px 20px 20px;
      position: relative;
    }

    .strawberry .overalls {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #3a7d5c;
      clip-path: polygon(0% 30%, 100% 30%, 90% 100%, 10% 100%);
      border-radius: 20px 20px 0 0;
      border: 2px solid #23573e;
    }

    .strawberry .shirt {
      position: absolute;
      top: 12px;
      left: 10px;
      right: 10px;
      height: 22px;
      background: #f7a35c;
      border-radius: 8px;
      border: 2px solid #c26e2c;
      z-index: 1;
    }

    .strawberry .hat {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 32px;
      background: #e34a4a;
      border-radius: 30px 30px 15px 15px;
      border: 2px solid #aa2b2b;
      z-index: 10;
    }

    .strawberry .hat::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: #3a7d5c;
      border-radius: 8px 8px 0 0;
      border: 2px solid #23573e;
    }

    .strawberry .hat::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      width: 4px;
      height: 4px;
      background: #f5e56b;
      border-radius: 50%;
      box-shadow: 10px 2px 0 #f5e56b, 18px 6px 0 #f5e56b, 5px 14px 0 #f5e56b, 22px 12px 0 #f5e56b;
    }

    .strawberry .holding {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 18px;
      background: #e34a4a;
      border-radius: 15px 15px 8px 8px;
      border: 2px solid #aa2b2b;
      z-index: 15;
    }

    .strawberry .holding::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 3px;
      height: 3px;
      background: #f5e56b;
      border-radius: 50%;
      box-shadow: 6px 2px 0 #f5e56b;
    }

    /* ===== MUSHROOM/CABBAGE BUDDY ===== */
    .mushroom .head {
      width: 52px;
      height: 48px;
      background: #f0dbb4;
      border-radius: 30px 30px 20px 20px;
      position: relative;
    }

    .mushroom .shirt {
      position: absolute;
      top: 10px;
      left: 8px;
      right: 8px;
      height: 22px;
      background: #9b7bb5;
      border-radius: 10px;
      border: 2px solid #684d84;
    }

    .mushroom .jacket {
      position: absolute;
      top: 0;
      left: -2px;
      right: -2px;
      height: 30px;
      background: #4a7b9d;
      border-radius: 20px 20px 0 0;
      border: 2px solid #2c5570;
      clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 10% 100%);
    }

    .mushroom .hat {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 32px;
      background: #7d9b4c;
      border-radius: 40% 40% 30% 30% / 60% 60% 20% 20%;
      border: 2px solid #4f6a2e;
      z-index: 10;
    }

    .mushroom .hat::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 5px;
      width: 12px;
      height: 12px;
      background: #7d9b4c;
      border-radius: 80% 0 50% 30%;
      border: 2px solid #4f6a2e;
      transform: rotate(-15deg);
    }

    .mushroom .hat::after {
      content: '';
      position: absolute;
      top: -5px;
      right: 5px;
      width: 10px;
      height: 10px;
      background: #7d9b4c;
      border-radius: 0 80% 30% 50%;
      border: 2px solid #4f6a2e;
      transform: rotate(15deg);
    }

    .mushroom .holding {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 18px;
      background: #7d9b4c;
      border-radius: 40% 40% 20% 20%;
      border: 2px solid #4f6a2e;
      z-index: 15;
    }

    .mushroom .holding::before {
      content: '';
      position: absolute;
      top: -3px;
      left: 3px;
      width: 6px;
      height: 6px;
      background: #7d9b4c;
      border-radius: 50%;
      border: 1px solid #4f6a2e;
    }

    /* ===== COMMON FEATURES ===== */
    .face {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      z-index: 20;
    }

    .eyes {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .eye {
      width: 6px;
      height: 6px;
      background: #2c4a5c;
      border-radius: 50%;
    }

    .mouth {
      width: 16px;
      height: 8px;
      border-bottom: 3px solid #cc6b6b;
      border-radius: 0 0 15px 15px;
      margin-top: 2px;
    }

    .cheeks {
      display: flex;
      gap: 18px;
      width: 100%;
      justify-content: center;
      margin-top: 2px;
    }

    .cheek {
      width: 8px;
      height: 4px;
      background: #f7a9a9;
      border-radius: 50%;
      opacity: 0.7;
    }

    /* ===== LEGS ===== */
    .legs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: -4px;
      position: relative;
      z-index: 30;
    }

    .leg-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: top center;
    }

    .strawberry .leg {
      width: 10px;
      height: 38px;
      background: repeating-linear-gradient(
        45deg,
        #e34a4a 0px, #e34a4a 6px,
        #ffffff 6px, #ffffff 12px
      );
      border: 2px solid #aa2b2b;
      border-top: none;
      border-radius: 0 0 6px 6px;
    }

    .mushroom .leg {
      width: 10px;
      height: 38px;
      background: repeating-linear-gradient(
        45deg,
        #aa7c4a 0px, #aa7c4a 6px,
        #f0e6d2 6px, #f0e6d2 12px
      );
      border: 2px solid #725432;
      border-top: none;
      border-radius: 0 0 6px 6px;
    }

    .shoe {
      width: 16px;
      height: 10px;
      background: #3a5a6c;
      border-radius: 8px 8px 4px 4px;
      border: 2px solid #2c4a5c;
      margin-top: -3px;
      box-shadow: 0 2px 0 #1e3a4c;
    }

    /* ===== ANIMATIONS ===== */
    .strawberry {
      animation: 
        slideLeft 0.9s 0.2s cubic-bezier(0.2,0.9,0.3,1.2) forwards,
        hop 0.4s 1.1s ease-in-out,
        jumpStraw 1s 1.8s cubic-bezier(0.4,0,0.2,1.2) forwards;
    }

    .mushroom {
      animation: 
        slideRight 0.9s 0.6s cubic-bezier(0.2,0.9,0.3,1.2) forwards,
        hop 0.4s 1.5s ease-in-out,
        jumpMush 1s 2.3s cubic-bezier(0.4,0,0.2,1.2) forwards;
    }

    @keyframes slideLeft {
      0% { left: -80px; opacity: 0; bottom: 52px; }
      40% { opacity: 1; }
      100% { left: 70px; opacity: 1; bottom: 52px; }
    }

    @keyframes slideRight {
      0% { right: -80px; opacity: 0; bottom: 52px; }
      40% { opacity: 1; }
      100% { right: 70px; opacity: 1; bottom: 52px; }
    }

    @keyframes hop {
      0%,100% { bottom: 52px; }
      30% { bottom: 48px; transform: scaleY(0.95); }
      60% { bottom: 78px; transform: scaleY(1.1); }
    }

    @keyframes jumpStraw {
      0% { left: 70px; bottom: 52px; }
      40% { bottom: 418px; left: 95px; transform: rotate(-8deg); }
      80% { bottom: 388px; left: 112px; transform: rotate(3deg); }
      100% { left: 118px; bottom: 368px; transform: rotate(0); }
    }

    @keyframes jumpMush {
      0% { right: 70px; bottom: 52px; }
      40% { bottom: 408px; right: 92px; transform: rotate(8deg); }
      80% { bottom: 376px; right: 108px; transform: rotate(-3deg); }
      100% { right: 114px; bottom: 356px; transform: rotate(0); }
    }

    .strawberry .leg-group.left {
      animation: legSwing 0.25s 0.3s ease-in-out 4 alternate,
                 legDangle 0.5s 1.9s ease-in-out 4 alternate,
                 idleDangle 1.8s 3.2s infinite alternate;
    }
    .strawberry .leg-group.right {
      animation: legSwing 0.25s 0.4s ease-in-out 4 alternate,
                 legDangle 0.5s 2.0s ease-in-out 4 alternate,
                 idleDangle 1.8s 3.4s infinite alternate;
    }

    .mushroom .leg-group.left {
      animation: legSwing 0.25s 0.7s ease-in-out 4 alternate,
                 legDangle 0.5s 2.4s ease-in-out 4 alternate,
                 idleDangle 1.6s 3.8s infinite alternate;
    }
    .mushroom .leg-group.right {
      animation: legSwing 0.25s 0.8s ease-in-out 4 alternate,
                 legDangle 0.5s 2.5s ease-in-out 4 alternate,
                 idleDangle 1.6s 4.0s infinite alternate;
    }

    @keyframes legSwing {
      0% { transform: rotate(20deg); }
      100% { transform: rotate(-20deg); }
    }

    @keyframes legDangle {
      0% { transform: rotate(30deg); }
      100% { transform: rotate(-30deg); }
    }

    @keyframes idleDangle {
      0% { transform: rotate(12deg); }
      100% { transform: rotate(-12deg); }
    }

    .snap-ring {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid #e07856;
      filter: drop-shadow(0 0 10px rgba(224,120,86,0.6));
      opacity: 0;
      pointer-events: none;
      z-index: 40;
    }

    .sr-strawberry {
      top: 217px;
      left: 122px;
      animation: snapBurst 0.5s 2.6s ease-out forwards;
    }

    .sr-mushroom {
      top: 197px;
      right: 118px;
      animation: snapBurst 0.5s 3.1s ease-out forwards;
    }

    @keyframes snapBurst {
      0% { transform: scale(0.3); opacity: 0.9; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    .sparkle {
      position: absolute;
      font-size: 16px;
      color: #f4a261;
      text-shadow: 0 0 15px #e07856;
      opacity: 0;
      z-index: 45;
    }

    .sp1 { top: 212px; left: 100px; animation: sparkle 0.6s 2.7s forwards; }
    .sp2 { top: 242px; left: 140px; animation: sparkle 0.6s 2.8s forwards; }
    .sp3 { top: 192px; right: 115px; animation: sparkle 0.6s 3.2s forwards; }
    .sp4 { top: 232px; right: 140px; animation: sparkle 0.6s 3.3s forwards; }

    @keyframes sparkle {
      0% { opacity: 0; transform: scale(0) rotate(0); }
      50% { opacity: 1; transform: scale(1.5) rotate(20deg); }
      100% { opacity: 0; transform: scale(0.5) rotate(40deg) translateY(-20px); }
    }

    .title-text {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      z-index: 50;
      width: 100%;
    }

    .title-text h1 {
      font-size: 22px;
      color: #2c4a5c;
      text-shadow: 0 2px 8px rgba(44,74,92,0.15);
      letter-spacing: 3px;
      font-weight: 800;
    }

    .title-text h2 {
      font-size: 12px;
      color: #e07856;
      letter-spacing: 2px;
      font-weight: 400;
      margin-top: 5px;
    }

    .title-text .ar-subtitle {
      font-size: 13px;
      color: #e07856;
      font-family: 'Almarai', sans-serif;
      font-weight: 700;
      margin-top: 4px;
      direction: rtl;
    }

    .title-text {
      animation: fadeUp 0.8s 3.8s ease-out forwards;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(15px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .price-tag {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: #e07856;
      padding: 8px 24px;
      border-radius: 40px;
      color: #ffffff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 6px 0 #c4613e, 0 12px 25px rgba(224,120,86,0.4);
      white-space: nowrap;
      opacity: 0;
      z-index: 55;
    }

    .price-tag {
      animation: popIn 0.5s 4.2s cubic-bezier(0.3,1.3,0.5,1) forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: translateX(-50%) scale(0.2); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    .replay-btn {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(44, 74, 92, 0.8);
      border: 2px solid #e07856;
      color: #ffffff;
      padding: 8px 24px;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      backdrop-filter: blur(4px);
      cursor: pointer;
      opacity: 0;
      transition: 0.2s;
      z-index: 60;
    }

    .replay-btn:hover {
      background: #e07856;
      color: white;
      border-color: #2c4a5c;
    }

    .replay-btn {
      animation: fadeBtn 0.5s 4.7s forwards;
    }

    @keyframes fadeBtn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="kitchen-bg"></div>
    <div class="floor"></div>

    <div class="fridge">
      <div class="fridge-top"></div>
      <div class="fridge-bottom"></div>
      <div class="handle handle-top"></div>
      <div class="handle handle-bottom"></div>
      <div class="fridge-line"></div>
    </div>

    <!-- STRAWBERRY BUDDY -->
    <div class="buddy strawberry">
      <div class="character">
        <div class="head">
          <div class="overalls"></div>
          <div class="shirt"></div>
          <div class="hat"></div>
          <div class="holding"></div>
          <div class="face">
            <div class="eyes">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
            <div class="mouth"></div>
            <div class="cheeks">
              <div class="cheek"></div>
              <div class="cheek"></div>
            </div>
          </div>
        </div>
        <div class="legs">
          <div class="leg-group left">
            <div class="leg"></div>
            <div class="shoe"></div>
          </div>
          <div class="leg-group right">
            <div class="leg"></div>
            <div class="shoe"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MUSHROOM/CABBAGE BUDDY -->
    <div class="buddy mushroom">
      <div class="character">
        <div class="head">
          <div class="jacket"></div>
          <div class="shirt"></div>
          <div class="hat"></div>
          <div class="holding"></div>
          <div class="face">
            <div class="eyes">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
            <div class="mouth"></div>
            <div class="cheeks">
              <div class="cheek"></div>
              <div class="cheek"></div>
            </div>
          </div>
        </div>
        <div class="legs">
          <div class="leg-group left">
            <div class="leg"></div>
            <div class="shoe"></div>
          </div>
          <div class="leg-group right">
            <div class="leg"></div>
            <div class="shoe"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- effects -->
    <div class="snap-ring sr-strawberry"></div>
    <div class="snap-ring sr-mushroom"></div>
    <div class="sparkle sp1">✦</div>
    <div class="sparkle sp2">✧</div>
    <div class="sparkle sp3">✦</div>
    <div class="sparkle sp4">✧</div>

    <div class="title-text">
      <h1>DANGLING BUDDIES</h1>
      <h2>fridge magnet friends</h2>
      <div class="ar-subtitle">أصدقاء الثلاجة المتدلّين</div>
    </div>

    <div class="price-tag">16 AED each · <span style="font-family:'Almarai',sans-serif">١٦ درهم</span></div>

    <button class="replay-btn" onclick="location.reload()">↻ REPLAY</button>
  </div>

<script>
// Scale stage to fill viewport (for Instagram 9:16 recording)
function fitStage() {
  var s = document.querySelector('.stage');
  var scale = Math.max(window.innerWidth / 420, window.innerHeight / 700);
  s.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', fitStage);
fitStage();
</script>
</body>
</html>
