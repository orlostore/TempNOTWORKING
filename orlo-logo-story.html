<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLO Store – Brand Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --primary:#2c4a5c;
    --primary-dark:#1a3a52;
    --accent:#e07856;
    --accent-dark:#c96644;
    --bg:#f8f9fa;
    --text:#333;
    --white:#fff;
    --cream:#faf5ef;
    --gold:#d4a574;
  }

  body{
    background:#000;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    font-family:'Inter',sans-serif;
  }

  /* ═══════════════════════════════════
     9:16 Instagram Reel Canvas
     ═══════════════════════════════════ */
  .reel{
    position:relative;
    width:min(100vw,56.25vh);
    height:min(100vh,177.78vw);
    background:var(--primary-dark);
    overflow:hidden;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  /* ── NOISE TEXTURE (premium matte feel) ── */
  .reel::after{
    content:'';position:absolute;inset:0;z-index:50;
    pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size:128px;
    opacity:0.6;
    mix-blend-mode:overlay;
  }

  /* ── BACKGROUND ── */
  .bg{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%,rgba(44,74,92,0.7) 0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%,rgba(224,120,86,0.08) 0%,transparent 50%),
      var(--primary-dark);
  }

  /* ── AMBIENT LIGHT ROTATION ── */
  .ambient{
    position:absolute;top:-50%;left:-50%;
    width:200%;height:200%;z-index:1;
    background:conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,rgba(224,120,86,0.025) 60deg,
      transparent 120deg,rgba(212,165,116,0.015) 240deg,
      transparent 360deg);
    opacity:0;
    animation:ambientIn 2s ease 0.3s forwards,ambientSpin 25s linear 0.3s infinite;
  }
  @keyframes ambientIn{to{opacity:1}}
  @keyframes ambientSpin{to{transform:rotate(360deg)}}

  /* ── FLOATING PARTICLES ── */
  .dot{position:absolute;border-radius:50%;z-index:2;opacity:0}
  .dot-1{width:3px;height:3px;top:18%;left:12%;background:rgba(224,120,86,0.25);
    animation:drift 8s ease-in-out 3s infinite,dotIn 0.8s ease 3s forwards}
  .dot-2{width:2px;height:2px;top:55%;right:15%;background:rgba(212,165,116,0.2);
    animation:drift 6s ease-in-out 3.5s infinite,dotIn 0.8s ease 3.5s forwards}
  .dot-3{width:4px;height:4px;top:30%;right:8%;background:rgba(255,255,255,0.06);
    animation:drift 10s ease-in-out 2.5s infinite,dotIn 0.8s ease 2.5s forwards}
  .dot-4{width:2px;height:2px;bottom:22%;left:20%;background:rgba(224,120,86,0.15);
    animation:drift 7s ease-in-out 4s infinite,dotIn 0.8s ease 4s forwards}
  .dot-5{width:3px;height:3px;top:72%;left:6%;background:rgba(244,162,97,0.12);
    animation:drift 9s ease-in-out 3.2s infinite,dotIn 0.8s ease 3.2s forwards}
  @keyframes drift{
    0%,100%{transform:translate(0,0)}
    25%{transform:translate(12px,-18px)}
    50%{transform:translate(-8px,-30px)}
    75%{transform:translate(16px,-12px)}
  }
  @keyframes dotIn{to{opacity:1}}

  /* ── CORNER MARKS ── */
  .corner{position:absolute;width:24px;height:24px;z-index:3;opacity:0}
  .corner::before,.corner::after{content:'';position:absolute;background:rgba(212,165,116,0.18)}
  .c-tl{top:4.5%;left:7%;animation:cIn .5s ease 3.4s forwards}
  .c-tl::before{top:0;left:0;width:1px;height:100%}
  .c-tl::after{top:0;left:0;width:100%;height:1px}
  .c-tr{top:4.5%;right:7%;animation:cIn .5s ease 3.5s forwards}
  .c-tr::before{top:0;right:0;width:1px;height:100%}
  .c-tr::after{top:0;right:0;width:100%;height:1px}
  .c-bl{bottom:4.5%;left:7%;animation:cIn .5s ease 3.6s forwards}
  .c-bl::before{bottom:0;left:0;width:1px;height:100%}
  .c-bl::after{bottom:0;left:0;width:100%;height:1px}
  .c-br{bottom:4.5%;right:7%;animation:cIn .5s ease 3.7s forwards}
  .c-br::before{bottom:0;right:0;width:1px;height:100%}
  .c-br::after{bottom:0;right:0;width:100%;height:1px}
  @keyframes cIn{to{opacity:1}}

  /* ── ACCENT LINES ── */
  .line{position:absolute;height:1px;z-index:3;
    background:linear-gradient(90deg,transparent,rgba(224,120,86,0.2),transparent);
    transform:scaleX(0)}
  .line-top{top:7%;width:55%;animation:lineGrow 1s cubic-bezier(.22,1,.36,1) 3s forwards}
  .line-bot{bottom:7%;width:45%;animation:lineGrow 1s cubic-bezier(.22,1,.36,1) 3.2s forwards}
  @keyframes lineGrow{to{transform:scaleX(1)}}

  /* ═══════════════════════════════════
     PHASE 1: THE SPARK (Orange Dot)
     ═══════════════════════════════════ */
  .spark{
    position:absolute;
    top:50%;left:50%;
    width:14px;height:14px;
    margin:-7px 0 0 -7px;
    border-radius:50%;
    background:var(--accent);
    z-index:10;
    opacity:0;
    transform:scale(0);
    animation:sparkIn 0.6s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    box-shadow:0 0 20px rgba(224,120,86,0.6),0 0 60px rgba(224,120,86,0.2);
  }
  /* Streak trail */
  .spark::before{
    content:'';position:absolute;
    top:50%;right:100%;
    width:120px;height:2px;
    margin-top:-1px;
    background:linear-gradient(90deg,transparent,rgba(224,120,86,0.5));
    opacity:0;
    animation:trailIn 0.3s ease 0.2s forwards,trailOut 0.4s ease 0.7s forwards;
  }
  @keyframes sparkIn{
    0%{opacity:0;transform:scale(0) translateX(60vw)}
    70%{opacity:1;transform:scale(1.3) translateX(0)}
    100%{opacity:1;transform:scale(1) translateX(0)}
  }
  @keyframes trailIn{to{opacity:1}}
  @keyframes trailOut{to{opacity:0}}
  /* Spark fades after logo appears */
  .spark{
    animation:sparkIn 0.6s cubic-bezier(.22,1,.36,1) 0.2s forwards,
             sparkOut 0.4s ease 1.2s forwards;
  }
  @keyframes sparkOut{to{opacity:0;transform:scale(0)}}

  /* ═══════════════════════════════════
     PHASE 2: THE ARCHITECTURE (Circles)
     ═══════════════════════════════════ */
  .ring{
    position:absolute;
    top:50%;left:50%;
    border-radius:50%;
    border:1px solid rgba(224,120,86,0.12);
    z-index:5;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
  }
  .ring-1{
    width:min(60vw,33.75vh);height:min(60vw,33.75vh);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 0.7s forwards;
  }
  .ring-2{
    width:min(75vw,42.1875vh);height:min(75vw,42.1875vh);
    border-color:rgba(212,165,116,0.07);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 0.9s forwards;
  }
  .ring-3{
    width:min(90vw,50.625vh);height:min(90vw,50.625vh);
    border-color:rgba(255,255,255,0.03);
    animation:ringBreath 1.2s cubic-bezier(.22,1,.36,1) 1.1s forwards;
  }
  /* Inhale then exhale */
  @keyframes ringBreath{
    0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    40%{transform:translate(-50%,-50%) scale(0.92);opacity:0.7}
    100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  }

  /* ═══════════════════════════════════
     PHASE 3: THE GENESIS (Logo Reveal)
     ═══════════════════════════════════ */
  .content{
    position:relative;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:0 8%;width:100%;
  }

  .logo-wrap{
    position:relative;
    margin-bottom:5%;
  }

  .logo-glow{
    position:absolute;top:50%;left:50%;
    width:120%;height:120%;border-radius:50%;
    background:radial-gradient(circle,rgba(224,120,86,0.1) 0%,transparent 65%);
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    animation:glowIn 1s cubic-bezier(.22,1,.36,1) 1.6s forwards,
             glowPulse 4s ease-in-out 2.8s infinite;
  }
  @keyframes glowIn{
    to{transform:translate(-50%,-50%) scale(1);opacity:1}
  }
  @keyframes glowPulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}
    50%{transform:translate(-50%,-50%) scale(1.12);opacity:1}
  }

  .logo-img{
    width:min(48vw,27vh);
    height:min(48vw,27vh);
    object-fit:contain;
    opacity:0;
    transform:scale(0.5) rotate(-8deg);
    filter:drop-shadow(0 8px 20px rgba(0,0,0,0));
    /* Phase 3: emerge from void + Phase 4: heavy settle */
    animation:logoReveal 1.2s cubic-bezier(.16,1,.3,1) 1.2s forwards,
             logoSettle 0.6s cubic-bezier(.22,1,.36,1) 2.4s forwards;
  }

  /* Emerge: scale up with slight rotation correction */
  @keyframes logoReveal{
    0%{opacity:0;transform:scale(0.5) rotate(-8deg);
      filter:drop-shadow(0 8px 20px rgba(0,0,0,0))}
    50%{opacity:1;transform:scale(1.06) rotate(1deg);
      filter:drop-shadow(0 8px 25px rgba(0,0,0,0.15))}
    100%{opacity:1;transform:scale(1.04) rotate(0deg);
      filter:drop-shadow(0 6px 20px rgba(0,0,0,0.12))}
  }

  /* Phase 4: Heavy settle – drops down with weight, shadow deepens */
  @keyframes logoSettle{
    0%{transform:scale(1.04) rotate(0deg) translateY(0);
      filter:drop-shadow(0 6px 20px rgba(0,0,0,0.12))}
    60%{transform:scale(1) rotate(0deg) translateY(6px);
      filter:drop-shadow(0 12px 35px rgba(0,0,0,0.3))}
    80%{transform:scale(1) rotate(0deg) translateY(4px);
      filter:drop-shadow(0 10px 30px rgba(0,0,0,0.25))}
    100%{transform:scale(1) rotate(0deg) translateY(5px);
      filter:drop-shadow(0 11px 32px rgba(0,0,0,0.28))}
  }

  /* ═══════════════════════════════════
     PHASE 5: THE BRAND (Text Reveals)
     ═══════════════════════════════════ */

  /* Brand name with letter-spacing animation */
  .brand-name{
    font-family:'Inter',sans-serif;
    font-size:clamp(16px,4.5vw,26px);
    font-weight:700;
    text-transform:uppercase;
    color:var(--cream);
    margin-bottom:1.5%;
    opacity:0;
    letter-spacing:-0.3em;
    animation:nameReveal 1s cubic-bezier(.22,1,.36,1) 3s forwards;
  }
  @keyframes nameReveal{
    0%{opacity:0;letter-spacing:-0.3em;transform:translateY(10px)}
    50%{opacity:1;letter-spacing:0.5em;transform:translateY(0)}
    100%{opacity:1;letter-spacing:0.35em;transform:translateY(0)}
  }

  /* English tagline */
  .tagline-en{
    font-family:'Inter',sans-serif;
    font-size:clamp(8px,2.2vw,11px);
    font-weight:300;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:1%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 3.6s forwards;
  }

  /* Arabic tagline */
  .tagline-ar{
    font-family:'Almarai',sans-serif;
    font-size:clamp(10px,2.8vw,14px);
    font-weight:400;
    letter-spacing:0.05em;
    color:rgba(212,165,116,0.7);
    direction:rtl;
    margin-bottom:5%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 3.9s forwards;
  }

  @keyframes slideUp{to{opacity:1;transform:translateY(0)}}

  /* ── DIVIDER ── */
  .divider{
    display:flex;align-items:center;gap:10px;
    margin-bottom:5%;
    opacity:0;
    animation:fadeIn 0.5s ease 4.2s forwards;
  }
  .div-line{
    width:35px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .div-diamond{
    width:5px;height:5px;
    background:var(--accent);
    transform:rotate(45deg);
  }
  @keyframes fadeIn{to{opacity:1}}

  /* ── URL ── */
  .url{
    font-family:'Inter',sans-serif;
    font-size:clamp(10px,2.8vw,14px);
    font-weight:600;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:7%;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 4.5s forwards;
  }

  /* ── TRUST BADGES ── */
  .badges{
    display:flex;
    gap:min(5vw,2.8vh);
    opacity:0;transform:translateY(16px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 4.9s forwards;
  }
  .badge{
    display:flex;flex-direction:column;
    align-items:center;gap:6px;
  }
  .badge-icon{
    width:min(11vw,6.2vh);height:min(11vw,6.2vh);
    border-radius:50%;
    border:1px solid rgba(212,165,116,0.18);
    background:rgba(44,74,92,0.4);
    backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
  }
  .badge-icon svg{
    width:42%;height:42%;
    stroke:var(--gold);fill:none;
    stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;
  }
  .badge-label-en{
    font-family:'Inter',sans-serif;
    font-size:clamp(6px,1.6vw,8px);
    font-weight:500;letter-spacing:0.12em;
    text-transform:uppercase;
    color:rgba(250,245,239,0.5);
    text-align:center;line-height:1.5;
  }
  .badge-label-ar{
    font-family:'Almarai',sans-serif;
    font-size:clamp(7px,1.8vw,9px);
    font-weight:400;
    color:rgba(212,165,116,0.4);
    text-align:center;direction:rtl;
    line-height:1.4;
    margin-top:-2px;
  }

  /* ── CTA ── */
  .cta{
    margin-top:5%;
    display:flex;flex-direction:column;align-items:center;
    opacity:0;transform:translateY(12px);
    animation:slideUp 0.7s cubic-bezier(.22,1,.36,1) 5.3s forwards;
  }
  .cta-en{
    font-family:'Inter',sans-serif;
    font-size:clamp(7px,2vw,10px);
    font-weight:500;letter-spacing:0.3em;
    text-transform:uppercase;
    color:rgba(250,245,239,0.3);
  }
  .cta-ar{
    font-family:'Almarai',sans-serif;
    font-size:clamp(8px,2.2vw,11px);
    font-weight:400;
    color:rgba(212,165,116,0.25);
    direction:rtl;
    margin-top:2px;
  }
  .cta-arrow{
    margin-top:6px;width:18px;height:18px;
    animation:arrowBounce 2s ease-in-out 5.8s infinite;
  }
  .cta-arrow svg{
    stroke:rgba(224,120,86,0.4);fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  }
  @keyframes arrowBounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(5px)}
  }

  /* ── REPLAY ── */
  .replay{
    position:absolute;bottom:1.5%;right:3.5%;z-index:60;
    background:transparent;
    border:1px solid rgba(212,165,116,0.12);
    color:rgba(212,165,116,0.3);
    font-family:'Inter',sans-serif;
    font-size:7px;letter-spacing:0.18em;
    text-transform:uppercase;
    padding:4px 8px;border-radius:2px;
    cursor:pointer;transition:all 0.3s;
    opacity:0;
    animation:fadeIn 0.4s ease 6s forwards;
  }
  .replay:hover{
    background:rgba(212,165,116,0.06);
    color:var(--gold);
    border-color:rgba(212,165,116,0.25);
  }

  /* ── TAP TO PLAY OVERLAY ── */
  #tap-overlay{
    position:absolute;inset:0;z-index:200;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(26,58,82,0.88);
    backdrop-filter:blur(6px);
    cursor:pointer;
    transition:opacity 0.4s ease;
  }
  .tap-icon{
    width:min(18vw,10vh);height:min(18vw,10vh);
    border-radius:50%;
    border:1px solid rgba(212,165,116,0.35);
    background:rgba(44,74,92,0.5);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:4%;
  }
  .tap-icon svg{width:36%;height:36%;fill:var(--gold);}
  .tap-label{
    font-family:'Inter',sans-serif;
    font-size:clamp(7px,2vw,10px);
    letter-spacing:0.3em;text-transform:uppercase;
    color:rgba(212,165,116,0.6);
  }
</style>
</head>
<body>

<div class="reel">

  <!-- Tap to Play -->
  <div id="tap-overlay">
    <div class="tap-icon">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
    <div class="tap-label">Tap to Play</div>
  </div>

  <!-- Background -->
  <div class="bg"></div>
  <div class="ambient"></div>

  <!-- Particles -->
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>
  <div class="dot dot-5"></div>

  <!-- Phase 1: The Spark -->
  <div class="spark"></div>

  <!-- Phase 2: The Architecture -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <!-- Corner marks -->
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <!-- Accent lines -->
  <div class="line line-top"></div>
  <div class="line line-bot"></div>

  <!-- Main Content -->
  <div class="content">

    <!-- Phase 3 + 4: Logo reveal & settle -->
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img class="logo-img" src="logo.png" alt="ORLO">
    </div>

    <!-- Phase 5: Text reveals -->
    <div class="brand-name">Orlo Store</div>
    <div class="tagline-en">Quality Is A Click Away</div>
    <div class="tagline-ar">الجودة على بُعد نقرة</div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line"></div>
    </div>

    <div class="url">orlostore.com</div>

    <div class="badges">
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <div class="badge-label-en">Free Shipping</div>
        <div class="badge-label-ar">شحن مجاني</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V6l7-4z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div class="badge-label-en">Secure Payment</div>
        <div class="badge-label-ar">دفع آمن</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <div class="badge-label-en">Top Quality</div>
        <div class="badge-label-ar">جودة عالية</div>
      </div>
    </div>

    <div class="cta">
      <div class="cta-en">Shop Now</div>
      <div class="cta-ar">تسوق الآن</div>
      <div class="cta-arrow">
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

  </div>

  <button class="replay" onclick="replayAll()">&#x21BA; Replay</button>
</div>

<script>
/* ── Audio Engine ── */
var _ctx=null;
function getCtx(){
  if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(_ctx.state==='suspended')_ctx.resume();
  return _ctx;
}

/* Whoosh — spark flying in (filtered noise sweep) */
function playWhoosh(ctx,t){
  var n=ctx.sampleRate*0.6|0,buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<n;i++)d[i]=Math.random()*2-1;
  var src=ctx.createBufferSource();src.buffer=buf;
  var f=ctx.createBiquadFilter();f.type='bandpass';f.Q.value=2;
  f.frequency.setValueAtTime(3200,t);f.frequency.exponentialRampToValueAtTime(220,t+0.55);
  var g=ctx.createGain();
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
  src.connect(f);f.connect(g);g.connect(ctx.destination);
  src.start(t);
}

/* Chime — logo reveal (ascending arpeggio C6-E6-G6-C7) */
function playChime(ctx,t){
  [1047,1319,1568,2093].forEach(function(freq,i){
    var osc=ctx.createOscillator(),g=ctx.createGain(),s=t+i*0.07;
    osc.frequency.value=freq;
    g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.055,s+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,s+2);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(s);osc.stop(s+2);
  });
}

/* Thud — logo settles with weight (two-layer sine sub) */
function playThud(ctx,t){
  [{f0:90,f1:32,g0:0.45,d:0.45},{f0:44,f1:16,g0:0.28,d:0.55}].forEach(function(p){
    var osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(p.f0,t);osc.frequency.exponentialRampToValueAtTime(p.f1,t+p.d);
    g.gain.setValueAtTime(p.g0,t);g.gain.exponentialRampToValueAtTime(0.001,t+p.d);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(t);osc.stop(t+p.d);
  });
}

/* Pad — soft ambient chord swell as text reveals (C4 maj) */
function playPad(ctx,t){
  [261.63,329.63,392,523.25].forEach(function(freq){
    var osc=ctx.createOscillator(),lp=ctx.createBiquadFilter(),g=ctx.createGain();
    lp.type='lowpass';lp.frequency.value=650;
    osc.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.017,t+1.4);
    g.gain.setValueAtTime(0.017,t+2.5);g.gain.linearRampToValueAtTime(0,t+5.2);
    osc.connect(lp);lp.connect(g);g.connect(ctx.destination);
    osc.start(t);osc.stop(t+5.2);
  });
}

function playSounds(){
  var ctx=getCtx(),now=ctx.currentTime+0.05;
  playWhoosh(ctx,now+0.2);
  playChime(ctx,now+1.2);
  playThud(ctx,now+2.4);
  playPad(ctx,now+3.0);
}

/* ── Replay (animation + sound) ── */
function replayAll(){
  document.querySelectorAll(
    '.spark,.ring,.logo-img,.logo-glow,.brand-name,.tagline-en,.tagline-ar,' +
    '.url,.divider,.badges,.cta,.line,.corner,.ambient,.dot,.replay'
  ).forEach(function(el){
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='';
  });
  playSounds();
}

/* ── Tap to Play ── */
var overlay=document.getElementById('tap-overlay');
overlay.addEventListener('click',function(){
  overlay.style.opacity='0';overlay.style.pointerEvents='none';
  setTimeout(function(){overlay.remove();},400);
  playSounds();
});
</script>
