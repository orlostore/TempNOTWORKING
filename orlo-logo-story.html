<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLO Store - Instagram Story</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:    #0a1628;
    --navy-mid:#162a4a;
    --orange:  #e76f51;
    --orange-light: #f4a261;
    --cream:   #faf5ef;
    --gold:    #d4a574;
    --white:   #ffffff;
  }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  /* ── CANVAS: 9:16 Instagram Reel / Story Frame ── */
  .reel-frame {
    position: relative;
    width: min(100vw, 56.25vh);
    height: min(100vh, 177.78vw);
    background: var(--navy);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(22,42,74,0.9) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(231,111,81,0.12) 0%, transparent 50%),
      var(--navy);
    z-index: 0;
  }

  /* Subtle rotating light */
  .light-sweep {
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(
      from 0deg at 50% 50%,
      transparent 0deg,
      rgba(231,111,81,0.03) 60deg,
      transparent 120deg,
      rgba(212,165,116,0.02) 240deg,
      transparent 360deg
    );
    z-index: 1;
    opacity: 0;
    animation: fadeInSweep 2s ease 0.5s forwards, rotateSweep 20s linear 0.5s infinite;
  }
  @keyframes fadeInSweep { to { opacity: 1; } }
  @keyframes rotateSweep { to { transform: rotate(360deg); } }

  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 2;
    opacity: 0;
  }
  .p1 { width:3px;height:3px;top:20%;left:15%;background:rgba(231,111,81,0.3);
    animation:floatP 8s ease-in-out 1.5s infinite,pIn 1s ease 1.5s forwards;}
  .p2 { width:2px;height:2px;top:60%;right:20%;background:rgba(212,165,116,0.25);
    animation:floatP 6s ease-in-out 2s infinite,pIn 1s ease 2s forwards;}
  .p3 { width:4px;height:4px;top:35%;right:10%;background:rgba(255,255,255,0.08);
    animation:floatP 10s ease-in-out 1s infinite,pIn 1s ease 1s forwards;}
  .p4 { width:2px;height:2px;bottom:25%;left:25%;background:rgba(231,111,81,0.2);
    animation:floatP 7s ease-in-out 2.5s infinite,pIn 1s ease 2.5s forwards;}
  .p5 { width:3px;height:3px;top:75%;left:8%;background:rgba(244,162,97,0.15);
    animation:floatP 9s ease-in-out 0.8s infinite,pIn 1s ease 0.8s forwards;}
  @keyframes floatP {
    0%,100%{transform:translate(0,0)}
    25%{transform:translate(15px,-20px)}
    50%{transform:translate(-10px,-35px)}
    75%{transform:translate(20px,-15px)}
  }
  @keyframes pIn { to{opacity:1} }

  /* ── ACCENT LINES ── */
  .accent-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(231,111,81,0.25), transparent);
    z-index: 3;
    transform: scaleX(0);
  }
  .accent-line-top { top:8%;width:60%;animation:lineEx 1.2s cubic-bezier(.25,.46,.45,.94) 1.8s forwards; }
  .accent-line-bottom { bottom:8%;width:50%;animation:lineEx 1.2s cubic-bezier(.25,.46,.45,.94) 2s forwards; }
  @keyframes lineEx { to{transform:scaleX(1)} }

  /* ── CORNER MARKS ── */
  .corner-mark {
    position: absolute;
    width: 28px; height: 28px;
    z-index: 3;
    opacity: 0;
    animation: cFade 0.6s ease forwards;
  }
  .corner-mark::before,.corner-mark::after {
    content:'';position:absolute;background:rgba(212,165,116,0.2);
  }
  .corner-tl{top:5%;left:8%;animation-delay:2.2s}
  .corner-tl::before{top:0;left:0;width:1px;height:100%}
  .corner-tl::after{top:0;left:0;width:100%;height:1px}
  .corner-tr{top:5%;right:8%;animation-delay:2.3s}
  .corner-tr::before{top:0;right:0;width:1px;height:100%}
  .corner-tr::after{top:0;right:0;width:100%;height:1px}
  .corner-bl{bottom:5%;left:8%;animation-delay:2.4s}
  .corner-bl::before{bottom:0;left:0;width:1px;height:100%}
  .corner-bl::after{bottom:0;left:0;width:100%;height:1px}
  .corner-br{bottom:5%;right:8%;animation-delay:2.5s}
  .corner-br::before{bottom:0;right:0;width:1px;height:100%}
  .corner-br::after{bottom:0;right:0;width:100%;height:1px}
  @keyframes cFade { to{opacity:1} }

  /* ── CONTENT ── */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 8%;
    width: 100%;
  }

  /* ── LOGO ── */
  .logo-container {
    position: relative;
    margin-bottom: 6%;
  }
  .logo-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 115%; height: 115%;
    border: 1px solid rgba(231,111,81,0.15);
    border-radius: 50%;
    transform: translate(-50%,-50%) scale(0);
    animation: ringEx 1s cubic-bezier(.25,.46,.45,.94) 0.8s forwards;
  }
  .logo-ring-outer {
    width: 130%; height: 130%;
    border-color: rgba(212,165,116,0.08);
    animation-delay: 1s;
  }
  @keyframes ringEx {
    from{transform:translate(-50%,-50%) scale(0);opacity:0}
    to{transform:translate(-50%,-50%) scale(1);opacity:1}
  }
  .logo-img {
    width: min(52vw, 29.25vh);
    height: auto;
    opacity: 0;
    transform: scale(0.8);
    animation: logoIn 1.2s cubic-bezier(.16,1,.3,1) 0.3s forwards;
    filter: drop-shadow(0 0 40px rgba(231,111,81,0));
  }
  @keyframes logoIn {
    0%{opacity:0;transform:scale(0.8);filter:drop-shadow(0 0 0 rgba(231,111,81,0))}
    60%{opacity:1;transform:scale(1.02)}
    100%{opacity:1;transform:scale(1);filter:drop-shadow(0 0 30px rgba(231,111,81,0.15))}
  }
  .logo-glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 80%; height: 80%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(231,111,81,0.08) 0%, transparent 70%);
    transform: translate(-50%,-50%);
    opacity: 0;
    animation: gPulse 4s ease-in-out 1.5s infinite;
  }
  @keyframes gPulse {
    0%,100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  }

  /* ── TEXT ELEMENTS ── */
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 2%;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 1.6s forwards;
  }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(9px, 2.6vw, 13px);
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6%;
    opacity: 0;
    transform: translateY(15px);
    animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 2s forwards;
  }
  @keyframes slideUp { to{opacity:1;transform:translateY(0)} }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6%;
    opacity: 0;
    animation: fadeIn 0.6s ease 2.3s forwards;
  }
  .divider-line {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--orange);
    transform: rotate(45deg);
  }
  @keyframes fadeIn { to{opacity:1} }

  /* ── URL ── */
  .url {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(11px, 3vw, 15px);
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8%;
    opacity: 0;
    transform: translateY(15px);
    animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 2.5s forwards;
  }

  /* ── BADGES ── */
  .badges {
    display: flex;
    gap: min(6vw, 3.375vh);
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 2.8s forwards;
  }
  .badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .badge-icon {
    width: min(12vw, 6.75vh);
    height: min(12vw, 6.75vh);
    border-radius: 50%;
    border: 1px solid rgba(212,165,116,0.2);
    background: rgba(22,42,74,0.6);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge-icon svg {
    width: 45%; height: 45%;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .badge-label {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(7px, 1.8vw, 9px);
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(250,245,239,0.5);
    text-align: center;
    line-height: 1.6;
  }

  /* ── CTA ── */
  .cta-area {
    margin-top: 6%;
    opacity: 0;
    transform: translateY(15px);
    animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 3.2s forwards;
  }
  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(8px, 2.2vw, 11px);
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(250,245,239,0.35);
  }
  .cta-arrow {
    display: inline-block;
    margin-top: 6px;
    width: 20px; height: 20px;
    animation: bounce 2s ease-in-out 3.5s infinite;
  }
  .cta-arrow svg {
    stroke: rgba(231,111,81,0.5);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  @keyframes bounce {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(6px)}
  }

  /* ── REPLAY ── */
  .replay {
    position: absolute;
    bottom: 2%; right: 4%;
    z-index: 20;
    background: transparent;
    border: 1px solid rgba(212,165,116,0.15);
    color: rgba(212,165,116,0.35);
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeIn 0.5s ease 3.8s forwards;
  }
  .replay:hover {
    background: rgba(212,165,116,0.08);
    color: var(--gold);
    border-color: rgba(212,165,116,0.3);
  }
</style>
</head>
<body>

<div class="reel-frame">
  <div class="bg-gradient"></div>
  <div class="light-sweep"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <div class="accent-line accent-line-top"></div>
  <div class="accent-line accent-line-bottom"></div>

  <div class="corner-mark corner-tl"></div>
  <div class="corner-mark corner-tr"></div>
  <div class="corner-mark corner-bl"></div>
  <div class="corner-mark corner-br"></div>

  <div class="content">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="logo-ring"></div>
      <div class="logo-ring logo-ring-outer"></div>
      <img class="logo-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAADGgAAAxoCAYAAADQpk0SAAAACXBIWXMAAAsTAAALEwEAmpwYAAAgAElEQVR4nOzde9Gc913Y8bUlx7k4F9uR3nPetQRCQJEhQLeR3nPedbcFhW6xJe3v7DzMdACHgVYppSCgTDWUiwQtoKGUVuUqCh2qMqSo0FI0LQyilDIarp5mSiMgBCfkgnOzY2Jsx7GlTOdZyQlOiG0cSc9ePp+Z8x8zGZ58o32f8/jp/drvnp4kSZIkSZIkSXrJ5kIqP+HQ5djJAAMMMMAAAwwwwAADDDDAAAMMMMAAAw" alt="ORLO" />
    </div>

    <div class="brand-name">Orlo Store</div>
    <div class="tagline">Quality Is A Click Away</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="url">orlostore.com</div>

    <div class="badges">
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <div class="badge-label">Free<br>Shipping</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V6l7-4z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div class="badge-label">Secure<br>Payment</div>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <div class="badge-label">Top<br>Quality</div>
      </div>
    </div>

    <div class="cta-area">
      <div class="cta-text">Shop Now</div>
      <div class="cta-arrow">
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
  </div>

  <button class="replay" onclick="replay()">&#x21BA; Replay</button>
</div>

<script>
function replay() {
  const animated = document.querySelectorAll(
    '.logo-img,.logo-ring,.logo-glow,.brand-name,.tagline,.url,.divider,.badges,.cta-area,' +
    '.accent-line,.corner-mark,.light-sweep,.particle,.replay'
  );
  animated.forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
}
</script>

</body>
</html>
